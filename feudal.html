<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feudal Japan — VP Lab</title>
  <style>
    *{margin:0}body{background:#1a1812;overflow:hidden;touch-action:none}canvas{display:block}
    #ver{position:fixed;top:8px;left:8px;color:rgba(255,255,255,0.25);font-family:monospace;font-size:10px;z-index:30;pointer-events:none}
    #load{position:fixed;top:0;left:0;right:0;bottom:0;background:#1a1812;display:flex;align-items:center;justify-content:center;z-index:50;font-family:monospace;color:#cc7744;font-size:13px;flex-direction:column;gap:10px;transition:opacity 1s}
    #load span{color:#888;font-size:10px}
    #bar{width:200px;height:4px;background:#333;border-radius:2px;overflow:hidden}
    #bar div{height:100%;background:#cc7744;width:0%;transition:width 0.3s}
    #status{color:#666;font-size:9px;max-width:300px;text-align:center;line-height:1.6}
    .gone{opacity:0!important;pointer-events:none!important}
    #ctrl{position:fixed;bottom:8px;right:8px;z-index:20;background:rgba(0,0,0,0.5);padding:8px 10px;border-radius:6px;font-family:monospace;font-size:9px;color:rgba(255,255,255,0.55);line-height:2}
    #ctrl label{display:block}
    #ctrl input[type="range"]{width:75px;vertical-align:middle}
  </style>
</head>
<body>
  <div id="ver">v3.0</div>
  <div id="load">Feudal Japan<span id="prog">loading...</span><div id="bar"><div id="fill"></div></div><div id="status"></div></div>
  <div id="ctrl">
    <label>Mist <input type="range" id="mist" min="0" max="100" value="30"></label>
    <label>Bloom <input type="range" id="blm" min="0" max="100" value="40"></label>
    <label>Time <input type="range" id="tod" min="0" max="100" value="55"></label>
  </div>
  <script type="importmap">
  {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"}}
  </script>
  <script type="module">
    const statusEl = document.getElementById('status');
    const progEl = document.getElementById('prog');
    const fillEl = document.getElementById('fill');
    function showErr(msg) {
      if (statusEl) statusEl.textContent = 'ERROR: ' + msg;
      if (progEl) { progEl.textContent = 'FAILED'; progEl.style.color = '#ff4444'; }
      console.error('[feudal]', msg);
    }
    try {

    // ─── IMPORTS ─────────────────────────────────────
    statusEl.textContent = 'importing modules...';
    const THREE = await import('three');
    const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');
    const { EffectComposer } = await import('three/addons/postprocessing/EffectComposer.js');
    const { RenderPass } = await import('three/addons/postprocessing/RenderPass.js');
    const { UnrealBloomPass } = await import('three/addons/postprocessing/UnrealBloomPass.js');
    const { GLTFLoader } = await import('three/addons/loaders/GLTFLoader.js');

    // ─── RENDERER ────────────────────────────────────
    statusEl.textContent = 'creating renderer...';
    const W = window.innerWidth, H = window.innerHeight;
    const R = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    R.setSize(W, H);
    R.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    R.toneMapping = THREE.ACESFilmicToneMapping;
    R.toneMappingExposure = 0.85;
    document.body.appendChild(R.domElement);

    // ─── SCENE ───────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x4a6a4a);
    scene.fog = new THREE.FogExp2(0x4a6a4a, 0.004);

    const cam = new THREE.PerspectiveCamera(50, W / H, 0.1, 400);
    cam.position.set(22, 14, 26);

    const orbit = new OrbitControls(cam, R.domElement);
    orbit.enableDamping = true;
    orbit.target.set(0, 1, 0);
    orbit.maxPolarAngle = Math.PI / 1.85;
    orbit.minDistance = 3;
    orbit.maxDistance = 60;
    orbit.enablePan = true;
    orbit.panSpeed = 0.8;
    orbit.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

    // ─── POST-PROCESSING ─────────────────────────────
    const composer = new EffectComposer(R);
    composer.addPass(new RenderPass(scene, cam));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(W, H), 0.4, 0.4, 0.5);
    composer.addPass(bloomPass);

    // ─── LIGHTS ──────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x445544, 0.6));
    const sun = new THREE.DirectionalLight(0xffeedd, 1.8);
    sun.position.set(15, 20, 10);
    scene.add(sun);
    const fillLight = new THREE.DirectionalLight(0x88aacc, 0.35);
    fillLight.position.set(-12, 8, -8);
    scene.add(fillLight);

    // Warm ground bounce
    const bounce = new THREE.DirectionalLight(0x553322, 0.2);
    bounce.position.set(0, -2, 0);
    scene.add(bounce);

    // Lantern point lights
    const lans = [];
    function addLan(x, y, z) {
      const l = new THREE.PointLight(0xff6622, 2.5, 10);
      l.position.set(x, y, z);
      scene.add(l);
      lans.push(l);
    }
    addLan(-3, 2.5, 3); addLan(3, 2.5, 3);
    addLan(-3, 2.5, 9); addLan(3, 2.5, 9);
    addLan(0, 2.5, -3); addLan(0, 2.5, -7);
    addLan(-7, 2.5, 5); addLan(7, 2.5, 5);

    // ─── TERRAIN ─────────────────────────────────────
    statusEl.textContent = 'building terrain...';
    const tGeo = new THREE.PlaneGeometry(120, 120, 60, 60);
    tGeo.rotateX(-Math.PI / 2);
    const tp = tGeo.attributes.position;
    const tColors = new Float32Array(tp.count * 3);
    function terrainY(x, z) {
      const dist = Math.sqrt(x * x + z * z);
      if (dist <= 22) return 0;
      const f = (dist - 22) / 28;
      return f * f * 12 + Math.sin(x * 0.07) * Math.cos(z * 0.05) * 4 * f + Math.sin(x * 0.14 + 1) * 2.5 * f;
    }
    for (let i = 0; i < tp.count; i++) {
      const x = tp.getX(i), z = tp.getZ(i);
      const y = terrainY(x, z);
      tp.setY(i, y);
      tColors[i * 3] = 0.1 + y * 0.007;
      tColors[i * 3 + 1] = 0.2 + Math.min(y / 22, 0.25);
      tColors[i * 3 + 2] = 0.06 + y * 0.003;
    }
    tGeo.setAttribute('color', new THREE.BufferAttribute(tColors, 3));
    tGeo.computeVertexNormals();
    scene.add(new THREE.Mesh(tGeo, new THREE.MeshPhongMaterial({ vertexColors: true, shininess: 5 })));

    // ─── STREETS ─────────────────────────────────────
    statusEl.textContent = 'laying streets...';
    const stMat = new THREE.MeshPhongMaterial({ color: 0x8a7a5a, shininess: 8 });
    function addBox(w, h, d, mat, x, y, z) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      m.position.set(x, y, z);
      scene.add(m);
      return m;
    }

    // Main road leading to temple
    addBox(3, 0.05, 35, stMat, 0, 0.025, 0);
    // Cross streets
    addBox(24, 0.05, 2.5, stMat, 0, 0.025, 5);
    addBox(20, 0.05, 2.5, stMat, 0, 0.025, 12);
    // Side paths
    addBox(2, 0.05, 14, stMat, -8, 0.025, 8);
    addBox(2, 0.05, 14, stMat, 8, 0.025, 8);

    // ─── PROCEDURAL HOUSES ───────────────────────────
    statusEl.textContent = 'building village...';
    const fndMat = new THREE.MeshPhongMaterial({ color: 0x606060, shininess: 5 });
    const wlMat = new THREE.MeshPhongMaterial({ color: 0x4a3525, shininess: 8 });
    const rfMat = new THREE.MeshPhongMaterial({ color: 0x2a1a0a, shininess: 12 });
    const rgMat = new THREE.MeshPhongMaterial({ color: 0x1a0a00 });
    const drMat = new THREE.MeshPhongMaterial({ color: 0xccbb99, shininess: 15 });
    const bmMat = new THREE.MeshPhongMaterial({ color: 0x3a2010, shininess: 10 });

    function addMesh(parent, geo, mat, px, py, pz) {
      const m = new THREE.Mesh(geo, mat);
      m.position.set(px, py, pz);
      parent.add(m);
      return m;
    }

    function house(x, z, s, ry) {
      const g = new THREE.Group();
      // Stone foundation
      addMesh(g, new THREE.BoxGeometry(3.4, 0.35, 4), fndMat, 0, 0.175, 0);
      // Wooden walls
      addMesh(g, new THREE.BoxGeometry(2.8, 2.2, 3.4), wlMat, 0, 1.45, 0);
      // Corner beams
      for (const [bx, bz] of [[-1.3, -1.6], [1.3, -1.6], [-1.3, 1.6], [1.3, 1.6]])
        addMesh(g, new THREE.BoxGeometry(0.12, 2.3, 0.12), bmMat, bx, 1.45, bz);
      // Roof with wide overhang
      addMesh(g, new THREE.BoxGeometry(4.2, 0.22, 5), rfMat, 0, 2.7, 0);
      // Roof edge detail (eave)
      addMesh(g, new THREE.BoxGeometry(4.3, 0.06, 5.1), bmMat, 0, 2.58, 0);
      // Ridge beam
      addMesh(g, new THREE.BoxGeometry(0.14, 0.2, 5.1), rgMat, 0, 2.92, 0);
      // Shoji door
      addMesh(g, new THREE.BoxGeometry(0.9, 1.6, 0.06), drMat, 0, 1.15, 1.71);
      // Window (side)
      addMesh(g, new THREE.BoxGeometry(0.06, 0.8, 0.7), drMat, 1.41, 1.6, 0);

      g.position.set(x, 0, z);
      g.scale.setScalar(s);
      g.rotation.y = ry;
      scene.add(g);
    }

    // Left side of main street
    house(-5.5, 2, 1.0, 0.05);
    house(-5, 8, 0.95, -0.08);
    house(-9.5, 5.5, 0.9, 0.4);
    house(-9, 11, 1.05, -0.12);
    // Right side
    house(5.5, 2, 1.0, Math.PI + 0.05);
    house(5, 8, 0.9, Math.PI - 0.1);
    house(9.5, 5.5, 0.95, Math.PI + 0.3);
    house(9, 11, 1.0, Math.PI - 0.18);
    // Along back cross street
    house(-7, -2, 0.85, 1.5);
    house(7, -2, 0.85, -1.5);

    // ─── LOAD GLB MODELS ─────────────────────────────
    statusEl.textContent = 'loading 3D models...';
    const loader = new GLTFLoader();
    const cache = {};
    let loaded = 0;
    const models = [
      ['shrine', 'assets/shrine.glb'],
      ['stairs', 'assets/entrance-stairs.glb'],
      ['dragon', 'assets/dragon.glb'],
      ['lamp', 'assets/lamp.glb'],
    ];

    await Promise.all(models.map(async ([name, url]) => {
      try {
        const gltf = await new Promise((res, rej) => {
          const t = setTimeout(() => rej(new Error('timeout')), 15000);
          loader.load(url, r => { clearTimeout(t); res(r); }, undefined, e => { clearTimeout(t); rej(e); });
        });
        cache[name] = gltf;
      } catch (e) { console.warn('[feudal] skipped', name, e.message); }
      loaded++;
      const pct = Math.round(loaded / models.length * 100);
      progEl.textContent = pct + '%';
      fillEl.style.width = pct + '%';
    }));

    function place(name, x, y, z, s, ry) {
      if (!cache[name]) return;
      const m = cache[name].scene.clone();
      m.position.set(x, y, z);
      m.scale.setScalar(s);
      if (ry) m.rotation.y = ry;
      scene.add(m);
      return m;
    }

    // Temple compound at far end of main street
    place('shrine', 0, 0, -10, 2.5, 0);
    place('stairs', 0, 0, -4, 2, 0);
    place('dragon', 2.5, 1.5, -12, 1.5, -0.3);

    // Lanterns along streets
    const lampSpots = [
      [-2.5, 0, 1], [2.5, 0, 1],
      [-2.5, 0, 7], [2.5, 0, 7],
      [-2.5, 0, 13], [2.5, 0, 13],
      [0, 0, -3], [0, 0, -7],
      [-6, 0, 5], [6, 0, 5],
      [-6, 0, -2], [6, 0, -2],
    ];
    lampSpots.forEach(([lx, ly, lz]) => place('lamp', lx, ly, lz, 1.5, Math.random() * 0.4));

    // ─── FOREST TREES ────────────────────────────────
    statusEl.textContent = 'growing forest...';
    const treeMat = new THREE.MeshPhongMaterial({ color: 0x1a3a1a, shininess: 8 });
    const treeMat2 = new THREE.MeshPhongMaterial({ color: 0x224422, shininess: 8 });
    const trunkMat = new THREE.MeshPhongMaterial({ color: 0x3a2a1a, shininess: 5 });
    const blossomMat = new THREE.MeshPhongMaterial({ color: 0xdd8899, shininess: 12, emissive: 0x331111, emissiveIntensity: 0.15 });

    for (let i = 0; i < 55; i++) {
      const a = Math.random() * Math.PI * 2;
      const d = 22 + Math.random() * 28;
      const x = Math.cos(a) * d, z = Math.sin(a) * d;
      const y = terrainY(x, z);
      const h = 4.5 + Math.random() * 5;
      const sc = 0.6 + Math.random() * 0.5;
      // Trunk
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1 * sc, 0.2 * sc, h * 0.4, 5), trunkMat);
      trunk.position.set(x, y + h * 0.2, z);
      scene.add(trunk);
      // Layered crown (pine tree style)
      const mat = Math.random() > 0.3 ? treeMat : treeMat2;
      const c1 = new THREE.Mesh(new THREE.ConeGeometry(1.6 * sc, h * 0.5, 5), mat);
      c1.position.set(x, y + h * 0.55, z);
      scene.add(c1);
      const c2 = new THREE.Mesh(new THREE.ConeGeometry(1.1 * sc, h * 0.38, 5), treeMat);
      c2.position.set(x, y + h * 0.75, z);
      scene.add(c2);
    }

    // Cherry blossom trees near village edge
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
      const d = 15 + Math.random() * 4;
      const x = Math.cos(a) * d, z = Math.sin(a) * d;
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.14, 3, 5), trunkMat);
      trunk.position.set(x, 1.5, z);
      scene.add(trunk);
      const blossom = new THREE.Mesh(new THREE.SphereGeometry(2, 7, 5), blossomMat);
      blossom.position.set(x, 4.2, z);
      blossom.scale.set(1, 0.6, 1);
      scene.add(blossom);
    }

    // ─── MOUNTAINS ───────────────────────────────────
    const mtnMat = new THREE.MeshPhongMaterial({ color: 0x3a5a3a, shininess: 5 });
    const snowMat = new THREE.MeshPhongMaterial({ color: 0xddeedd, shininess: 10 });
    for (let i = 0; i < 10; i++) {
      const a = (i / 10) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
      const d = 58 + Math.random() * 18;
      const x = Math.cos(a) * d, z = Math.sin(a) * d;
      const mh = 18 + Math.random() * 25;
      const mw = 10 + Math.random() * 14;
      const mtn = new THREE.Mesh(new THREE.ConeGeometry(mw, mh, 5), mtnMat);
      mtn.position.set(x, mh * 0.35, z);
      scene.add(mtn);
      if (mh > 28) {
        const snow = new THREE.Mesh(new THREE.ConeGeometry(mw * 0.28, mh * 0.18, 5), snowMat);
        snow.position.set(x, mh * 0.68, z);
        scene.add(snow);
      }
    }

    // ─── STREAM + BRIDGE ─────────────────────────────
    const waterMat = new THREE.MeshPhongMaterial({
      color: 0x2a5a6a, shininess: 80, specular: 0x446688,
      transparent: true, opacity: 0.6
    });
    addBox(2, 0.02, 45, waterMat, 14, 0.03, 0);
    // Wooden bridge
    const brMat = new THREE.MeshPhongMaterial({ color: 0x6a3a1a, shininess: 15 });
    addBox(4, 0.15, 2.5, brMat, 14, 0.45, 5);
    addBox(0.1, 0.6, 2.5, brMat, 12.2, 0.75, 5);
    addBox(0.1, 0.6, 2.5, brMat, 15.8, 0.75, 5);

    // ─── FENCES ──────────────────────────────────────
    const fenceMat = new THREE.MeshPhongMaterial({ color: 0x5a3a1a, shininess: 8 });
    function fence(x, z, len, ry) {
      const g = new THREE.Group();
      // Posts
      const posts = Math.floor(len / 1.5);
      for (let i = 0; i <= posts; i++) {
        addMesh(g, new THREE.CylinderGeometry(0.04, 0.05, 1.2, 4), fenceMat, 0, 0.6, -len / 2 + i * (len / posts));
      }
      // Rails
      addMesh(g, new THREE.BoxGeometry(0.04, 0.04, len), fenceMat, 0, 0.9, 0);
      addMesh(g, new THREE.BoxGeometry(0.04, 0.04, len), fenceMat, 0, 0.45, 0);
      g.position.set(x, 0, z);
      g.rotation.y = ry;
      scene.add(g);
    }
    fence(-12, 5, 12, 0);
    fence(12, 5, 12, 0);
    fence(0, -5, 10, Math.PI / 2);
    fence(0, 16, 16, Math.PI / 2);

    // ─── PARTICLES ───────────────────────────────────
    statusEl.textContent = 'adding atmosphere...';

    // Cherry blossom petals
    const pCount = 250;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(pCount * 3);
    const pVel = new Float32Array(pCount * 3);
    for (let i = 0; i < pCount; i++) {
      pPos[i * 3] = (Math.random() - 0.5) * 45;
      pPos[i * 3 + 1] = Math.random() * 14;
      pPos[i * 3 + 2] = (Math.random() - 0.5) * 45;
      pVel[i * 3] = (Math.random() - 0.5) * 0.006;
      pVel[i * 3 + 1] = -(0.002 + Math.random() * 0.005);
      pVel[i * 3 + 2] = (Math.random() - 0.5) * 0.006;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const petals = new THREE.Points(pGeo, new THREE.PointsMaterial({
      color: 0xffbbcc, size: 0.12, transparent: true, opacity: 0.7, sizeAttenuation: true
    }));
    scene.add(petals);

    // Fireflies
    const fCount = 25;
    const fGeo = new THREE.BufferGeometry();
    const fPos = new Float32Array(fCount * 3);
    for (let i = 0; i < fCount; i++) {
      fPos[i * 3] = (Math.random() - 0.5) * 30;
      fPos[i * 3 + 1] = 0.5 + Math.random() * 3.5;
      fPos[i * 3 + 2] = (Math.random() - 0.5) * 30;
    }
    fGeo.setAttribute('position', new THREE.BufferAttribute(fPos, 3));
    const flies = new THREE.Points(fGeo, new THREE.PointsMaterial({
      color: 0xccff44, size: 0.07, transparent: true, opacity: 0.6, sizeAttenuation: true
    }));
    scene.add(flies);

    // ─── DONE LOADING ────────────────────────────────
    progEl.textContent = 'ready!';
    setTimeout(() => document.getElementById('load').classList.add('gone'), 600);

    // ─── ANIMATE ─────────────────────────────────────
    const mistEl = document.getElementById('mist');
    const blmEl = document.getElementById('blm');
    const todEl = document.getElementById('tod');
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Petals drift and fall
      const pa = petals.geometry.attributes.position;
      for (let i = 0; i < pCount; i++) {
        pa.array[i * 3] += pVel[i * 3] + Math.sin(t * 0.3 + i * 0.2) * 0.003;
        pa.array[i * 3 + 1] += pVel[i * 3 + 1];
        pa.array[i * 3 + 2] += pVel[i * 3 + 2] + Math.cos(t * 0.25 + i * 0.15) * 0.002;
        if (pa.array[i * 3 + 1] < -0.3) {
          pa.array[i * 3] = (Math.random() - 0.5) * 45;
          pa.array[i * 3 + 1] = 12 + Math.random() * 4;
          pa.array[i * 3 + 2] = (Math.random() - 0.5) * 45;
        }
      }
      pa.needsUpdate = true;

      // Fireflies bob and twinkle
      const fa = flies.geometry.attributes.position;
      for (let i = 0; i < fCount; i++) {
        fa.array[i * 3] += Math.sin(t * 0.4 + i * 2) * 0.005;
        fa.array[i * 3 + 1] += Math.cos(t * 0.3 + i * 1.5) * 0.004;
        fa.array[i * 3 + 2] += Math.sin(t * 0.35 + i * 1.7) * 0.004;
      }
      fa.needsUpdate = true;
      flies.material.opacity = 0.3 + Math.sin(t * 2) * 0.25;

      // Lantern flicker
      lans.forEach((l, i) => { l.intensity = 2.5 + Math.sin(t * 2.5 + i * 1.3) * 0.4; });

      // UI controls
      scene.fog.density = 0.002 + (mistEl.value / 100) * 0.012;
      bloomPass.strength = 0.1 + (blmEl.value / 100) * 0.8;
      const tod = todEl.value / 100;
      const bg = new THREE.Color().setHSL(0.28, 0.12 + tod * 0.15, 0.1 + tod * 0.22);
      scene.background = bg;
      scene.fog.color = bg;
      sun.intensity = 0.4 + tod * 2;
      R.toneMappingExposure = 0.45 + tod * 0.55;

      orbit.update();
      composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
      cam.aspect = window.innerWidth / window.innerHeight;
      cam.updateProjectionMatrix();
      R.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    } catch (err) { showErr(err.message || String(err)); }
  </script>
</body>
</html>
