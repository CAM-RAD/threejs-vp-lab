<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>GPU Path Tracer — VP Lab</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;background:#111;font-family:'Segoe UI',sans-serif;color:#fff}
    canvas{display:block}
    #ui{position:fixed;top:16px;left:16px;z-index:10;font-size:12px}
    #ui .panel{background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:14px 18px;margin-bottom:8px;min-width:220px}
    #ui h3{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#6c9;margin-bottom:8px;font-weight:700}
    #ui .row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;color:#aaa}
    #ui .row .val{color:#fff;font-weight:600;font-variant-numeric:tabular-nums}
    #ui button{width:100%;padding:8px;margin-top:8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(255,255,255,0.05);color:#fff;font-size:11px;font-weight:600;cursor:pointer;transition:background 0.2s}
    #ui button:hover{background:rgba(255,255,255,0.12)}
    #ui select{width:100%;padding:6px;margin-top:6px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(0,0,0,0.5);color:#fff;font-size:11px}
    #loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:20}
    #loading h2{font-size:18px;font-weight:700;margin-bottom:6px}
    #loading p{font-size:11px;color:#888}
    .hidden{display:none!important}
  </style>
</head>
<body>

<div id="loading">
  <h2>Loading Path Tracer</h2>
  <p id="load-status">Initializing...</p>
</div>

<div id="ui" class="hidden">
  <div class="panel">
    <h3>Path Tracer</h3>
    <div class="row"><span>Samples</span><span class="val" id="samples">0</span></div>
    <div class="row"><span>Resolution</span><span class="val" id="res">-</span></div>
    <div class="row"><span>Time</span><span class="val" id="time">0s</span></div>
    <button id="btn-reset">Reset Render</button>
  </div>
  <div class="panel">
    <h3>Environment</h3>
    <div class="row"><span>Bounces</span><span class="val" id="bounces-val">3</span></div>
    <input type="range" id="bounces" min="1" max="10" value="3" style="width:100%;margin-top:4px">
    <div class="row" style="margin-top:6px"><span>Env Intensity</span><span class="val" id="env-val">1.0</span></div>
    <input type="range" id="env-intensity" min="0" max="5" step="0.1" value="1" style="width:100%;margin-top:4px">
  </div>
  <div class="panel">
    <h3>Model</h3>
    <select id="model-select">
      <option value="assets/DamagedHelmet.glb">Damaged Helmet</option>
      <option value="assets/dragon.glb">Dragon</option>
      <option value="assets/barrel.glb">Barrel</option>
      <option value="assets/bell-structure.glb">Bell Structure</option>
      <option value="assets/cart.glb">Cart</option>
    </select>
    <button id="btn-load" style="margin-top:6px">Load Model</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/",
    "three-gpu-pathtracer": "https://cdn.jsdelivr.net/npm/three-gpu-pathtracer@0.0.23/build/index.module.js",
    "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.8.3/build/index.module.js"
  }
}
</script>
<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
  import { WebGLPathTracer, PhysicalCamera, PhysicalSpotLight } from 'three-gpu-pathtracer';

  const status = document.getElementById('load-status');
  const samplesEl = document.getElementById('samples');
  const resEl = document.getElementById('res');
  const timeEl = document.getElementById('time');
  const uiEl = document.getElementById('ui');
  const loadingEl = document.getElementById('loading');

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.body.appendChild(renderer.domElement);

  // Scene
  const scene = new THREE.Scene();

  // Camera
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
  camera.position.set(2, 1.5, 3);

  // Controls
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 0.5, 0);
  controls.update();

  // Path tracer
  const pathTracer = new WebGLPathTracer(renderer);
  pathTracer.setScene(scene, camera);
  pathTracer.bounces = 3;
  pathTracer.renderScale = Math.min(1, 1 / window.devicePixelRatio);

  // Floor
  const floorGeo = new THREE.PlaneGeometry(20, 20);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Environment light
  const envUrl = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r172/examples/textures/equirectangular/royal_esplanade_1k.hdr';
  status.textContent = 'Loading environment...';

  new RGBELoader().load(envUrl, (hdr) => {
    hdr.mapping = THREE.EquirectangularReflectionMapping;
    scene.environment = hdr;
    scene.background = hdr;
    loadModel('assets/DamagedHelmet.glb');
  });

  // Model loading
  let currentModel = null;
  const loader = new GLTFLoader();

  function loadModel(url) {
    status.textContent = `Loading ${url.split('/').pop()}...`;
    loadingEl.classList.remove('hidden');
    uiEl.classList.add('hidden');

    if (currentModel) {
      scene.remove(currentModel);
      currentModel.traverse(c => {
        if (c.geometry) c.geometry.dispose();
        if (c.material) {
          if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
          else c.material.dispose();
        }
      });
    }

    loader.load(url, (gltf) => {
      currentModel = gltf.scene;

      // Auto-center and scale
      const box = new THREE.Box3().setFromObject(currentModel);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2 / maxDim;
      currentModel.scale.setScalar(scale);
      currentModel.position.sub(center.multiplyScalar(scale));
      currentModel.position.y += size.y * scale / 2;

      scene.add(currentModel);

      // Update path tracer
      pathTracer.setScene(scene, camera);
      pathTracer.renderScale = Math.min(1, 1 / window.devicePixelRatio);

      loadingEl.classList.add('hidden');
      uiEl.classList.remove('hidden');
      startTime = performance.now();

      status.textContent = 'Ready';
    }, (progress) => {
      if (progress.total) {
        const pct = Math.round(progress.loaded / progress.total * 100);
        status.textContent = `Loading model... ${pct}%`;
      }
    }, (err) => {
      status.textContent = `Error loading model: ${err.message}`;
      console.error(err);
    });
  }

  // UI controls
  let startTime = performance.now();

  document.getElementById('btn-reset').addEventListener('click', () => {
    pathTracer.setScene(scene, camera);
    startTime = performance.now();
  });

  document.getElementById('bounces').addEventListener('input', (e) => {
    pathTracer.bounces = parseInt(e.target.value);
    document.getElementById('bounces-val').textContent = e.target.value;
    pathTracer.setScene(scene, camera);
    startTime = performance.now();
  });

  document.getElementById('env-intensity').addEventListener('input', (e) => {
    const val = parseFloat(e.target.value);
    document.getElementById('env-val').textContent = val.toFixed(1);
    renderer.toneMappingExposure = val;
    pathTracer.setScene(scene, camera);
    startTime = performance.now();
  });

  document.getElementById('btn-load').addEventListener('click', () => {
    const url = document.getElementById('model-select').value;
    loadModel(url);
  });

  // Reset on camera move
  controls.addEventListener('change', () => {
    pathTracer.updateCamera();
    startTime = performance.now();
  });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    pathTracer.setScene(scene, camera);
  });

  // Render loop
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    pathTracer.renderSample();

    samplesEl.textContent = pathTracer.samples;
    resEl.textContent = `${renderer.domElement.width}x${renderer.domElement.height}`;
    timeEl.textContent = ((performance.now() - startTime) / 1000).toFixed(1) + 's';
  }

  animate();
</script>

</body>
</html>
