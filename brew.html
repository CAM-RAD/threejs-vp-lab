<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Funky Brew</title>
  <style>
    *{margin:0}body{background:#f2efe8;overflow:hidden;touch-action:none}canvas{display:block}
    #ctrl{position:fixed;bottom:10px;left:10px;right:10px;z-index:20;background:rgba(0,0,0,0.5);padding:10px 14px;border-radius:8px;font-family:monospace;font-size:10px;color:rgba(255,255,255,0.8);line-height:2.2}
    #ctrl label{display:block}
    #ctrl input[type="range"]{width:calc(100% - 80px);vertical-align:middle}
    #ver{position:fixed;top:10px;left:10px;color:rgba(0,0,0,0.3);font-family:monospace;font-size:10px;z-index:30;pointer-events:none}
    #hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(0,0,0,0.25);font-family:sans-serif;font-size:12px;text-align:center;pointer-events:none;transition:opacity 1.5s}
    .gone{opacity:0!important}
  </style>
</head>
<body>
  <div id="ver">v2.0</div>
  <div id="hint">Drag to rotate · Pinch to zoom</div>
  <div id="ctrl">
    <label>Sun ↔ <input type="range" id="sunX" min="0" max="360" value="45"></label>
    <label>Sun ↕ <input type="range" id="sunY" min="5" max="80" value="55"></label>
    <label>Warmth <input type="range" id="warm" min="0" max="100" value="60"></label>
  </div>
  <script type="importmap">
  {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"}}
  </script>
  <script type="module">
    // Using exact same pattern as debug.html which WORKED
    const THREE = await import('three');
    const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');

    const R = new THREE.WebGLRenderer({ antialias: false, logarithmicDepthBuffer: true });
    R.setSize(window.innerWidth, window.innerHeight);
    R.setPixelRatio(1);
    R.toneMapping = THREE.ACESFilmicToneMapping;
    R.toneMappingExposure = 1.0;
    document.body.appendChild(R.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf2efe8);
    const cam = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 1, 400);
    cam.position.set(22, 16, 22);

    // Orbit controls — touch to rotate, pinch to zoom
    const orbit = new OrbitControls(cam, R.domElement);
    orbit.enableDamping = true;
    orbit.dampingFactor = 0.08;
    orbit.target.set(0, 5, 0);
    orbit.minDistance = 10;
    orbit.maxDistance = 60;
    orbit.maxPolarAngle = Math.PI / 2.1;
    // Hide hint after first interaction
    orbit.addEventListener('start', () => { document.getElementById('hint').classList.add('gone'); });

    // Lights — warm key, cool fill, rim for depth
    scene.add(new THREE.AmbientLight(0xfff8f0, 0.55));
    const sun = new THREE.DirectionalLight(0xfff0dd, 2.2);
    sun.position.set(8, 20, 10);
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xc0d8ff, 0.6);
    fill.position.set(-10, 8, 8);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffeedd, 0.4);
    rim.position.set(-3, 5, -12);
    scene.add(rim);
    // Bounce light from below for softer shadows
    const bounce = new THREE.DirectionalLight(0xfff5e8, 0.25);
    bounce.position.set(0, -5, 5);
    scene.add(bounce);

    // Helper — Phong with low shininess to avoid shimmer on mobile
    function B(w,h,d,c,x,y,z) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshPhongMaterial({color:c, shininess:15, specular:0x222222}));
      m.position.set(x,y,z); scene.add(m); return m;
    }

    // ═══ BUILD COFFEE SHOP ════════════════════════════
    // Ground
    B(18, 0.3, 14, 0xe8e2d8, 0, -0.15, 0);

    // PATIO (lime) — ground level (slightly wider base)
    B(5.2, 3.5, 5.2, 0xa3cb38, -2, 1.75, 1.5);
    B(4.5, 0.15, 4.5, 0xfff8ee, 3, 0.08, 1.5);      // patio floor
    B(0.08, 1, 4.5, 0xffffff, 5.2, 0.58, 1.5);       // railing
    B(1, 2.2, 0.12, 0x8a5e22, -2, 1.1, -1.04);       // door
    B(1.6, 1.2, 0.12, 0xaaddee, -3.2, 2.1, -1.04);   // window
    B(2.8, 0.1, 1.2, 0xc45a3c, -3, 3.1, -1.5);       // awning
    B(0.9, 0.6, 0.45, 0x999999, -4.55, 2.3, 1.5);    // AC

    // CAFE (orange) — level 1 (slightly narrower than patio for step effect)
    B(5.3, 3.4, 5.8, 0xf5a623, -1.5, 5.2, 0.5);
    B(3, 1.8, 0.12, 0xaaddee, -1.5, 5.2, -2.52);     // big window
    B(3.5, 0.1, 1.2, 0xd48a18, -1.5, 6.5, -3);       // awning
    B(3.8, 0.9, 0.2, 0x1a1a2e, -1.5, 6.3, -2.62);    // sign bg
    B(3.4, 0.5, 0.22, 0x2dbcb6, -1.5, 6.3, -2.6);    // sign accent
    B(3, 0.9, 0.5, 0xc4883a, -1, 4, 0);               // counter
    B(0.5, 0.6, 0.4, 0x444444, -2.2, 4.7, 0);         // coffee machine

    // BAKERY (pink) — level 1 side (slightly smaller)
    B(3.8, 3.4, 4.3, 0xe84393, 2.2, 5.2, -0.5);
    B(2, 1.2, 0.12, 0xaaddee, 2.2, 5.4, -2.78);      // window
    B(2.8, 0.1, 1, 0xc22e78, 2.2, 6.3, -3.1);        // awning
    B(1.5, 0.7, 0.8, 0xaaddee, 2.2, 4.15, -2);       // display case

    // ROASTERY (teal) — top containers (clearly different sizes for stacked look)
    B(3.8, 2.8, 3.3, 0x2dbcb6, 0, 8.9, 0.5);         // container 1
    B(2.8, 2.2, 2.6, 0x2dbcb6, 0.5, 11.4, 0.2);      // container 2 (smaller)
    B(1.3, 0.3, 1.3, 0x999999, 0.5, 12.65, 0.2);     // vent

    // PIPES
    B(0.24, 5, 0.24, 0x999999, -4.2, 5, -1);          // vertical
    B(0.24, 4, 0.24, 0x999999, 4.3, 7.5, 0);          // vertical 2
    B(2.2, 0.24, 0.24, 0x999999, -3, 7.2, -1.5);      // horizontal
    B(1.8, 0.24, 0.24, 0x999999, 3.3, 9.5, -1);       // horizontal 2

    // ═══ DETAILS ══════════════════════════════════════
    // Helper for cylinders
    function C(rt,rb,h,s,c,x,y,z) {
      const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s), new THREE.MeshPhongMaterial({color:c, shininess:15, specular:0x222222}));
      m.position.set(x,y,z); scene.add(m); return m;
    }

    // ── NO MORE TRIM/PANEL OVERLAYS — z-fighting is unfixable with coplanar faces
    // Instead, visual separation comes from the blocks being different sizes
    // creating natural steps and shadows between them

    // Bar stools on patio
    C(0.06,0.06,0.7,4,0xcccccc, 1.5,0.43,3.2);       // stool leg
    C(0.22,0.22,0.06,6,0xe84393, 1.5,0.8,3.2);       // stool seat
    C(0.06,0.06,0.7,4,0xcccccc, 3,0.43,3.2);
    C(0.22,0.22,0.06,6,0xe84393, 3,0.8,3.2);
    C(0.06,0.06,0.7,4,0xcccccc, 4.5,0.43,3.2);
    C(0.22,0.22,0.06,6,0xe84393, 4.5,0.8,3.2);

    // Bar counter on patio
    B(4, 0.12, 0.5, 0xc4883a, 3, 0.95, 3.5);

    // Coffee cups on bar
    C(0.07,0.05,0.12,5,0xffffff, 1.8,1.07,3.45);
    C(0.07,0.05,0.12,5,0xfff8ee, 3.2,1.07,3.45);

    // Porthole window on roastery
    C(0.4,0.4,0.12,8,0xffffff, 0,8.8,-1.28);
    C(0.3,0.3,0.13,8,0xaaddee, 0,8.8,-1.27);

    // Tiny people in cafe
    B(0.25,0.5,0.25, 0x2dbcb6, 0.2,4.05,1.5);        // person A body
    C(0.13,0.13,0.13,4,0xf0c8a0, 0.2,4.55,1.5);      // person A head
    B(0.25,0.5,0.25, 0xe84393, 0.9,4.05,1.8);        // person B body
    C(0.13,0.13,0.13,4,0xdcaa80, 0.9,4.55,1.8);      // person B head

    // Table between people
    C(0.06,0.06,0.5,4,0xcccccc, 0.55,3.85,1.65);
    C(0.3,0.3,0.05,6,0xc4883a, 0.55,4.13,1.65);

    // Plants
    C(0.25,0.2,0.35,5,0xc45a3c, 5.3,0.18,0);         // pot
    const plant = new THREE.Mesh(new THREE.SphereGeometry(0.35,5,4), new THREE.MeshLambertMaterial({color:0x2d8a4e}));
    plant.position.set(5.3,0.6,0); scene.add(plant);

    // Second plant
    C(0.2,0.15,0.3,5,0xc45a3c, -4.8,0.15,3);
    const plant2 = new THREE.Mesh(new THREE.SphereGeometry(0.3,5,4), new THREE.MeshLambertMaterial({color:0x2d8a4e}));
    plant2.position.set(-4.8,0.5,3); scene.add(plant2);

    // Vent pipes on top
    C(0.25,0.25,0.3,5,0x444444, 0.9,13,0.5);
    C(0.2,0.2,0.25,5,0x444444, 0.1,12.95,-0.1);

    // Pipe elbows (spheres)
    const elbow1 = new THREE.Mesh(new THREE.SphereGeometry(0.18,5,4), new THREE.MeshLambertMaterial({color:0x555555}));
    elbow1.position.set(-4.2,7.2,-1); scene.add(elbow1);
    const elbow2 = new THREE.Mesh(new THREE.SphereGeometry(0.18,5,4), new THREE.MeshLambertMaterial({color:0x555555}));
    elbow2.position.set(4.3,9.5,-0.5); scene.add(elbow2);

    // Striped awning details (alternating color strips on cafe awning)
    B(0.5,0.11,1.2, 0xfff8ee, -2.75,6.5,-3);
    B(0.5,0.11,1.2, 0xfff8ee, -1.75,6.5,-3);
    B(0.5,0.11,1.2, 0xfff8ee, -0.75,6.5,-3);

    // Bakery pastries on display
    C(0.1,0.08,0.08,5,0x6b4226, 1.9,4.55,-2);
    C(0.1,0.08,0.08,5,0x6b4226, 2.2,4.55,-2);
    C(0.1,0.08,0.08,5,0x6b4226, 2.5,4.55,-2);

    // Street lamp
    C(0.08,0.1,3.5,4,0x444444, 7,1.75,-1);
    const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.2,5,4), new THREE.MeshLambertMaterial({color:0xffee88}));
    lamp.position.set(7,3.6,-1); scene.add(lamp);

    // ═══ MORE DETAIL ═══════════════════════════════════

    // Railing horizontal bars on patio
    B(4.5, 0.06, 0.06, 0xffffff, 3, 0.55, 3.72);     // lower rail
    B(4.5, 0.06, 0.06, 0xffffff, 3, 1.05, 3.72);     // upper rail

    // Side window on bakery
    B(0.12, 1, 1.5, 0xaaddee, 4.22, 5.4, -0.5);

    // Door handle on patio
    B(0.06, 0.25, 0.06, 0xcccccc, -1.6, 1.3, -1.1);

    // Menu board on cafe wall
    B(1.2, 0.8, 0.08, 0x222222, -3.8, 5.5, 0.52);
    B(1, 0.6, 0.09, 0x334433, -3.8, 5.5, 0.53);

    // Person C sitting on patio stool
    B(0.25, 0.45, 0.25, 0xf5a623, 3, 1.1, 3.0);
    C(0.13, 0.13, 0.13, 4, 0xf0c8a0, 3, 1.58, 3.0);

    // Hanging sign bracket from cafe
    B(1.2, 0.06, 0.06, 0x444444, -4.3, 5.8, -1);
    B(0.06, 0.6, 0.06, 0x444444, -4.3, 5.5, -1);
    B(0.8, 0.5, 0.08, 0xc4883a, -4.3, 5.2, -1);     // hanging wood sign

    // Third plant near bakery
    C(0.22, 0.17, 0.32, 5, 0xc45a3c, 4.5, 0.16, -2.5);
    const plant3 = new THREE.Mesh(new THREE.SphereGeometry(0.32, 5, 4), new THREE.MeshLambertMaterial({color:0x2d8a4e}));
    plant3.position.set(4.5, 0.55, -2.5); scene.add(plant3);

    // Chimney/smoke stack on roastery
    C(0.18, 0.18, 1.5, 4, 0x555555, -1.2, 10.8, 0.5);
    C(0.25, 0.25, 0.15, 4, 0x444444, -1.2, 11.6, 0.5);

    // Step/threshold at patio door
    B(1.4, 0.2, 0.4, 0xd8cfb0, -2, 0.1, -1.2);

    // Sidewalk in front
    B(14, 0.1, 2, 0xd5d0c5, 0, -0.05, -2.5);

    // Trash can by door
    C(0.2, 0.18, 0.5, 5, 0x666666, -0.5, 0.25, -1.5);

    // Second table in cafe (near window)
    C(0.06, 0.06, 0.45, 4, 0xcccccc, -2.5, 3.82, 2);
    C(0.28, 0.28, 0.05, 6, 0xc4883a, -2.5, 4.08, 2);

    // Bread loaf on bakery display
    B(0.3, 0.15, 0.6, 0xd4a55a, 2.6, 4.55, -1.7);

    // Coffee machine steam pipes
    C(0.06, 0.06, 0.3, 3, 0xcccccc, -2.2, 5.15, -0.1);
    C(0.06, 0.06, 0.3, 3, 0xcccccc, -2.2, 5.15, 0.1);

    // ═══ CONTROLS ══════════════════════════════════════
    const sunXEl = document.getElementById('sunX');
    const sunYEl = document.getElementById('sunY');
    const warmEl = document.getElementById('warm');

    // ═══ ANIMATE ══════════════════════════════════════
    function animate() {
      requestAnimationFrame(animate);

      // Update sun position from sliders
      const angle = (sunXEl.value / 360) * Math.PI * 2;
      const height = sunYEl.value / 80;
      sun.position.set(Math.cos(angle) * 20, height * 25 + 3, Math.sin(angle) * 20);

      // Warmth — blend between cool and warm light color
      const w = warmEl.value / 100;
      sun.color.setRGB(1, 0.9 + w * 0.1, 0.8 + w * 0.15);
      sun.intensity = 1.5 + w * 1.0;
      fill.intensity = 0.8 - w * 0.3;

      orbit.update();
      R.render(scene, cam);
    }
    animate();

    window.addEventListener('resize', () => {
      cam.aspect = window.innerWidth / window.innerHeight;
      cam.updateProjectionMatrix();
      R.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
