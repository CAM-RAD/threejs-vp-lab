<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML-in-Canvas Demo — VP Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; font-family: system-ui, sans-serif; touch-action: none; }
    canvas { display: block; }
    #status {
      position: fixed; top: 12px; left: 12px; z-index: 30;
      padding: 6px 14px; border-radius: 8px; font-size: 11px; font-weight: 600;
      background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d;
      backdrop-filter: blur(12px);
    }
    #instructions {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 30;
      padding: 6px 16px; border-radius: 8px; font-size: 10px; color: #666;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.06); white-space: nowrap;
    }
    #lighting {
      position: fixed; top: 12px; right: 12px; z-index: 30;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      padding: 12px 16px; min-width: 180px;
    }
    #lighting h4 {
      font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
      color: #f0c040; margin-bottom: 8px; font-weight: 700;
    }
    #lighting .lrow {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 10px; color: #888; padding: 2px 0;
    }
    #lighting .lrow .lv { color: #fff; font-weight: 600; font-variant-numeric: tabular-nums; min-width: 28px; text-align: right; }
    #lighting input[type=range] { width: 100%; margin: 2px 0 6px; accent-color: #f0c040; }
    #lighting button {
      width: 100%; padding: 5px; margin-top: 4px; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 5px; background: rgba(255,255,255,0.04); color: #fff;
      font-size: 9px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    }
    #lighting button:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<div id="status">VP Control Room Demo — HTML-in-Canvas Concept</div>
<div id="instructions">Drag to orbit | Scroll to zoom | Monitors update live</div>

<div id="lighting">
  <h4>Room Lighting</h4>
  <div class="lrow"><span>Room</span><span class="lv" id="room-val">20%</span></div>
  <input type="range" id="room-slider" min="0" max="100" value="20">
  <div class="lrow"><span>Key Light</span><span class="lv" id="key-val">60%</span></div>
  <input type="range" id="key-slider" min="0" max="100" value="60">
  <div class="lrow"><span>Monitor Glow</span><span class="lv" id="glow-val">100%</span></div>
  <input type="range" id="glow-slider" min="0" max="100" value="100">
  <div class="lrow"><span>Warmth</span><span class="lv" id="warmth-val">50%</span></div>
  <input type="range" id="warmth-slider" min="0" max="100" value="50">
  <button id="btn-lights-on">Lights On (bright)</button>
  <button id="btn-lights-dim" style="margin-top:3px">Lights Dim (studio)</button>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x08080d);
scene.fog = new THREE.FogExp2(0x08080d, 0.07);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 5.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(0, 1.0, 0);
controls.minDistance = 2;
controls.maxDistance = 12;

const ambient = new THREE.AmbientLight(0x334466, 0.4);
scene.add(ambient);
const key = new THREE.DirectionalLight(0xddeeff, 0.6);
key.position.set(3, 5, 2);
scene.add(key);
const fill = new THREE.PointLight(0x4444aa, 0.3, 10);
fill.position.set(-3, 2, 1);
scene.add(fill);
// Ceiling light for "room on" mode
const ceiling = new THREE.PointLight(0xffeedd, 0, 15);
ceiling.position.set(0, 4, 1);
scene.add(ceiling);
// Desk lamp
const deskLight = new THREE.SpotLight(0xfff0dd, 0, 6, Math.PI/4, 0.5);
deskLight.position.set(0, 2.5, 2);
deskLight.target.position.set(0, 0.7, 1.2);
scene.add(deskLight);
scene.add(deskLight.target);

scene.add(new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshStandardMaterial({ color: 0x0e0e14, roughness: 0.9 })
).rotateX(-Math.PI / 2));
scene.add(new THREE.GridHelper(20, 40, 0x1a1a28, 0x141420));

// Particles
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(300 * 3);
for (let i = 0; i < 300; i++) {
  pPos[i*3] = (Math.random()-0.5)*16;
  pPos[i*3+1] = Math.random()*6;
  pPos[i*3+2] = (Math.random()-0.5)*16;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x3355aa, size: 0.015, transparent: true, opacity: 0.35 })));

// ===== CANVAS-RENDERED PANELS (works everywhere) =====

function makeCanvas(w, h) {
  const c = document.createElement('canvas'); c.width = w; c.height = h; return c;
}

const c1 = makeCanvas(512, 340);
const c2 = makeCanvas(512, 340);
const c3 = makeCanvas(512, 340);
let expVal=0, wbVal=5600, isoVal=800, focusVal=2.4;

function drawControlPanel() {
  const ctx = c1.getContext('2d'), w = c1.width, h = c1.height;
  const bg = ctx.createLinearGradient(0,0,w,h);
  bg.addColorStop(0,'#0f172a'); bg.addColorStop(1,'#1e293b');
  ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);

  const pulse = 0.4 + Math.abs(Math.sin(Date.now()*0.003))*0.6;
  ctx.fillStyle = '#38bdf8'; ctx.globalAlpha = pulse;
  ctx.beginPath(); ctx.arc(20,34,5,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.font = 'bold 16px system-ui'; ctx.fillText('VP CONTROL SURFACE',34,38);

  const rows = [
    {label:'Exposure', val:expVal.toFixed(1), pct:(expVal+3)/6},
    {label:'White Balance', val:wbVal+'K', pct:(wbVal-2000)/8000},
    {label:'ISO', val:''+Math.round(isoVal), pct:(isoVal-100)/12700},
    {label:'Focus Distance', val:focusVal.toFixed(1)+'m', pct:(focusVal-0.3)/19.7}
  ];
  rows.forEach((r,i) => {
    const y = 70+i*62;
    ctx.fillStyle='#94a3b8'; ctx.font='13px system-ui'; ctx.fillText(r.label,20,y);
    ctx.fillStyle='#f1f5f9'; ctx.font='bold 14px system-ui'; ctx.textAlign='right'; ctx.fillText(r.val,w-20,y); ctx.textAlign='left';
    ctx.fillStyle='#1e293b'; ctx.beginPath(); ctx.roundRect(20,y+8,w-40,8,4); ctx.fill();
    ctx.fillStyle='#38bdf8'; ctx.beginPath(); ctx.roundRect(20,y+8,(w-40)*r.pct,8,4); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(20+(w-40)*r.pct,y+12,6,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle='#475569'; ctx.font='11px system-ui'; ctx.fillText('Camera A — Sony FX6 — 4K 120fps',20,h-16);
  ctx.strokeStyle='rgba(56,189,248,0.2)'; ctx.lineWidth=1; ctx.strokeRect(0,0,w,h);
}

function drawTelemetryPanel() {
  const ctx = c2.getContext('2d'), w = c2.width, h = c2.height, t = Date.now()*0.001;
  const bg = ctx.createLinearGradient(0,0,w,h);
  bg.addColorStop(0,'#1a0a2e'); bg.addColorStop(1,'#2d1b4e');
  ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);

  ctx.fillStyle='#a78bfa'; ctx.font='bold 16px system-ui'; ctx.fillText('SCENE TELEMETRY',20,38);

  [{val:Math.round(58+Math.sin(t)*4),label:'FPS'},{val:Math.round(22+Math.sin(t*1.3)*5),label:'DRAW CALLS'},{val:'1.2M',label:'TRIANGLES'}].forEach((m,i) => {
    const x = 30+i*160;
    ctx.fillStyle='#c4b5fd'; ctx.font='bold 36px system-ui'; ctx.fillText(''+m.val,x,90);
    ctx.fillStyle='#7c6faa'; ctx.font='bold 10px system-ui'; ctx.fillText(m.label,x,108);
  });

  [{label:'GPU Load',pct:0.40+Math.sin(t*0.7)*0.15,c:['#a78bfa','#7c3aed']},
   {label:'VRAM Usage',pct:0.58+Math.sin(t*0.5)*0.10,c:['#f472b6','#ec4899']},
   {label:'CPU Thread',pct:0.30+Math.sin(t*0.9)*0.12,c:['#34d399','#059669']}].forEach((b,i) => {
    const y = 136+i*48;
    ctx.fillStyle='#a78bfa'; ctx.font='11px system-ui'; ctx.fillText(b.label,20,y);
    ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.beginPath(); ctx.roundRect(20,y+6,w-40,10,5); ctx.fill();
    const g = ctx.createLinearGradient(20,0,20+(w-40)*b.pct,0);
    g.addColorStop(0,b.c[0]); g.addColorStop(1,b.c[1]);
    ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(20,y+6,(w-40)*b.pct,10,5); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 11px system-ui'; ctx.textAlign='right';
    ctx.fillText(Math.round(b.pct*100)+'%',w-20,y); ctx.textAlign='left';
  });
  ctx.fillStyle='#5a4a7a'; ctx.font='11px system-ui'; ctx.fillText('Scene: VP_Studio_A — Take 14',20,h-16);
  ctx.strokeStyle='rgba(167,139,250,0.2)'; ctx.lineWidth=1; ctx.strokeRect(0,0,w,h);
}

const sessionStart = Date.now();
function drawClockPanel() {
  const ctx = c3.getContext('2d'), w = c3.width, h = c3.height;
  const bg = ctx.createLinearGradient(0,0,w,h);
  bg.addColorStop(0,'#0a1a0a'); bg.addColorStop(1,'#1a2e1a');
  ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);

  ctx.textAlign='center';
  ctx.fillStyle='#3a5a3a'; ctx.font='bold 11px system-ui'; ctx.fillText('T I M E C O D E',w/2,50);

  const now = new Date();
  ctx.fillStyle='#4ade80'; ctx.font='bold 72px system-ui';
  ctx.shadowColor='rgba(74,222,128,0.3)'; ctx.shadowBlur=30;
  ctx.fillText(now.toLocaleTimeString('en-US',{hour12:false}),w/2,130);
  ctx.shadowBlur=0;

  ctx.fillStyle='#5a8a5a'; ctx.font='14px system-ui';
  ctx.fillText(now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}),w/2,160);

  const el = Math.floor((Date.now()-sessionStart)/1000);
  const hh=String(Math.floor(el/3600)).padStart(2,'0'), mm=String(Math.floor((el%3600)/60)).padStart(2,'0'), ss=String(el%60).padStart(2,'0');
  ctx.fillStyle='#3a5a3a'; ctx.font='bold 11px system-ui'; ctx.fillText('S E S S I O N   D U R A T I O N',w/2,210);
  ctx.fillStyle='#6b8f6b'; ctx.font='bold 32px system-ui'; ctx.fillText(`${hh}:${mm}:${ss}`,w/2,252);

  if (Math.sin(Date.now()*0.005)>0) {
    ctx.fillStyle='#ef4444'; ctx.beginPath(); ctx.arc(w/2-24,290,5,0,Math.PI*2); ctx.fill();
    ctx.font='bold 12px system-ui'; ctx.fillText('REC',w/2,294);
  }
  ctx.textAlign='left';
  ctx.strokeStyle='rgba(74,222,128,0.2)'; ctx.lineWidth=1; ctx.strokeRect(0,0,w,h);
}

// ===== 3D MONITORS =====
const canvases = [c1,c2,c3], draws = [drawControlPanel,drawTelemetryPanel,drawClockPanel];
const textures = canvases.map(c => { const t = new THREE.CanvasTexture(c); t.minFilter = THREE.LinearFilter; return t; });

function mkMonitor(w,h) {
  const g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.BoxGeometry(w+0.1,h+0.1,0.06), new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:0.3,metalness:0.8})));
  const s = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.04,0.5,8), new THREE.MeshStandardMaterial({color:0x2a2a3e,roughness:0.4,metalness:0.7}));
  s.position.y = -h/2-0.25; g.add(s);
  const b = new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.17,0.025,16), new THREE.MeshStandardMaterial({color:0x2a2a3e,roughness:0.4,metalness:0.7}));
  b.position.y = -h/2-0.5; g.add(b);
  return g;
}

const pos = [{x:-2.4,y:1.5,z:0.2,ry:0.28},{x:0,y:1.5,z:-0.2,ry:0},{x:2.4,y:1.5,z:0.2,ry:-0.28}];
const glows = [0x38bdf8,0xa78bfa,0x4ade80];

const glowMeshes = [];
pos.forEach((p,i) => {
  const frame = mkMonitor(2.1,1.4); frame.position.set(p.x,p.y,p.z); frame.rotation.y=p.ry; scene.add(frame);
  const scr = new THREE.Mesh(new THREE.PlaneGeometry(2.06,1.36), new THREE.MeshBasicMaterial({map:textures[i],toneMapped:false}));
  scr.position.set(p.x,p.y,p.z+0.035); scr.rotation.y=p.ry; scene.add(scr);
  const gl = new THREE.Mesh(new THREE.PlaneGeometry(2.6,1.8), new THREE.MeshBasicMaterial({color:glows[i],transparent:true,opacity:0.035,toneMapped:false}));
  gl.position.set(p.x,p.y,p.z-0.06); gl.rotation.y=p.ry; scene.add(gl);
  glowMeshes.push(gl);
});

// Desk
const desk = new THREE.Mesh(new THREE.BoxGeometry(7,0.06,1.2), new THREE.MeshStandardMaterial({color:0x1a1a22,roughness:0.6,metalness:0.3}));
desk.translateY(0.7).translateZ(1.2);
scene.add(desk);

// Chair (so there's something to see with lights on)
const chairSeat = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.05,0.5), new THREE.MeshStandardMaterial({color:0x222230,roughness:0.7}));
chairSeat.position.set(0,0.55,2.2); scene.add(chairSeat);
const chairBack = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.5,0.05), new THREE.MeshStandardMaterial({color:0x222230,roughness:0.7}));
chairBack.position.set(0,0.8,2.45); scene.add(chairBack);
// Chair legs
for (const cx of [-0.25,0.25]) for (const cz of [1.95,2.45]) {
  const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.55,6), new THREE.MeshStandardMaterial({color:0x333340,metalness:0.6}));
  leg.position.set(cx,0.275,cz); scene.add(leg);
}

// Keyboard on desk
const kb = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.015,0.18), new THREE.MeshStandardMaterial({color:0x181820,roughness:0.5}));
kb.position.set(0,0.74,1.5); scene.add(kb);
// Mouse
const mouse = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.012,0.1), new THREE.MeshStandardMaterial({color:0x181820,roughness:0.5}));
mouse.position.set(0.4,0.74,1.5); scene.add(mouse);
// Coffee mug
const mug = new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.03,0.09,12), new THREE.MeshStandardMaterial({color:0x664433,roughness:0.8}));
mug.position.set(-0.5,0.78,1.4); scene.add(mug);

// === LIGHTING CONTROLS ===
function updateLighting() {
  const room = parseInt(document.getElementById('room-slider').value) / 100;
  const keyVal = parseInt(document.getElementById('key-slider').value) / 100;
  const glowVal = parseInt(document.getElementById('glow-slider').value) / 100;
  const warmth = parseInt(document.getElementById('warmth-slider').value) / 100;

  document.getElementById('room-val').textContent = Math.round(room*100)+'%';
  document.getElementById('key-val').textContent = Math.round(keyVal*100)+'%';
  document.getElementById('glow-val').textContent = Math.round(glowVal*100)+'%';
  document.getElementById('warmth-val').textContent = Math.round(warmth*100)+'%';

  // Ambient
  ambient.intensity = 0.1 + room * 1.5;
  const warmColor = new THREE.Color().setHSL(0.1, 0.3, 0.5);
  const coolColor = new THREE.Color(0x334466);
  ambient.color.copy(coolColor).lerp(warmColor, warmth);

  // Key light
  key.intensity = keyVal * 1.5;

  // Ceiling
  ceiling.intensity = room * 2.5;
  ceiling.color.set(warmth > 0.5 ? 0xffeedd : 0xddeeff);

  // Desk lamp
  deskLight.intensity = room * 1.5;

  // Fill
  fill.intensity = 0.1 + room * 0.5;

  // Monitor glow
  glowMeshes.forEach(g => { g.material.opacity = 0.01 + glowVal * 0.06; });

  // Background
  const bgBright = 0.02 + room * 0.08;
  scene.background = new THREE.Color(bgBright, bgBright, bgBright + 0.01);
  scene.fog = new THREE.FogExp2(scene.background, 0.07 - room * 0.04);
}

document.getElementById('room-slider').addEventListener('input', updateLighting);
document.getElementById('key-slider').addEventListener('input', updateLighting);
document.getElementById('glow-slider').addEventListener('input', updateLighting);
document.getElementById('warmth-slider').addEventListener('input', updateLighting);

document.getElementById('btn-lights-on').addEventListener('click', () => {
  document.getElementById('room-slider').value = 80;
  document.getElementById('key-slider').value = 90;
  document.getElementById('glow-slider').value = 60;
  document.getElementById('warmth-slider').value = 65;
  updateLighting();
});

document.getElementById('btn-lights-dim').addEventListener('click', () => {
  document.getElementById('room-slider').value = 15;
  document.getElementById('key-slider').value = 40;
  document.getElementById('glow-slider').value = 100;
  document.getElementById('warmth-slider').value = 30;
  updateLighting();
});

// Animate
const t0 = Date.now();
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  const t = (Date.now()-t0)*0.0005;
  expVal = Math.sin(t*1.1)*1.5;
  wbVal = 5600+Math.sin(t*0.7)*1500;
  isoVal = 800+Math.sin(t*0.9)*400;
  focusVal = 2.4+Math.sin(t*0.6)*1.8;
  draws.forEach((fn,i) => { fn(); textures[i].needsUpdate = true; });
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
