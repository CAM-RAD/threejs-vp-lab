<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Greek Temple — Three.js r184</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    #title {
      position: fixed; top: 28px; left: 32px; z-index: 11; pointer-events: none;
      font-family: 'Georgia', 'Times New Roman', serif;
    }
    #title h1 {
      font-size: 26px; font-weight: 400; color: rgba(255,248,235,0.92);
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
      letter-spacing: 2px;
    }
    #title p {
      font-size: 12px; color: rgba(255,248,235,0.5);
      font-family: monospace; margin-top: 4px; letter-spacing: 1px;
    }
    #version {
      position: fixed; bottom: 12px; right: 16px;
      font-family: monospace; font-size: 10px;
      color: rgba(255,255,255,0.3); z-index: 11; pointer-events: none;
    }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a0a; display: flex; align-items: center; justify-content: center;
      z-index: 100; font-family: Georgia, serif; color: rgba(255,248,235,0.7);
      font-size: 18px; letter-spacing: 3px; transition: opacity 1.5s;
    }
    /* vignette */
    #overlay::after {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.45) 100%);
    }
  </style>
</head>
<body>
  <div id="loading">LOADING...</div>
  <div id="overlay"></div>
  <div id="title">
    <h1>Greek Temple</h1>
    <p>Three.js r184 &mdash; Virtual Production</p>
  </div>
  <div id="version">v1.1</div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
  }}
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

    // ─── RENDERER ──────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.85;
    document.body.appendChild(renderer.domElement);

    // ─── SCENE ─────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0xc8b898, 0.0018);

    // ─── CAMERA ────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 1000);
    // Looking down the colonnade from one end
    camera.position.set(-28, 6, 2);

    // ─── CONTROLS ──────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.04;
    controls.target.set(10, 4, 0);
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.3;
    controls.maxPolarAngle = Math.PI / 2 - 0.05; // don't go below floor
    controls.minDistance = 5;
    controls.maxDistance = 80;

    // ─── HDRI ENVIRONMENT ──────────────────────────────
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    pmremGenerator.compileEquirectangularShader();

    new RGBELoader()
      .load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/kloofendal_43d_clear_puresky_1k.hdr', (hdrTexture) => {
        const envMap = pmremGenerator.fromEquirectangular(hdrTexture).texture;
        scene.environment = envMap;
        scene.background = envMap;
        hdrTexture.dispose();
        pmremGenerator.dispose();

        // hide loading screen
        const loading = document.getElementById('loading');
        loading.style.opacity = '0';
        setTimeout(() => loading.style.display = 'none', 1500);
      });

    // ─── MATERIALS (PBR) ──────────────────────────────
    const marbleMat = new THREE.MeshStandardMaterial({
      color: 0xf0e8d8,
      roughness: 0.28,
      metalness: 0.02,
      envMapIntensity: 0.6,
    });

    const marbleFloorMat = new THREE.MeshStandardMaterial({
      color: 0xebe3d1,
      roughness: 0.35,
      metalness: 0.01,
      envMapIntensity: 0.5,
    });

    const marbleWarmMat = new THREE.MeshStandardMaterial({
      color: 0xe8dcc4,
      roughness: 0.32,
      metalness: 0.02,
      envMapIntensity: 0.5,
    });

    const stoneMat = new THREE.MeshStandardMaterial({
      color: 0xc8b898,
      roughness: 0.65,
      metalness: 0.0,
      envMapIntensity: 0.3,
    });

    const stoneStepMat = new THREE.MeshStandardMaterial({
      color: 0xd4c4a4,
      roughness: 0.55,
      metalness: 0.0,
      envMapIntensity: 0.3,
    });

    const bronzeMat = new THREE.MeshStandardMaterial({
      color: 0x8B7355,
      roughness: 0.4,
      metalness: 0.6,
      envMapIntensity: 0.8,
    });

    const darkStoneMat = new THREE.MeshStandardMaterial({
      color: 0x665544,
      roughness: 0.7,
      metalness: 0.0,
      envMapIntensity: 0.2,
    });

    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x9a8a6a,
      roughness: 0.85,
      metalness: 0.0,
      envMapIntensity: 0.2,
    });

    // ─── LIGHTING ──────────────────────────────────────
    // Golden hour sun — low angle, warm
    const sunLight = new THREE.DirectionalLight(0xffe0a0, 3.0);
    sunLight.position.set(40, 25, -30);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    sunLight.shadow.camera.left = -50;
    sunLight.shadow.camera.right = 50;
    sunLight.shadow.camera.top = 50;
    sunLight.shadow.camera.bottom = -50;
    sunLight.shadow.camera.near = 1;
    sunLight.shadow.camera.far = 120;
    sunLight.shadow.bias = -0.001;
    sunLight.shadow.normalBias = 0.02;
    scene.add(sunLight);

    // Fill light — cool, from opposite side
    const fillLight = new THREE.DirectionalLight(0x8899cc, 0.4);
    fillLight.position.set(-30, 20, 20);
    scene.add(fillLight);

    // Hemisphere for soft ambient
    const hemiLight = new THREE.HemisphereLight(0x99bbdd, 0x886633, 0.35);
    scene.add(hemiLight);

    // Ambient base
    const ambientLight = new THREE.AmbientLight(0x404050, 0.15);
    scene.add(ambientLight);

    // ─── TEMPLE GROUP ──────────────────────────────────
    const temple = new THREE.Group();
    scene.add(temple);

    // ─── CONFIGURATION ─────────────────────────────────
    const COLS = 8;           // columns per row
    const COL_SPACING = 4.0;  // spacing between columns
    const ROW_SPACING = 6.0;  // distance between the two rows
    const COL_HEIGHT = 7.5;
    const COL_RADIUS_BOTTOM = 0.55;
    const COL_RADIUS_TOP = 0.45;    // entasis taper
    const FLUTES = 20;
    const STYLOBATE_W = (COLS - 1) * COL_SPACING + 6;
    const STYLOBATE_D = ROW_SPACING + 6;
    const STEP_H = 0.35;

    // ─── STYLOBATE (3 steps) ───────────────────────────
    for (let i = 0; i < 3; i++) {
      const w = STYLOBATE_W + (2 - i) * 1.6;
      const d = STYLOBATE_D + (2 - i) * 1.6;
      const step = new THREE.Mesh(
        new THREE.BoxGeometry(w, STEP_H, d),
        i === 2 ? marbleFloorMat : stoneStepMat
      );
      step.position.y = i * STEP_H + STEP_H / 2;
      step.castShadow = true;
      step.receiveShadow = true;
      temple.add(step);
    }
    const platformTop = 3 * STEP_H;

    // ─── FLOOR ─────────────────────────────────────────
    // Create a tiled floor on top of the stylobate
    const floorGeo = new THREE.PlaneGeometry(STYLOBATE_W - 0.5, STYLOBATE_D - 0.5, COLS * 2, 4);
    // Add subtle vertex displacement for imperfection
    const floorPos = floorGeo.attributes.position;
    for (let i = 0; i < floorPos.count; i++) {
      floorPos.setZ(i, floorPos.getZ(i) + (Math.random() - 0.5) * 0.015);
    }
    const floor = new THREE.Mesh(floorGeo, marbleFloorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = platformTop + 0.01;
    floor.receiveShadow = true;
    temple.add(floor);

    // Floor grid lines (subtle grooves between tiles)
    const gridGroup = new THREE.Group();
    const gridLineMat = new THREE.MeshStandardMaterial({
      color: 0xc8bda5, roughness: 0.7, metalness: 0
    });
    const tileSize = 2.0;
    const floorW = STYLOBATE_W - 1;
    const floorD = STYLOBATE_D - 1;
    // Lines along X
    for (let z = -floorD / 2; z <= floorD / 2; z += tileSize) {
      const line = new THREE.Mesh(
        new THREE.BoxGeometry(floorW, 0.005, 0.04),
        gridLineMat
      );
      line.position.set(0, platformTop + 0.02, z);
      gridGroup.add(line);
    }
    // Lines along Z
    for (let x = -floorW / 2; x <= floorW / 2; x += tileSize) {
      const line = new THREE.Mesh(
        new THREE.BoxGeometry(0.04, 0.005, floorD),
        gridLineMat
      );
      line.position.set(x, platformTop + 0.02, 0);
      gridGroup.add(line);
    }
    temple.add(gridGroup);

    // ─── FLUTED COLUMN FUNCTION ────────────────────────
    function createColumn(x, z) {
      const colGroup = new THREE.Group();
      colGroup.position.set(x, platformTop, z);

      // Base (torus + disc)
      const baseDisc = new THREE.Mesh(
        new THREE.CylinderGeometry(0.72, 0.78, 0.2, 24),
        marbleWarmMat
      );
      baseDisc.position.y = 0.1;
      baseDisc.castShadow = true;
      baseDisc.receiveShadow = true;
      colGroup.add(baseDisc);

      const baseTorus = new THREE.Mesh(
        new THREE.TorusGeometry(0.62, 0.08, 8, 24),
        marbleMat
      );
      baseTorus.rotation.x = Math.PI / 2;
      baseTorus.position.y = 0.28;
      colGroup.add(baseTorus);

      // Fluted shaft — create flutes by subtracting channels via custom geometry
      // We'll use a LatheGeometry approach for the shaft with entasis
      const shaftSegments = 32;
      const shaftPoints = [];
      for (let i = 0; i <= shaftSegments; i++) {
        const t = i / shaftSegments;
        // Entasis: slight bulge at 1/3 height
        const entasis = 1 + 0.03 * Math.sin(t * Math.PI);
        const r = THREE.MathUtils.lerp(COL_RADIUS_BOTTOM, COL_RADIUS_TOP, t) * entasis;
        shaftPoints.push(new THREE.Vector2(r, t * COL_HEIGHT));
      }

      const shaftGeo = new THREE.LatheGeometry(shaftPoints, FLUTES);
      // Create fluting effect by pushing vertices inward at midpoints between segments
      const shaftPos = shaftGeo.attributes.position;
      const shaftNorm = shaftGeo.attributes.normal;
      for (let i = 0; i < shaftPos.count; i++) {
        const px = shaftPos.getX(i);
        const py = shaftPos.getY(i);
        const pz = shaftPos.getZ(i);
        const angle = Math.atan2(pz, px);
        const fluteAngle = angle * FLUTES / 2;
        const fluteFactor = 0.5 + 0.5 * Math.cos(fluteAngle * 2);
        const indent = 0.03 * fluteFactor;
        const r = Math.sqrt(px * px + pz * pz);
        const newR = r - indent;
        if (r > 0.01) {
          shaftPos.setX(i, px * newR / r);
          shaftPos.setZ(i, pz * newR / r);
        }
      }
      shaftGeo.computeVertexNormals();

      const shaft = new THREE.Mesh(shaftGeo, marbleMat);
      shaft.position.y = 0.35;
      shaft.castShadow = true;
      shaft.receiveShadow = true;
      colGroup.add(shaft);

      // Capital — Doric: simple echinus (curved cushion) + abacus (square slab)
      // Echinus
      const echinusGeo = new THREE.LatheGeometry([
        new THREE.Vector2(COL_RADIUS_TOP - 0.02, 0),
        new THREE.Vector2(COL_RADIUS_TOP + 0.05, 0.06),
        new THREE.Vector2(COL_RADIUS_TOP + 0.15, 0.18),
        new THREE.Vector2(0.65, 0.28),
      ], 24);
      const echinus = new THREE.Mesh(echinusGeo, marbleMat);
      echinus.position.y = 0.35 + COL_HEIGHT;
      echinus.castShadow = true;
      colGroup.add(echinus);

      // Abacus (square top)
      const abacus = new THREE.Mesh(
        new THREE.BoxGeometry(1.35, 0.2, 1.35),
        marbleMat
      );
      abacus.position.y = 0.35 + COL_HEIGHT + 0.38;
      abacus.castShadow = true;
      colGroup.add(abacus);

      return colGroup;
    }

    // ─── PLACE COLUMNS (two rows) ──────────────────────
    const startX = -(COLS - 1) * COL_SPACING / 2;
    const rowZ_front = -ROW_SPACING / 2;
    const rowZ_back = ROW_SPACING / 2;

    for (let i = 0; i < COLS; i++) {
      const x = startX + i * COL_SPACING;
      temple.add(createColumn(x, rowZ_front));
      temple.add(createColumn(x, rowZ_back));
    }

    // ─── ENTABLATURE ───────────────────────────────────
    const entablatureY = platformTop + 0.35 + COL_HEIGHT + 0.48;

    // Architrave (main beam) — front
    function createEntablature(z) {
      const group = new THREE.Group();

      // Architrave
      const architrave = new THREE.Mesh(
        new THREE.BoxGeometry(STYLOBATE_W - 1, 0.6, 1.0),
        marbleMat
      );
      architrave.position.set(0, entablatureY + 0.3, z);
      architrave.castShadow = true;
      architrave.receiveShadow = true;
      group.add(architrave);

      // Frieze (slightly recessed)
      const frieze = new THREE.Mesh(
        new THREE.BoxGeometry(STYLOBATE_W - 1, 0.5, 0.85),
        marbleWarmMat
      );
      frieze.position.set(0, entablatureY + 0.85, z);
      frieze.castShadow = true;
      group.add(frieze);

      // Triglyphs on the frieze
      const triglyphCount = COLS * 2 - 1;
      const triglyphSpacing = (STYLOBATE_W - 3) / (triglyphCount - 1);
      const facingSign = z < 0 ? -1 : 1;
      for (let i = 0; i < triglyphCount; i++) {
        if (i % 2 === 0) {
          // Triglyph (three vertical channels)
          const tg = new THREE.Mesh(
            new THREE.BoxGeometry(0.5, 0.48, 0.08),
            marbleMat
          );
          tg.position.set(
            -(STYLOBATE_W - 3) / 2 + i * triglyphSpacing,
            entablatureY + 0.85,
            z + facingSign * 0.47
          );
          group.add(tg);
          // Vertical grooves
          for (let g = -1; g <= 1; g++) {
            const groove = new THREE.Mesh(
              new THREE.BoxGeometry(0.05, 0.44, 0.1),
              darkStoneMat
            );
            groove.position.set(
              tg.position.x + g * 0.14,
              entablatureY + 0.85,
              z + facingSign * 0.51
            );
            group.add(groove);
          }
        }
      }

      // Cornice (overhanging top)
      const cornice = new THREE.Mesh(
        new THREE.BoxGeometry(STYLOBATE_W - 0.2, 0.25, 1.5),
        marbleMat
      );
      cornice.position.set(0, entablatureY + 1.22, z);
      cornice.castShadow = true;
      group.add(cornice);

      return group;
    }

    temple.add(createEntablature(rowZ_front));
    temple.add(createEntablature(rowZ_back));

    // Cross beams connecting the two rows at each end and middle
    const beamY = entablatureY + 0.3;
    const crossBeamPositions = [startX - 0.5, startX + (COLS - 1) * COL_SPACING + 0.5];
    crossBeamPositions.forEach(x => {
      const crossBeam = new THREE.Mesh(
        new THREE.BoxGeometry(1.0, 0.6, ROW_SPACING + 2),
        marbleMat
      );
      crossBeam.position.set(x, beamY, 0);
      crossBeam.castShadow = true;
      temple.add(crossBeam);
    });

    // ─── ROOF (pediments at each end + sloped planes) ───
    const roofPeakH = 2.5;
    const roofBaseW = ROW_SPACING + 2.5;
    const roofBaseY = entablatureY + 1.35;

    // Pediments — triangular gable at each end
    function createPediment(x) {
      const shape = new THREE.Shape();
      shape.moveTo(-roofBaseW / 2, 0);
      shape.lineTo(roofBaseW / 2, 0);
      shape.lineTo(0, roofPeakH);
      shape.closePath();

      const pedGeo = new THREE.ExtrudeGeometry(shape, { depth: 0.35, bevelEnabled: false });
      // Center the extrusion
      pedGeo.translate(0, 0, -0.175);
      const pediment = new THREE.Mesh(pedGeo, marbleMat);
      // Pediment faces along X axis — rotate so triangle is in YZ plane facing X
      pediment.rotation.y = Math.PI / 2;
      pediment.position.set(x, roofBaseY, 0);
      pediment.castShadow = true;
      return pediment;
    }
    temple.add(createPediment(startX - 1.0));
    temple.add(createPediment(startX + (COLS - 1) * COL_SPACING + 1.0));

    // Ridge beam
    const ridgeLen = (COLS - 1) * COL_SPACING + 3;
    const ridgeBeam = new THREE.Mesh(
      new THREE.BoxGeometry(ridgeLen, 0.2, 0.3),
      marbleMat
    );
    ridgeBeam.position.set(0, roofBaseY + roofPeakH, 0);
    ridgeBeam.castShadow = true;
    temple.add(ridgeBeam);

    // Sloped roof planes
    const roofLen = ridgeLen + 0.5;
    const halfSpan = roofBaseW / 2;
    const roofSlope = Math.sqrt(halfSpan * halfSpan + roofPeakH * roofPeakH);
    const roofAngle = Math.atan2(roofPeakH, halfSpan);

    const roofMat = new THREE.MeshStandardMaterial({
      color: 0xd4c4a0,
      roughness: 0.5,
      metalness: 0.02,
      envMapIntensity: 0.3,
      side: THREE.DoubleSide,
    });

    [-1, 1].forEach(side => {
      const roofPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(roofLen, roofSlope),
        roofMat
      );
      // Position at midpoint of the slope
      const midY = roofBaseY + roofPeakH / 2;
      const midZ = side * halfSpan / 2;
      roofPlane.position.set(0, midY, midZ);
      // Tilt the plane to match the slope angle
      roofPlane.rotation.x = -side * (Math.PI / 2 - roofAngle);
      roofPlane.castShadow = true;
      roofPlane.receiveShadow = true;
      temple.add(roofPlane);
    });

    // ─── BACK WALL (partial enclosure) ─────────────────
    const wallMat = new THREE.MeshStandardMaterial({
      color: 0xe8dcc8,
      roughness: 0.4,
      metalness: 0.01,
      envMapIntensity: 0.4,
      side: THREE.DoubleSide,
    });

    // Cella wall between back row columns
    const walSegments = [
      { x1: startX + COL_SPACING, x2: startX + (COLS - 2) * COL_SPACING }
    ];
    walSegments.forEach(seg => {
      const w = seg.x2 - seg.x1;
      const wall = new THREE.Mesh(
        new THREE.BoxGeometry(w, COL_HEIGHT - 0.5, 0.3),
        wallMat
      );
      wall.position.set(
        (seg.x1 + seg.x2) / 2,
        platformTop + COL_HEIGHT / 2 + 0.1,
        rowZ_back - 0.3
      );
      wall.castShadow = true;
      wall.receiveShadow = true;
      temple.add(wall);
    });

    // ─── STATUES ───────────────────────────────────────
    function createStatue(x, z, height, type) {
      const group = new THREE.Group();
      group.position.set(x, platformTop, z);

      // Pedestal
      const pedestal = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 1.0, 0.8),
        stoneMat
      );
      pedestal.position.y = 0.5;
      pedestal.castShadow = true;
      pedestal.receiveShadow = true;
      group.add(pedestal);

      // Pedestal top detail
      const pedTop = new THREE.Mesh(
        new THREE.BoxGeometry(0.9, 0.1, 0.9),
        marbleMat
      );
      pedTop.position.y = 1.05;
      group.add(pedTop);

      if (type === 'figure') {
        // Simplified human figure — torso + head + arms
        // Torso
        const torso = new THREE.Mesh(
          new THREE.CylinderGeometry(0.22, 0.28, height * 0.45, 12),
          bronzeMat
        );
        torso.position.y = 1.1 + height * 0.25;
        torso.castShadow = true;
        group.add(torso);

        // Head
        const head = new THREE.Mesh(
          new THREE.SphereGeometry(0.16, 12, 10),
          bronzeMat
        );
        head.position.y = 1.1 + height * 0.55;
        head.castShadow = true;
        group.add(head);

        // Lower body / robe
        const robe = new THREE.Mesh(
          new THREE.ConeGeometry(0.35, height * 0.4, 12),
          bronzeMat
        );
        robe.position.y = 1.1 + height * 0.0;
        robe.castShadow = true;
        group.add(robe);

        // Arm (raised)
        const arm = new THREE.Mesh(
          new THREE.CylinderGeometry(0.05, 0.06, height * 0.3, 8),
          bronzeMat
        );
        arm.position.set(0.28, 1.1 + height * 0.35, 0);
        arm.rotation.z = -0.5;
        arm.castShadow = true;
        group.add(arm);

      } else if (type === 'bust') {
        // Bust on pillar
        const pillar = new THREE.Mesh(
          new THREE.CylinderGeometry(0.15, 0.18, height * 0.5, 12),
          marbleMat
        );
        pillar.position.y = 1.1 + height * 0.25;
        pillar.castShadow = true;
        group.add(pillar);

        // Bust head
        const bustHead = new THREE.Mesh(
          new THREE.SphereGeometry(0.22, 14, 12),
          marbleMat
        );
        bustHead.scale.set(1, 1.15, 0.9);
        bustHead.position.y = 1.1 + height * 0.6;
        bustHead.castShadow = true;
        group.add(bustHead);

      } else if (type === 'urn') {
        // Decorative urn / amphora
        const urnPoints = [
          new THREE.Vector2(0, 0),
          new THREE.Vector2(0.22, 0),
          new THREE.Vector2(0.28, 0.08),
          new THREE.Vector2(0.2, 0.3),
          new THREE.Vector2(0.14, 0.5),
          new THREE.Vector2(0.16, 0.65),
          new THREE.Vector2(0.22, 0.8),
          new THREE.Vector2(0.24, 0.9),
          new THREE.Vector2(0.2, 1.0),
          new THREE.Vector2(0.15, 1.05),
          new THREE.Vector2(0.12, 1.0),
          new THREE.Vector2(0, 1.0),
        ];
        const urnGeo = new THREE.LatheGeometry(urnPoints, 20);
        const urn = new THREE.Mesh(urnGeo, bronzeMat);
        urn.position.y = 1.1;
        urn.castShadow = true;
        group.add(urn);
      }

      return group;
    }

    // Place statues
    // Figure at one end of the colonnade
    temple.add(createStatue(startX + 1, 0, 2.0, 'figure'));
    // Bust between columns
    temple.add(createStatue(startX + 3 * COL_SPACING, rowZ_front + 1.5, 1.5, 'bust'));
    // Urn at the other end
    temple.add(createStatue(startX + (COLS - 1) * COL_SPACING - 1, 0, 1.2, 'urn'));

    // ─── GROUND PLANE ──────────────────────────────────
    const groundGeo = new THREE.PlaneGeometry(200, 200, 40, 40);
    // Subtle terrain undulation
    const gPos = groundGeo.attributes.position;
    for (let i = 0; i < gPos.count; i++) {
      const gx = gPos.getX(i);
      const gy = gPos.getY(i);
      const dist = Math.sqrt(gx * gx + gy * gy);
      const h = Math.sin(gx * 0.05) * 0.3 + Math.cos(gy * 0.07) * 0.2;
      // Flatten near temple
      const flatFactor = THREE.MathUtils.smoothstep(dist, 15, 40);
      gPos.setZ(i, h * flatFactor - 0.1);
    }
    groundGeo.computeVertexNormals();
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.1;
    ground.receiveShadow = true;
    scene.add(ground);

    // Scattered stone debris around the temple
    for (let i = 0; i < 30; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 18 + Math.random() * 30;
      const debris = new THREE.Mesh(
        new THREE.BoxGeometry(
          0.3 + Math.random() * 0.8,
          0.15 + Math.random() * 0.3,
          0.3 + Math.random() * 0.8
        ),
        Math.random() > 0.5 ? stoneMat : marbleWarmMat
      );
      debris.position.set(
        Math.cos(angle) * dist,
        0.05,
        Math.sin(angle) * dist
      );
      debris.rotation.set(
        Math.random() * 0.3,
        Math.random() * Math.PI,
        Math.random() * 0.3
      );
      debris.castShadow = true;
      debris.receiveShadow = true;
      scene.add(debris);
    }

    // ─── ALTAR (center of colonnade) ───────────────────
    const altar = new THREE.Group();
    // Base
    const altarBase = new THREE.Mesh(
      new THREE.BoxGeometry(1.8, 0.4, 1.2),
      stoneMat
    );
    altarBase.position.y = platformTop + 0.2;
    altarBase.castShadow = true;
    altarBase.receiveShadow = true;
    altar.add(altarBase);
    // Top slab
    const altarTop = new THREE.Mesh(
      new THREE.BoxGeometry(2.0, 0.15, 1.4),
      marbleMat
    );
    altarTop.position.y = platformTop + 0.47;
    altarTop.castShadow = true;
    altar.add(altarTop);
    // Fire bowl
    const bowlGeo = new THREE.LatheGeometry([
      new THREE.Vector2(0, 0),
      new THREE.Vector2(0.35, 0),
      new THREE.Vector2(0.4, 0.05),
      new THREE.Vector2(0.38, 0.2),
      new THREE.Vector2(0.3, 0.22),
    ], 16);
    const bowl = new THREE.Mesh(bowlGeo, bronzeMat);
    bowl.position.y = platformTop + 0.55;
    bowl.castShadow = true;
    altar.add(bowl);

    altar.position.set(startX + 3.5 * COL_SPACING, 0, 0);
    temple.add(altar);

    // ─── DUST PARTICLES ────────────────────────────────
    const PARTICLE_COUNT = 800;
    const particleGeo = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
    const particleSpeeds = new Float32Array(PARTICLE_COUNT);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particlePositions[i * 3] = (Math.random() - 0.5) * 50;
      particlePositions[i * 3 + 1] = Math.random() * 15 + 0.5;
      particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 30;
      particleSpeeds[i] = 0.002 + Math.random() * 0.006;
    }

    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

    // Create a small bright dot texture
    const pCanvas = document.createElement('canvas');
    pCanvas.width = 32; pCanvas.height = 32;
    const pCtx = pCanvas.getContext('2d');
    const pGrad = pCtx.createRadialGradient(16, 16, 0, 16, 16, 16);
    pGrad.addColorStop(0, 'rgba(255,240,200,1.0)');
    pGrad.addColorStop(0.3, 'rgba(255,230,180,0.6)');
    pGrad.addColorStop(1, 'rgba(255,220,160,0.0)');
    pCtx.fillStyle = pGrad;
    pCtx.fillRect(0, 0, 32, 32);
    const particleTexture = new THREE.CanvasTexture(pCanvas);

    const particleMat = new THREE.PointsMaterial({
      map: particleTexture,
      size: 0.12,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true,
    });

    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // ─── ADDITIONAL SCENE DRESSING ─────────────────────
    // Distant cypress trees (simple cones)
    function createCypress(x, z) {
      const group = new THREE.Group();
      const trunkMat = new THREE.MeshStandardMaterial({
        color: 0x553322, roughness: 0.8
      });
      const leafMat = new THREE.MeshStandardMaterial({
        color: 0x1a3a1a, roughness: 0.7
      });

      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12, 0.18, 1.5, 6),
        trunkMat
      );
      trunk.position.y = 0.75;
      trunk.castShadow = true;
      group.add(trunk);

      const canopy = new THREE.Mesh(
        new THREE.ConeGeometry(0.6, 5, 7),
        leafMat
      );
      canopy.position.y = 4;
      canopy.castShadow = true;
      group.add(canopy);

      group.position.set(x, 0, z);
      return group;
    }

    // Place cypress trees around the scene
    const cypressPositions = [
      [25, -15], [30, -8], [28, 12], [35, 5],
      [-30, -12], [-28, 8], [-35, -3], [-25, 15],
      [22, 20], [-22, -18], [38, -18], [-32, 18],
    ];
    cypressPositions.forEach(([x, z]) => {
      const tree = createCypress(x, z);
      tree.scale.setScalar(0.8 + Math.random() * 0.5);
      scene.add(tree);
    });

    // ─── FALLEN COLUMN (atmospheric ruin detail) ───────
    const fallenCol = new THREE.Group();
    const fallenShaft = new THREE.Mesh(
      new THREE.CylinderGeometry(0.45, 0.52, 5, 16),
      marbleWarmMat
    );
    fallenShaft.rotation.z = Math.PI / 2;
    fallenShaft.rotation.y = 0.3;
    fallenShaft.position.set(16, 0.45, 8);
    fallenShaft.castShadow = true;
    fallenShaft.receiveShadow = true;
    fallenCol.add(fallenShaft);

    // Broken capital nearby
    const brokenCap = new THREE.Mesh(
      new THREE.CylinderGeometry(0.55, 0.6, 0.3, 12),
      marbleMat
    );
    brokenCap.position.set(19, 0.15, 7.5);
    brokenCap.rotation.x = 0.4;
    brokenCap.rotation.z = 0.2;
    brokenCap.castShadow = true;
    fallenCol.add(brokenCap);
    scene.add(fallenCol);

    // ─── LIGHT SHAFTS (volumetric hint with thin mesh planes) ──
    const shaftMat = new THREE.MeshBasicMaterial({
      color: 0xfff0c8,
      transparent: true,
      opacity: 0.035,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    for (let i = 0; i < 3; i++) {
      const shaft = new THREE.Mesh(
        new THREE.PlaneGeometry(2, 12),
        shaftMat
      );
      shaft.position.set(
        startX + (2 + i * 2) * COL_SPACING,
        platformTop + 6,
        rowZ_front + 0.5
      );
      shaft.rotation.y = 0.3;
      shaft.rotation.x = -0.15;
      temple.add(shaft);
    }

    // ─── ANIMATION LOOP ────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();

      // Animate dust particles
      const pPositions = particles.geometry.attributes.position;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        let y = pPositions.getY(i);
        let x = pPositions.getX(i);
        y += particleSpeeds[i] * Math.sin(elapsed * 0.5 + i);
        x += Math.sin(elapsed * 0.3 + i * 0.1) * 0.002;
        // Wrap around
        if (y > 15) y = 0.5;
        if (y < 0.5) y = 15;
        pPositions.setY(i, y);
        pPositions.setX(i, x);
      }
      pPositions.needsUpdate = true;

      // Gentle particle rotation
      particles.rotation.y = elapsed * 0.01;

      // Update light shafts opacity (gentle pulse)
      shaftMat.opacity = 0.025 + 0.015 * Math.sin(elapsed * 0.4);

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // ─── RESIZE HANDLER ────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── KEYBOARD: SPACE TO TOGGLE AUTO-ROTATE ────────
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        controls.autoRotate = !controls.autoRotate;
      }
    });

  </script>
</body>
</html>
