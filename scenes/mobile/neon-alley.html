<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Neon Alley — VP Lab</title>
  <style>
    *{margin:0}body{background:#0a0a12;overflow:hidden;touch-action:none}canvas{display:block}
    #ver{position:fixed;top:8px;left:8px;color:rgba(255,255,255,0.2);font-family:monospace;font-size:10px;z-index:30;pointer-events:none}
    #title{position:fixed;bottom:12px;left:12px;color:rgba(255,255,255,0.3);font-family:monospace;font-size:10px;z-index:10;pointer-events:none}
  </style>
</head>
<body>
  <div id="ver">v1.0</div>
  <div id="title">Neon Alley — VP Lab · drag to look around</div>
  <script type="importmap">
  {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"}}
  </script>
  <script type="module">
    const THREE = await import('three');
    const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');
    const { EffectComposer } = await import('three/addons/postprocessing/EffectComposer.js');
    const { RenderPass } = await import('three/addons/postprocessing/RenderPass.js');
    const { UnrealBloomPass } = await import('three/addons/postprocessing/UnrealBloomPass.js');

    const W = window.innerWidth, H = window.innerHeight;
    const R = new THREE.WebGLRenderer({ antialias: false });
    R.setSize(W, H); R.setPixelRatio(1);
    R.toneMapping = THREE.ACESFilmicToneMapping;
    R.toneMappingExposure = 0.8;
    document.body.appendChild(R.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x060610);
    scene.fog = new THREE.FogExp2(0x060610, 0.025);

    const cam = new THREE.PerspectiveCamera(55, W/H, 0.5, 150);
    cam.position.set(0, 3, 14);

    const orbit = new OrbitControls(cam, R.domElement);
    orbit.enableDamping = true;
    orbit.target.set(0, 3, 0);
    orbit.maxPolarAngle = Math.PI / 1.8;
    orbit.minDistance = 5;
    orbit.maxDistance = 25;

    // Bloom
    const composer = new EffectComposer(R);
    composer.addPass(new RenderPass(scene, cam));
    composer.addPass(new UnrealBloomPass(new THREE.Vector2(W, H), 1.2, 0.4, 0.15));

    // ─── MATERIALS ────────────────────────────────────
    const mWall = new THREE.MeshPhongMaterial({ color: 0x1a1a28, shininess: 5 });
    const mWallD = new THREE.MeshPhongMaterial({ color: 0x121220, shininess: 3 });
    const mGround = new THREE.MeshPhongMaterial({ color: 0x111118, shininess: 80, specular: 0x335577 });
    const mConcrete = new THREE.MeshPhongMaterial({ color: 0x222230, shininess: 10 });
    const mMetal = new THREE.MeshPhongMaterial({ color: 0x333340, shininess: 60, specular: 0x666688 });
    const mDoor = new THREE.MeshPhongMaterial({ color: 0x1a1520, shininess: 20 });
    const mWindow = new THREE.MeshPhongMaterial({ color: 0x223344, shininess: 40, specular: 0x446688, transparent: true, opacity: 0.5 });
    const mWindowLit = new THREE.MeshPhongMaterial({ color: 0x000000, emissive: 0x665533, emissiveIntensity: 0.4 });
    const mPipe = new THREE.MeshPhongMaterial({ color: 0x2a2a35, shininess: 30 });
    const mBrick = new THREE.MeshPhongMaterial({ color: 0x2a1f1f, shininess: 5 });

    // Neon emissives
    function neon(c, i=2.5) { return new THREE.MeshPhongMaterial({ color: 0x000000, emissive: c, emissiveIntensity: i }); }
    const nCyan = neon(0x00ddff);
    const nPink = neon(0xff2288);
    const nPurple = neon(0x8833ff);
    const nGreen = neon(0x22ff66);
    const nOrange = neon(0xff8822);
    const nRed = neon(0xff2222, 1.8);
    const nYellow = neon(0xffcc22, 1.5);

    // Helpers
    function B(w,h,d,m,x,y,z) { const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m); o.position.set(x,y,z); scene.add(o); return o; }
    function C(rt,rb,h,s,m,x,y,z) { const o=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s),m); o.position.set(x,y,z); scene.add(o); return o; }

    // ─── LIGHTS ───────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x111122, 0.3));

    // Neon point lights (these cast the colored glow)
    function addLight(c, i, x, y, z, d=15) {
      const l = new THREE.PointLight(c, i, d);
      l.position.set(x, y, z);
      scene.add(l);
      return l;
    }
    addLight(0x00ddff, 3, -3.5, 5, 2);       // cyan sign
    addLight(0xff2288, 3, 3.8, 4, -2);        // pink sign
    addLight(0x8833ff, 2, -4, 3, -5);         // purple accent
    addLight(0xff8822, 1.5, 2, 2, 8);         // orange warm window
    addLight(0x22ff66, 1.5, -3, 2.5, -8);     // green sign far
    addLight(0xffcc22, 1, 0, 6, -3);          // overhead warm
    addLight(0xff2222, 1, 4, 1.5, 5);         // red low

    // ─── WET GROUND ───────────────────────────────────
    B(10, 0.05, 60, mGround, 0, 0, 0);

    // Puddles (slightly raised, more reflective)
    const mPuddle = new THREE.MeshPhongMaterial({ color: 0x0a0a18, shininess: 120, specular: 0x8899bb, transparent: true, opacity: 0.7 });
    B(2.5, 0.02, 3, mPuddle, -1.5, 0.03, 3);
    B(1.8, 0.02, 2.5, mPuddle, 2, 0.03, -4);
    B(3, 0.02, 2, mPuddle, 0.5, 0.03, -10);

    // ─── LEFT WALL BUILDINGS ──────────────────────────
    // Building 1 — tall, dark
    B(0.5, 12, 8, mWall, -5, 6, 0);
    B(0.5, 12, 10, mBrick, -5, 6, -10);
    B(0.5, 10, 6, mWallD, -5, 5, 8);
    B(0.5, 14, 8, mWall, -5, 7, -20);

    // Windows — left side (some lit, some dark)
    for (let z = -3; z <= 3; z += 2) {
      for (let y = 3; y <= 9; y += 2.5) {
        const lit = Math.random() > 0.5;
        B(0.06, 1, 0.8, lit ? mWindowLit : mWindow, -4.72, y, z);
      }
    }
    // More windows further down
    for (let z = -14; z <= -7; z += 2) {
      for (let y = 3; y <= 8; y += 2.5) {
        const lit = Math.random() > 0.6;
        B(0.06, 1, 0.8, lit ? mWindowLit : mWindow, -4.72, y, z);
      }
    }

    // Door on left
    B(0.08, 2.2, 1.2, mDoor, -4.72, 1.1, 5);
    B(0.06, 0.15, 1.3, mMetal, -4.72, 2.25, 5);  // door frame top

    // ─── RIGHT WALL BUILDINGS ─────────────────────────
    B(0.5, 10, 9, mBrick, 5, 5, 1);
    B(0.5, 14, 8, mWallD, 5, 7, -8);
    B(0.5, 8, 7, mWall, 5, 4, 9);
    B(0.5, 12, 10, mWall, 5, 6, -18);

    // Windows — right side
    for (let z = -2; z <= 4; z += 2.2) {
      for (let y = 3; y <= 8; y += 2.5) {
        const lit = Math.random() > 0.55;
        B(0.06, 1, 0.8, lit ? mWindowLit : mWindow, 4.72, y, z);
      }
    }
    for (let z = -12; z <= -5; z += 2) {
      for (let y = 2.5; y <= 10; y += 2.5) {
        const lit = Math.random() > 0.65;
        B(0.06, 1, 0.8, lit ? mWindowLit : mWindow, 4.72, y, z);
      }
    }

    // Door on right
    B(0.08, 2.5, 1.5, mDoor, 4.72, 1.25, -3);

    // ─── NEON SIGNS ───────────────────────────────────
    // Cyan horizontal sign (left wall)
    B(0.1, 0.2, 2.5, nCyan, -4.6, 5.5, 2);
    B(0.1, 0.2, 1.5, nCyan, -4.6, 5, 2.5);
    // Bracket
    B(0.6, 0.08, 0.08, mMetal, -4.3, 5.8, 1);
    B(0.6, 0.08, 0.08, mMetal, -4.3, 5.8, 3);

    // Pink vertical sign (right wall)
    B(0.1, 3, 0.2, nPink, 4.6, 4.5, -2);
    B(0.1, 0.2, 1.2, nPink, 4.6, 3, -2);
    // Bracket
    B(0.5, 0.08, 0.08, mMetal, 4.5, 6.2, -2);

    // Purple accent strip (left, far)
    B(0.1, 0.15, 3, nPurple, -4.6, 3.5, -6);

    // Green sign (left, far back)
    B(0.1, 0.8, 0.15, nGreen, -4.6, 3, -9);
    B(0.1, 0.8, 0.15, nGreen, -4.6, 3, -8.5);
    B(0.1, 0.15, 0.8, nGreen, -4.6, 3.4, -8.75);

    // Orange glow from a window (right)
    B(0.08, 1.2, 1, nOrange, 4.72, 2.5, 8);

    // Red cross sign (right, far)
    B(0.1, 1.5, 0.15, nRed, 4.6, 5, -10);
    B(0.1, 0.15, 1, nRed, 4.6, 5, -10);

    // ─── OVERHEAD CABLES/WIRES ────────────────────────
    for (let z = -8; z <= 6; z += 5) {
      B(10, 0.03, 0.03, mMetal, 0, 7 + Math.random(), z);
    }

    // ─── PIPES ON WALLS ───────────────────────────────
    // Left wall pipe
    C(0.08, 0.08, 10, 4, mPipe, -4.5, 5, -12);
    C(0.08, 0.08, 6, 4, mPipe, -4.5, 2, 7);

    // Right wall pipe vertical
    C(0.1, 0.1, 8, 4, mPipe, 4.4, 4, 5);
    // Horizontal section
    B(0.16, 0.16, 3, mPipe, 4.4, 1, 3.5);

    // ─── AC UNITS ─────────────────────────────────────
    B(0.6, 0.8, 1, mMetal, -4.5, 2, -2);
    B(0.6, 0.8, 1, mMetal, 4.5, 3.5, 6);

    // ─── DUMPSTER ─────────────────────────────────────
    B(1.2, 1, 1.5, new THREE.MeshPhongMaterial({ color: 0x1a3322, shininess: 15 }), 3.5, 0.5, 10);

    // ─── FIRE ESCAPE (left wall) ──────────────────────
    // Platforms
    B(1.5, 0.06, 2, mMetal, -4, 4, -15);
    B(1.5, 0.06, 2, mMetal, -4, 7, -15);
    // Railings
    B(0.04, 1, 2, mMetal, -3.3, 4.5, -15);
    B(0.04, 1, 2, mMetal, -3.3, 7.5, -15);
    // Ladder
    B(0.04, 3, 0.04, mMetal, -3.5, 5.5, -14.2);
    B(0.04, 3, 0.04, mMetal, -3.8, 5.5, -14.2);

    // ─── CRATES / BOXES ───────────────────────────────
    B(0.6, 0.6, 0.6, mConcrete, -3, 0.3, 6);
    B(0.5, 0.5, 0.5, mConcrete, -2.7, 0.85, 6.1);
    B(0.8, 0.4, 0.8, mConcrete, 3.5, 0.2, -6);

    // ─── HANGING LANTERN ──────────────────────────────
    B(0.03, 1, 0.03, mMetal, 0, 6.5, -3);
    const lantern = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 5, 4),
      nYellow
    );
    lantern.position.set(0, 5.8, -3);
    scene.add(lantern);
    addLight(0xffcc44, 1.5, 0, 5.5, -3, 8);

    // ─── RAIN PARTICLES ───────────────────────────────
    const rainCount = 600;
    const rainGeo = new THREE.BufferGeometry();
    const rainPos = new Float32Array(rainCount * 3);
    const rainVel = new Float32Array(rainCount);
    for (let i = 0; i < rainCount; i++) {
      rainPos[i*3] = (Math.random() - 0.5) * 12;
      rainPos[i*3+1] = Math.random() * 15;
      rainPos[i*3+2] = (Math.random() - 0.5) * 40;
      rainVel[i] = 0.15 + Math.random() * 0.15;
    }
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
    const rain = new THREE.Points(rainGeo, new THREE.PointsMaterial({
      color: 0x8899cc, size: 0.06, transparent: true, opacity: 0.5, sizeAttenuation: true,
    }));
    scene.add(rain);

    // ─── MIST / FOG PARTICLES ─────────────────────────
    const mistCount = 40;
    const mistGeo = new THREE.BufferGeometry();
    const mistPos = new Float32Array(mistCount * 3);
    for (let i = 0; i < mistCount; i++) {
      mistPos[i*3] = (Math.random() - 0.5) * 10;
      mistPos[i*3+1] = 0.3 + Math.random() * 1.5;
      mistPos[i*3+2] = (Math.random() - 0.5) * 30;
    }
    mistGeo.setAttribute('position', new THREE.BufferAttribute(mistPos, 3));
    const mist = new THREE.Points(mistGeo, new THREE.PointsMaterial({
      color: 0x556688, size: 0.8, transparent: true, opacity: 0.15, sizeAttenuation: true,
    }));
    scene.add(mist);

    // ─── GROUND REFLECTIONS (faked with neon strips on ground) ──
    // Cyan reflection
    B(1.5, 0.01, 3, neon(0x00ddff, 0.4), -2, 0.02, 2);
    // Pink reflection
    B(1, 0.01, 2.5, neon(0xff2288, 0.3), 2.5, 0.02, -2);
    // Purple reflection
    B(1.2, 0.01, 2, neon(0x8833ff, 0.25), -2, 0.02, -6);
    // Green reflection far
    B(1, 0.01, 2, neon(0x22ff66, 0.2), -1.5, 0.02, -9);

    // ─── ANIMATION ────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const t = clock.getElapsedTime();

      // Rain fall
      const rp = rain.geometry.attributes.position;
      for (let i = 0; i < rainCount; i++) {
        rp.array[i*3+1] -= rainVel[i];
        if (rp.array[i*3+1] < 0) {
          rp.array[i*3+1] = 12 + Math.random() * 3;
          rp.array[i*3] = (Math.random() - 0.5) * 12;
          rp.array[i*3+2] = (Math.random() - 0.5) * 40;
        }
      }
      rp.needsUpdate = true;

      // Mist drift
      const mp = mist.geometry.attributes.position;
      for (let i = 0; i < mistCount; i++) {
        mp.array[i*3] += Math.sin(t * 0.3 + i) * 0.003;
        mp.array[i*3+2] += 0.005;
        if (mp.array[i*3+2] > 15) mp.array[i*3+2] = -15;
      }
      mp.needsUpdate = true;

      // Neon flicker (subtle)
      nCyan.emissiveIntensity = 2.5 + Math.sin(t * 3) * 0.2;
      nPink.emissiveIntensity = 2.5 + Math.sin(t * 2.3 + 1) * 0.3;
      nGreen.emissiveIntensity = 2.5 + Math.sin(t * 4 + 2) * 0.2;
      // Occasional stronger flicker on purple
      nPurple.emissiveIntensity = 2.5 + (Math.sin(t * 8) > 0.9 ? 1.5 : 0);

      // Lantern sway
      lantern.position.x = Math.sin(t * 0.5) * 0.1;

      orbit.update();
      composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
      cam.aspect = window.innerWidth / window.innerHeight;
      cam.updateProjectionMatrix();
      R.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
