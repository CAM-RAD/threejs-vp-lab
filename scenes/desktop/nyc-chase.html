<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>NYC Chase — VP Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info { position: fixed; bottom: 14px; left: 14px; color: rgba(255,255,255,0.35); font-family: monospace; font-size: 11px; z-index: 10; pointer-events: none; }
    #controls { position: fixed; top: 14px; right: 14px; color: rgba(255,255,255,0.85); font-family: monospace; font-size: 11px; z-index: 10; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 4px; line-height: 2; display: none; }
    #controls label { display: block; }
    #controls input[type="range"] { width: 110px; vertical-align: middle; }
    #loader { position: fixed; inset: 0; background: #030308; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; font-family: monospace; color: #aaa; }
    #loader h1 { font-size: 28px; font-weight: 300; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; margin-bottom: 8px; }
    #loader .sub { font-size: 12px; color: #666; margin-bottom: 40px; letter-spacing: 0.1em; }
    #bar-wrap { width: 320px; height: 4px; background: #1a1a2a; border-radius: 2px; overflow: hidden; }
    #bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0055, #0088ff); transition: width 0.15s; }
    #load-text { margin-top: 16px; font-size: 11px; color: #555; }
    #skip-btn { margin-top: 24px; padding: 8px 24px; background: none; border: 1px solid #333; color: #666; font-family: monospace; font-size: 11px; cursor: pointer; border-radius: 3px; display: none; }
    #skip-btn:hover { border-color: #0088ff; color: #aaa; }
  </style>
</head>
<body>
  <div id="loader">
    <h1>NYC Chase</h1>
    <div class="sub">Virtual Production Lab &mdash; v3.0</div>
    <div id="bar-wrap"><div id="bar-fill"></div></div>
    <div id="load-text">Initializing...</div>
    <button id="skip-btn">SKIP &mdash; Start Scene</button>
  </div>
  <div id="info">NYC Chase — VP Lab v3.0</div>
  <div id="controls">
    <label>Rain <input type="range" id="rain" min="0" max="100" value="50"></label>
    <label>Neon <input type="range" id="neon" min="0" max="100" value="80"></label>
    <label>Speed <input type="range" id="spd" min="0" max="100" value="45"></label>
    <label>Exposure <input type="range" id="exposure" min="0" max="100" value="60"></label>
    <label>Moonlight <input type="range" id="moonlight" min="0" max="100" value="35"></label>
    <label>Police Lights <input type="range" id="policeInt" min="0" max="100" value="80"></label>
    <label><input type="checkbox" id="fly" checked> Chase Cam</label>
  </div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
  }}
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.7;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030308);
    scene.fog = new THREE.FogExp2(0x050510, 0.006);
    const clock = new THREE.Clock();
    const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.5, 1500);
    camera.position.set(3, 5, 40);
    const orbit = new OrbitControls(camera, renderer.domElement);
    orbit.enableDamping = true; orbit.target.set(0, 2, 0);

    function box(w,h,d,m){ return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m); }
    function cyl(rt,rb,h,s,m){ return new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s),m); }

    // ─── MATERIALS ────────────────────────────────────
    const M = {
      road:    new THREE.MeshStandardMaterial({ color: 0x0c0c10, roughness: 0.25, metalness: 0.05 }),
      sidewalk:new THREE.MeshStandardMaterial({ color: 0x3a3a38, roughness: 0.85 }),
      curb:    new THREE.MeshStandardMaterial({ color: 0x4a4a48, roughness: 0.8 }),
      lineW:   new THREE.MeshStandardMaterial({ color: 0xcccccc, emissive: 0x444444, emissiveIntensity: 0.4 }),
      lineY:   new THREE.MeshStandardMaterial({ color: 0xccaa00, emissive: 0x665500, emissiveIntensity: 0.4 }),
      brick1:  new THREE.MeshStandardMaterial({ color: 0x1a1520, roughness: 0.75 }),
      brick2:  new THREE.MeshStandardMaterial({ color: 0x2a1818, roughness: 0.8 }),
      brick3:  new THREE.MeshStandardMaterial({ color: 0x221a15, roughness: 0.78 }),
      glass:   new THREE.MeshStandardMaterial({ color: 0x0c1a30, roughness: 0.08, metalness: 0.6, transparent: true, opacity: 0.7 }),
      winLit:  new THREE.MeshStandardMaterial({ color: 0xffcc66, emissive: 0xffaa33, emissiveIntensity: 0.5 }),
      winCool: new THREE.MeshStandardMaterial({ color: 0x88bbff, emissive: 0x4477aa, emissiveIntensity: 0.3 }),
      metal:   new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.8 }),
      metalD:  new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5, metalness: 0.7 }),
      neonR:   new THREE.MeshStandardMaterial({ color: 0xff0033, emissive: 0xff0033, emissiveIntensity: 2.5 }),
      neonB:   new THREE.MeshStandardMaterial({ color: 0x0055ff, emissive: 0x0055ff, emissiveIntensity: 2.5 }),
      neonP:   new THREE.MeshStandardMaterial({ color: 0xff0088, emissive: 0xff0088, emissiveIntensity: 2.0 }),
      neonC:   new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 2.0 }),
      neonW:   new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1.2 }),
      steam:   new THREE.MeshStandardMaterial({ color: 0x999999, transparent: true, opacity: 0.12 }),
      puddle:  new THREE.MeshStandardMaterial({ color: 0x080810, roughness: 0.02, metalness: 0.6, transparent: true, opacity: 0.35 }),
      shopR:   new THREE.MeshStandardMaterial({ color: 0x661111, emissive: 0x331111, emissiveIntensity: 0.3 }),
      shopG:   new THREE.MeshStandardMaterial({ color: 0x115511, emissive: 0x113311, emissiveIntensity: 0.3 }),
      shopB:   new THREE.MeshStandardMaterial({ color: 0x111155, emissive: 0x111133, emissiveIntensity: 0.3 }),
      awnR:    new THREE.MeshStandardMaterial({ color: 0x881122, roughness: 0.9 }),
      awnG:    new THREE.MeshStandardMaterial({ color: 0x226633, roughness: 0.9 }),
    };

    // ─── ROAD ─────────────────────────────────────────
    const RL = 400;
    const roadMesh = box(24, 0.1, RL, M.road); roadMesh.position.set(0, 0, -RL/2+50); roadMesh.receiveShadow = true; scene.add(roadMesh);
    const reflect = box(24, 0.01, RL, M.puddle); reflect.position.set(0, 0.07, -RL/2+50); scene.add(reflect);

    // Road lines (solid long meshes, not dashes)
    for (const [x,m] of [[-0.25,M.lineY],[0.25,M.lineY],[-11.8,M.lineW],[11.8,M.lineW]]) {
      const l = box(0.12, 0.11, RL, m); l.position.set(x, 0.06, -RL/2+50); scene.add(l);
    }

    // Sidewalks & curbs
    for (const s of [-1, 1]) {
      const c = box(0.4, 0.25, RL, M.curb); c.position.set(s*12.2, 0.13, -RL/2+50); scene.add(c);
      const w = box(8, 0.15, RL, M.sidewalk); w.position.set(s*16.5, 0.08, -RL/2+50); w.receiveShadow = true; scene.add(w);
    }

    // ─── BUILDINGS (window STRIPS, not individual boxes) ──
    const bricks = [M.brick1, M.brick2, M.brick3];
    const shopMats = [M.shopR, M.shopG, M.shopB];

    function addBldg(x, z, w, d, h, mat) {
      const g = new THREE.Group();
      const dir = x > 0 ? -1 : 1;
      // Body
      const body = box(w, h, d, mat); body.position.y = h/2; body.castShadow = true; g.add(body);
      // Cornice
      g.add(Object.assign(box(w+0.3, 0.4, d+0.3, M.metal), {position: new THREE.Vector3(0, h, 0)}));
      // Storefront
      const sf = box(w+0.05, 4.5, d+0.05, shopMats[~~(Math.random()*3)]); sf.position.y = 2.25; g.add(sf);
      // Store window
      const sw = box(w*0.7, 2.5, 0.1, Math.random()>0.3 ? M.winLit : M.winCool);
      sw.position.set(0, 2.5, dir*(d/2+0.06)); g.add(sw);
      // Awning
      const aw = box(w*0.75, 0.08, 1.8, Math.random()>0.5 ? M.awnR : M.awnG);
      aw.position.set(0, 4.5, dir*(d/2+0.9)); g.add(aw);
      // Window strips (1 per ~14 floor-units)
      for (let s = 0; s < Math.floor((h-5)/14); s++) {
        const wm = Math.random()>0.5 ? M.winLit : Math.random()>0.4 ? M.winCool : M.glass;
        const ws = box(w*0.75, 10, 0.08, wm);
        ws.position.set(0, 10+s*14, dir*(d/2+0.04)); g.add(ws);
      }
      // Water tower
      if (h > 40 && Math.random() > 0.6) {
        const tk = cyl(1.3, 1.3, 2.2, 6, M.metal); tk.position.set(w*0.2, h+2.5, 0); g.add(tk);
      }
      g.position.set(x, 0, z); scene.add(g);
    }

    // ~14 buildings per side
    for (let z = -RL+50; z < 50; z += 25+Math.random()*8) {
      addBldg(-21-5-Math.random()*3, z, 13+Math.random()*7, 10+Math.random()*4, 25+Math.random()*60, bricks[~~(Math.random()*3)]);
    }
    for (let z = -RL+55; z < 50; z += 23+Math.random()*10) {
      addBldg(21+5+Math.random()*3, z, 12+Math.random()*8, 9+Math.random()*5, 20+Math.random()*65, bricks[~~(Math.random()*3)]);
    }
    // Glass towers (back)
    for (let z = -RL+80; z < 30; z += 70+Math.random()*30) {
      const h = 80+Math.random()*100;
      const t1 = box(16,h,12,M.glass); t1.position.set(-50,h/2,z); t1.castShadow=true; scene.add(t1);
      const t2 = box(16,h*0.85,12,M.glass); t2.position.set(50,h*0.85/2,z+20); t2.castShadow=true; scene.add(t2);
    }

    // ─── STREETLIGHTS (PointLight) ────────────────────
    for (let z = -RL+60; z < 50; z += 40) {
      const p1 = cyl(0.12,0.15,9,6,M.metal); p1.position.set(-13,4.5,z); scene.add(p1);
      const b1 = box(0.8,0.06,0.3,M.neonW); b1.position.set(-11,8.7,z); scene.add(b1);
      scene.add(Object.assign(new THREE.PointLight(0xffeebb,2.5,22,2),{position:new THREE.Vector3(-11,8.5,z)}));
      const p2 = cyl(0.12,0.15,9,6,M.metal); p2.position.set(13,4.5,z+20); scene.add(p2);
      const b2 = box(0.8,0.06,0.3,M.neonW); b2.position.set(11,8.7,z+20); scene.add(b2);
      scene.add(Object.assign(new THREE.PointLight(0xffeebb,2.5,22,2),{position:new THREE.Vector3(11,8.5,z+20)}));
    }

    // ─── NEON SIGNS ───────────────────────────────────
    const neonMats = [M.neonR, M.neonB, M.neonP, M.neonC];
    const neonLights = [];
    for (let z = -RL+70; z < 40; z += 55+Math.random()*25) {
      const m1 = neonMats[~~(Math.random()*4)];
      const s1 = box(3+Math.random()*3, 1+Math.random(), 0.08, m1); s1.position.set(-20.5, 10+Math.random()*12, z); scene.add(s1);
      const g1 = new THREE.PointLight(m1.emissive.getHex(),1.5,15,2); g1.position.set(-19.5,s1.position.y,z); scene.add(g1); neonLights.push(g1);
      const m2 = neonMats[~~(Math.random()*4)];
      const s2 = box(3+Math.random()*4, 1+Math.random()*1.5, 0.08, m2); s2.position.set(20.5, 8+Math.random()*15, z+25); s2.rotation.y=Math.PI; scene.add(s2);
      const g2 = new THREE.PointLight(m2.emissive.getHex(),1.5,15,2); g2.position.set(19.5,s2.position.y,z+25); scene.add(g2); neonLights.push(g2);
    }

    // ─── EFFECTS ──────────────────────────────────────
    const steamVents = [];
    for (const sz of [-50, -180, -300]) {
      const v = cyl(0.25,0.25,0.3,6,M.metal); v.position.set(-6+Math.random()*12,0.15,sz); scene.add(v);
      const s = cyl(0.6,0.08,3,5,M.steam); s.position.set(v.position.x,2,sz); scene.add(s); steamVents.push(s);
    }
    for (let z = -RL+80; z < 40; z += 60+Math.random()*40) {
      const p = new THREE.Mesh(new THREE.CircleGeometry(1.5+Math.random()*2,12),M.puddle);
      p.rotation.x=-Math.PI/2; p.position.set((Math.random()-0.5)*16,0.07,z); scene.add(p);
    }

    // ─── LIGHTS ───────────────────────────────────────
    const pL1R = new THREE.PointLight(0xff0000,8,35,2); pL1R.position.set(-4,2.2,25); scene.add(pL1R);
    const pL1B = new THREE.PointLight(0x0044ff,8,35,2); pL1B.position.set(-4,2.2,25); scene.add(pL1B);
    const pL2R = new THREE.PointLight(0xff0000,6,30,2); pL2R.position.set(5,2.2,40); scene.add(pL2R);
    const pL2B = new THREE.PointLight(0x0044ff,6,30,2); pL2B.position.set(5,2.2,40); scene.add(pL2B);
    scene.add(Object.assign(new THREE.PointLight(0xffeedd,4,40,2),{position:new THREE.Vector3(2,0.8,-7)}));
    scene.add(Object.assign(new THREE.PointLight(0xffeedd,4,40,2),{position:new THREE.Vector3(4,0.8,-7)}));
    scene.add(new THREE.AmbientLight(0x1a1a33, 0.4));
    scene.add(new THREE.HemisphereLight(0x151530, 0x050508, 0.25));
    const moon = new THREE.DirectionalLight(0x334466, 0.4);
    moon.position.set(30,80,50); moon.castShadow=true;
    moon.shadow.mapSize.set(1024,1024);
    moon.shadow.camera.left=-50; moon.shadow.camera.right=50; moon.shadow.camera.top=50; moon.shadow.camera.bottom=-50;
    moon.shadow.camera.far=200; moon.shadow.bias=-0.001; scene.add(moon);

    // ─── RAIN (4000) ──────────────────────────────────
    const RC = 4000;
    const rainGeo = new THREE.BufferGeometry();
    const rp = new Float32Array(RC*3), rv = new Float32Array(RC);
    for (let i=0; i<RC; i++) { rp[i*3]=(Math.random()-0.5)*80; rp[i*3+1]=Math.random()*50; rp[i*3+2]=Math.random()*RL-RL+50; rv[i]=0.6+Math.random(); }
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rp,3));
    const rainMat = new THREE.PointsMaterial({color:0x8888bb, size:0.08, transparent:true, opacity:0.5});
    scene.add(new THREE.Points(rainGeo, rainMat));

    // ─── PRELOADER (15 models) ────────────────────────
    const gltfLoader = new GLTFLoader();
    const AB = '../../assets/nyc/';
    const barFill = document.getElementById('bar-fill');
    const loadText = document.getElementById('load-text');
    const FILES = [
      'police-car.glb','sports-car.glb','taxi.glb','sedan.glb','car.glb',
      'car2.glb','garbage-truck.glb','motorcycle.glb','traffic-light.glb',
      'hydrant.glb','dumpster.glb','bench.glb','trash-can.glb',
      'stop-sign.glb','traffic-cone.glb',
    ];
    const cache = {};
    let ld = 0;

    function preloadAll() {
      return new Promise(resolve => {
        const total = FILES.length;
        let done = false;
        const finish = () => { if(!done){done=true;resolve();} };
        setTimeout(() => document.getElementById('skip-btn').style.display='inline-block', 3000);
        document.getElementById('skip-btn').addEventListener('click', finish);
        setTimeout(finish, 8000);
        FILES.forEach(f => {
          gltfLoader.load(AB+f, g => {
            cache[f]=g.scene; ld++;
            barFill.style.width=(ld/total*100)+'%';
            loadText.textContent=`Loaded ${ld}/${total}`;
            if(ld>=total) finish();
          }, undefined, () => {
            ld++; barFill.style.width=(ld/total*100)+'%';
            loadText.textContent=`Loaded ${ld}/${total}`;
            if(ld>=total) finish();
          });
        });
      });
    }

    function place(f,x,y,z,h,ry) {
      if(!cache[f]) return;
      const m = cache[f].clone();
      const bb = new THREE.Box3().setFromObject(m);
      const sz = new THREE.Vector3(); bb.getSize(sz);
      m.scale.setScalar(h/Math.max(sz.y,0.01));
      const bb2 = new THREE.Box3().setFromObject(m);
      m.position.set(x, y-bb2.min.y, z);
      m.rotation.y = ry||0;
      m.traverse(c => { if(c.isMesh){c.castShadow=true;c.receiveShadow=true;} });
      scene.add(m);
    }

    // ─── CONTROLS ─────────────────────────────────────
    const rainSlider=document.getElementById('rain'), neonSlider=document.getElementById('neon');
    const spdSlider=document.getElementById('spd'), expSlider=document.getElementById('exposure');
    const moonSlider=document.getElementById('moonlight'), policeSlider=document.getElementById('policeInt');
    const flyCheck=document.getElementById('fly');
    let chaseZ=35;

    function animate() {
      requestAnimationFrame(animate);
      const dt=clock.getDelta(), t=clock.getElapsedTime(), speed=parseFloat(spdSlider.value)/100;
      renderer.toneMappingExposure = 0.3+parseFloat(expSlider.value)/100*0.8;
      moon.intensity = parseFloat(moonSlider.value)/100*1.2;
      const pInt=parseFloat(policeSlider.value)/100, flash=Math.sin(t*14);
      pL1R.intensity=(flash>0?10:0)*pInt; pL1B.intensity=(flash>0?0:10)*pInt;
      pL2R.intensity=(flash>0.15?8:0)*pInt; pL2B.intensity=(flash>0.15?0:8)*pInt;
      const ri=parseFloat(rainSlider.value)/100;
      rainMat.opacity=ri*0.55;
      const pos=rainGeo.attributes.position.array;
      for(let i=0;i<RC;i++){pos[i*3+1]-=rv[i]*(1+speed);if(pos[i*3+1]<0){pos[i*3+1]=40+Math.random()*10;pos[i*3]=(Math.random()-0.5)*80;}}
      rainGeo.attributes.position.needsUpdate=true;
      reflect.material.opacity=ri*0.35;
      const ni=parseFloat(neonSlider.value)/100;
      M.neonR.emissiveIntensity=1+ni*2.5; M.neonB.emissiveIntensity=1+ni*2.5;
      M.neonP.emissiveIntensity=1+ni*2.5; M.neonC.emissiveIntensity=1+ni*2.5;
      for(const n of neonLights) n.intensity=1+ni*2;
      for(const s of steamVents){s.scale.x=0.7+Math.sin(t*3+s.position.x)*0.4;s.scale.z=0.7+Math.cos(t*2.5)*0.4;s.material.opacity=0.08+Math.sin(t*2)*0.04;}
      if(flyCheck.checked){chaseZ-=dt*16*(0.4+speed);if(chaseZ<-RL+80)chaseZ=35;camera.position.set(3+Math.sin(t*0.4)*2.5,3.5+Math.sin(t*0.6)*1.5,chaseZ+18);orbit.target.set(0,1.5,chaseZ-8);}
      orbit.update(); renderer.render(scene,camera);
    }

    // ─── START ────────────────────────────────────────
    preloadAll().then(() => {
      loadText.textContent='Placing assets...';
      place('sports-car.glb',3,0.05,-5,1.4,Math.PI);
      place('police-car.glb',-4,0.05,25,1.5,Math.PI);
      place('police-car.glb',5,0.05,40,1.5,Math.PI);
      place('taxi.glb',-9,0.05,-40,1.5,0);
      place('sedan.glb',-3,0.05,-80,1.5,0);
      place('car.glb',-8,0.05,-140,1.4,0);
      place('car2.glb',-4,0.05,-200,1.5,0);
      place('taxi.glb',-9,0.05,-270,1.5,0);
      place('garbage-truck.glb',7,0.05,-50,2.8,Math.PI);
      place('car2.glb',4,0.05,-100,1.5,Math.PI);
      place('sedan.glb',8,0.05,-160,1.5,Math.PI);
      place('taxi.glb',3,0.05,-230,1.5,Math.PI);
      place('car.glb',7,0.05,-300,1.4,Math.PI);
      place('motorcycle.glb',1,0.05,-15,1.2,Math.PI+0.2);
      place('sedan.glb',-14,0.15,-30,1.5,Math.PI/2);
      place('car2.glb',14,0.15,-70,1.5,-Math.PI/2);
      place('taxi.glb',-14,0.15,-130,1.5,Math.PI/2);
      place('car.glb',14,0.15,-190,1.5,-Math.PI/2);
      place('traffic-light.glb',-13,0.15,-20,5,0);
      place('traffic-light.glb',13,0.15,-140,5,Math.PI);
      place('traffic-light.glb',-13,0.15,-260,5,0);
      place('hydrant.glb',-14.5,0.15,-60,0.7,0);
      place('hydrant.glb',14.5,0.15,-180,0.7,0);
      place('dumpster.glb',-19,0.15,-90,1.5,0.3);
      place('dumpster.glb',19,0.15,-210,1.5,-0.2);
      place('bench.glb',-15.5,0.15,-40,0.9,Math.PI/2);
      place('bench.glb',15.5,0.15,-160,0.9,-Math.PI/2);
      place('trash-can.glb',-13.5,0.15,-110,1.0,0);
      place('trash-can.glb',13.5,0.15,-250,1.0,0);
      place('stop-sign.glb',-13.5,0.15,-100,2.5,0);
      place('stop-sign.glb',13.5,0.15,-220,2.5,Math.PI);
      for(let i=0;i<6;i++) place('traffic-cone.glb',-8+i*2.2,0.05,-290+(Math.random()-0.5)*2,0.7,Math.random()*0.3);

      document.getElementById('loader').style.display='none';
      document.getElementById('controls').style.display='block';
      animate();
    });

    window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
  </script>
</body>
</html>
