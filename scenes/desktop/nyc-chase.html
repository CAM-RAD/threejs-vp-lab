<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>NYC Chase — VP Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info { position: fixed; bottom: 14px; left: 14px; color: rgba(255,255,255,0.35); font-family: monospace; font-size: 11px; z-index: 10; pointer-events: none; }
    #controls { position: fixed; top: 14px; right: 14px; color: rgba(255,255,255,0.85); font-family: monospace; font-size: 11px; z-index: 10; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 4px; line-height: 2; display: none; }
    #controls label { display: block; }
    #controls input[type="range"] { width: 110px; vertical-align: middle; }
    #loader { position: fixed; inset: 0; background: #030308; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; font-family: monospace; color: #aaa; }
    #loader h1 { font-size: 28px; font-weight: 300; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; margin-bottom: 8px; }
    #loader .sub { font-size: 12px; color: #666; margin-bottom: 40px; letter-spacing: 0.1em; }
    #bar-wrap { width: 320px; height: 4px; background: #1a1a2a; border-radius: 2px; overflow: hidden; }
    #bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0055, #0088ff); transition: width 0.15s; }
    #load-text { margin-top: 16px; font-size: 11px; color: #555; }
    #skip-btn { margin-top: 24px; padding: 8px 24px; background: none; border: 1px solid #333; color: #666; font-family: monospace; font-size: 11px; cursor: pointer; border-radius: 3px; display: none; }
    #skip-btn:hover { border-color: #0088ff; color: #aaa; }
  </style>
</head>
<body>
  <div id="loader">
    <h1>NYC Chase</h1>
    <div class="sub">Virtual Production Lab &mdash; v4.3</div>
    <div id="bar-wrap"><div id="bar-fill"></div></div>
    <div id="load-text">Initializing...</div>
    <button id="skip-btn">SKIP &mdash; Start Scene</button>
  </div>
  <div id="info">NYC Chase — VP Lab v4.3</div>
  <div id="controls">
    <label>Time of Day <input type="range" id="tod" min="0" max="100" value="15"></label>
    <label>Rain <input type="range" id="rain" min="0" max="100" value="50"></label>
    <label>Neon <input type="range" id="neon" min="0" max="100" value="80"></label>
    <label>Speed <input type="range" id="spd" min="0" max="100" value="45"></label>
    <label>Exposure <input type="range" id="exposure" min="0" max="100" value="65"></label>
    <label>Bloom <input type="range" id="bloom" min="0" max="100" value="50"></label>
    <label>Police Lights <input type="range" id="policeInt" min="0" max="100" value="80"></label>
    <label><input type="checkbox" id="fly" checked> Chase Cam</label>
  </div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
  }}
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';
    import { Reflector } from 'three/addons/objects/Reflector.js';

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.85;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030308);
    scene.fog = new THREE.FogExp2(0x050510, 0.006);
    const clock = new THREE.Clock();
    const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.5, 1500);
    camera.position.set(3, 5, 40);
    const orbit = new OrbitControls(camera, renderer.domElement);
    orbit.enableDamping = true; orbit.target.set(0, 2, 0);

    // ─── POST-PROCESSING (industry standard) ─────────
    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    // Bloom — makes lights glow and bleed (Unreal-style)
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.0,   // strength
      0.5,   // radius
      0.6    // threshold (lower = more things glow)
    );
    composer.addPass(bloomPass);

    // FXAA anti-aliasing (post-process AA, works with composer)
    const fxaaPass = new ShaderPass(FXAAShader);
    fxaaPass.uniforms['resolution'].value.set(1 / window.innerWidth, 1 / window.innerHeight);
    composer.addPass(fxaaPass);

    // Vignette shader (cinematic darkened edges)
    const vignetteShader = {
      uniforms: { tDiffuse: { value: null }, darkness: { value: 1.2 }, offset: { value: 1.0 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader: `uniform sampler2D tDiffuse; uniform float darkness; uniform float offset;
        varying vec2 vUv;
        void main(){
          vec4 c=texture2D(tDiffuse,vUv);
          vec2 uv=(vUv-vec2(0.5))*vec2(offset);
          gl_FragColor=vec4(mix(c.rgb,c.rgb*c.rgb,darkness*dot(uv,uv)),c.a);
        }`
    };
    const vignettePass = new ShaderPass(vignetteShader);
    composer.addPass(vignettePass);

    // Chromatic aberration (subtle, cinematic)
    const chromaticShader = {
      uniforms: { tDiffuse: { value: null }, amount: { value: 0.0015 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader: `uniform sampler2D tDiffuse; uniform float amount;
        varying vec2 vUv;
        void main(){
          vec2 dir=vUv-vec2(0.5);
          float d=length(dir);
          float r=texture2D(tDiffuse,vUv+dir*amount*d).r;
          float g=texture2D(tDiffuse,vUv).g;
          float b=texture2D(tDiffuse,vUv-dir*amount*d).b;
          gl_FragColor=vec4(r,g,b,1.0);
        }`
    };
    const chromaticPass = new ShaderPass(chromaticShader);
    composer.addPass(chromaticPass);

    // Film grain (subtle, cinematic texture)
    const grainShader = {
      uniforms: { tDiffuse: { value: null }, time: { value: 0 }, amount: { value: 0.06 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader: `uniform sampler2D tDiffuse; uniform float time; uniform float amount;
        varying vec2 vUv;
        float rand(vec2 co){ return fract(sin(dot(co,vec2(12.9898,78.233)))*43758.5453); }
        void main(){
          vec4 c=texture2D(tDiffuse,vUv);
          float grain=rand(vUv*time)*amount;
          gl_FragColor=vec4(c.rgb+grain-amount*0.5,c.a);
        }`
    };
    const grainPass = new ShaderPass(grainShader);
    composer.addPass(grainPass);

    function box(w,h,d,m){ return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m); }
    function cyl(rt,rb,h,s,m){ return new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s),m); }

    // ─── MATERIALS ────────────────────────────────────
    const M = {
      road:    new THREE.MeshStandardMaterial({ color: 0x181820, roughness: 0.2, metalness: 0.08 }),
      sidewalk:new THREE.MeshStandardMaterial({ color: 0x444442, roughness: 0.75 }),
      curb:    new THREE.MeshStandardMaterial({ color: 0x4a4a48, roughness: 0.8 }),
      lineW:   new THREE.MeshStandardMaterial({ color: 0xcccccc, emissive: 0x444444, emissiveIntensity: 0.4 }),
      lineY:   new THREE.MeshStandardMaterial({ color: 0xccaa00, emissive: 0x665500, emissiveIntensity: 0.4 }),
      brick1:  new THREE.MeshStandardMaterial({ color: 0x1a1520, roughness: 0.75 }),
      brick2:  new THREE.MeshStandardMaterial({ color: 0x2a1818, roughness: 0.8 }),
      brick3:  new THREE.MeshStandardMaterial({ color: 0x221a15, roughness: 0.78 }),
      glass:   new THREE.MeshStandardMaterial({ color: 0x0c1a30, roughness: 0.08, metalness: 0.6, transparent: true, opacity: 0.7 }),
      winLit:  new THREE.MeshStandardMaterial({ color: 0xffcc66, emissive: 0xffaa33, emissiveIntensity: 0.5 }),
      winCool: new THREE.MeshStandardMaterial({ color: 0x88bbff, emissive: 0x4477aa, emissiveIntensity: 0.3 }),
      metal:   new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.8 }),
      metalD:  new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5, metalness: 0.7 }),
      neonR:   new THREE.MeshStandardMaterial({ color: 0xff0033, emissive: 0xff0033, emissiveIntensity: 2.5 }),
      neonB:   new THREE.MeshStandardMaterial({ color: 0x0055ff, emissive: 0x0055ff, emissiveIntensity: 2.5 }),
      neonP:   new THREE.MeshStandardMaterial({ color: 0xff0088, emissive: 0xff0088, emissiveIntensity: 2.0 }),
      neonC:   new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 2.0 }),
      neonW:   new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1.2 }),
      steam:   new THREE.MeshStandardMaterial({ color: 0x999999, transparent: true, opacity: 0.12 }),
      puddle:  new THREE.MeshStandardMaterial({ color: 0x101018, roughness: 0.01, metalness: 0.7, transparent: true, opacity: 0.45 }),
      shopR:   new THREE.MeshStandardMaterial({ color: 0x661111, emissive: 0x331111, emissiveIntensity: 0.3 }),
      shopG:   new THREE.MeshStandardMaterial({ color: 0x115511, emissive: 0x113311, emissiveIntensity: 0.3 }),
      shopB:   new THREE.MeshStandardMaterial({ color: 0x111155, emissive: 0x111133, emissiveIntensity: 0.3 }),
      awnR:    new THREE.MeshStandardMaterial({ color: 0x881122, roughness: 0.9 }),
      awnG:    new THREE.MeshStandardMaterial({ color: 0x226633, roughness: 0.9 }),
    };

    // ─── ROAD ─────────────────────────────────────────
    const RL = 400;
    const roadMesh = box(24, 0.1, RL, M.road); roadMesh.position.set(0, 0, -RL/2+50); roadMesh.receiveShadow = true; scene.add(roadMesh);

    // Wet road reflection — subtle, not mirror-like
    // Low-res Reflector (256px) + very low opacity = diffused wet look
    const reflectorGeo = new THREE.PlaneGeometry(24, RL);
    const reflector = new Reflector(reflectorGeo, {
      clipBias: 0.003,
      textureWidth: 256,
      textureHeight: 256,
      color: 0x060608,
    });
    reflector.rotation.x = -Math.PI / 2;
    reflector.position.set(0, 0.08, -RL / 2 + 50);
    reflector.material.transparent = true;
    reflector.material.opacity = 0.12;
    scene.add(reflector);

    // Road lines (solid long meshes, not dashes)
    for (const [x,m] of [[-0.25,M.lineY],[0.25,M.lineY],[-11.8,M.lineW],[11.8,M.lineW]]) {
      const l = box(0.12, 0.11, RL, m); l.position.set(x, 0.06, -RL/2+50); scene.add(l);
    }

    // Sidewalks & curbs
    for (const s of [-1, 1]) {
      const c = box(0.4, 0.25, RL, M.curb); c.position.set(s*12.2, 0.13, -RL/2+50); scene.add(c);
      const w = box(8, 0.15, RL, M.sidewalk); w.position.set(s*16.5, 0.08, -RL/2+50); w.receiveShadow = true; scene.add(w);
    }

    // ─── WINDOW TEXTURE GENERATOR ──────────────────────
    function makeWindowTex(cols, rows, litRatio) {
      const cv = document.createElement('canvas');
      const cw = cols * 8, ch = rows * 8;
      cv.width = cw; cv.height = ch;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#0a0a12'; ctx.fillRect(0, 0, cw, ch);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const rnd = Math.random();
          if (rnd < litRatio) {
            ctx.fillStyle = rnd < litRatio * 0.6 ? '#ffcc66' : '#88bbff';
          } else {
            ctx.fillStyle = '#111118';
          }
          ctx.fillRect(c * 8 + 1, r * 8 + 1, 6, 5);
        }
      }
      const tex = new THREE.CanvasTexture(cv);
      tex.magFilter = THREE.NearestFilter;
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    // ─── BUILDINGS (textured facades, setbacks) ───────
    const shopMats = [M.shopR, M.shopG, M.shopB];

    function addBldg(x, z, w, d, h) {
      const g = new THREE.Group();
      const dir = x > 0 ? -1 : 1;
      const cols = Math.max(3, ~~(w / 2.5));
      const rows = Math.max(3, ~~(h / 3.5));

      // Facade material with window texture
      const winTex = makeWindowTex(cols, rows, 0.45 + Math.random() * 0.2);
      const facadeMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a22, map: winTex, emissive: 0xffffff, emissiveMap: winTex, emissiveIntensity: 0.4,
        roughness: 0.75,
      });

      // Main tower
      const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), facadeMat);
      body.position.y = h / 2; body.castShadow = true; g.add(body);

      // Setback (shorter top section on tall buildings)
      if (h > 40 && Math.random() > 0.4) {
        const sh = h * (0.3 + Math.random() * 0.2);
        const sw2 = w * 0.65, sd2 = d * 0.65;
        const winTex2 = makeWindowTex(~~(sw2/2.5), ~~(sh/3.5), 0.5);
        const setMat = new THREE.MeshStandardMaterial({
          color: 0x181825, map: winTex2, emissive: 0xffffff, emissiveMap: winTex2, emissiveIntensity: 0.35,
          roughness: 0.7,
        });
        const setback = new THREE.Mesh(new THREE.BoxGeometry(sw2, sh, sd2), setMat);
        setback.position.y = h + sh / 2; setback.castShadow = true; g.add(setback);
        // Antenna/spire on some
        if (Math.random() > 0.6) {
          const ant = cyl(0.1, 0.05, 8 + Math.random() * 10, 4, M.metal);
          ant.position.y = h + sh + 5; g.add(ant);
        }
      }

      // Cornice
      const corn = box(w + 0.3, 0.5, d + 0.3, M.metal); corn.position.y = h; g.add(corn);

      // Storefront
      const sf = box(w + 0.05, 4.5, d + 0.05, shopMats[~~(Math.random() * 3)]); sf.position.y = 2.25; g.add(sf);
      // Store window
      const swin = box(w * 0.7, 2.5, 0.1, Math.random() > 0.3 ? M.winLit : M.winCool);
      swin.position.set(0, 2.5, dir * (d / 2 + 0.06)); g.add(swin);
      // Awning
      const aw = box(w * 0.75, 0.08, 1.8, Math.random() > 0.5 ? M.awnR : M.awnG);
      aw.position.set(0, 4.5, dir * (d / 2 + 0.9)); g.add(aw);

      g.position.set(x, 0, z); scene.add(g);
    }

    // ~13 buildings per side
    for (let z = -RL + 50; z < 50; z += 26 + Math.random() * 8) {
      addBldg(-21 - 5 - Math.random() * 3, z, 13 + Math.random() * 7, 10 + Math.random() * 4, 25 + Math.random() * 65);
    }
    for (let z = -RL + 55; z < 50; z += 24 + Math.random() * 10) {
      addBldg(21 + 5 + Math.random() * 3, z, 12 + Math.random() * 8, 9 + Math.random() * 5, 20 + Math.random() * 70);
    }
    // Glass towers (back row)
    for (let z = -RL + 80; z < 30; z += 70 + Math.random() * 30) {
      const th = 80 + Math.random() * 100;
      const t1 = box(16, th, 12, M.glass); t1.position.set(-50, th / 2, z); t1.castShadow = true; scene.add(t1);
      const t2 = box(16, th * 0.85, 12, M.glass); t2.position.set(50, th * 0.85 / 2, z + 20); t2.castShadow = true; scene.add(t2);
    }

    // ─── STREETLIGHTS (brighter, wider range) ──────────
    for (let z = -RL+60; z < 50; z += 35) {
      // Left side
      const p1 = cyl(0.12,0.15,9,6,M.metal); p1.position.set(-13,4.5,z); scene.add(p1);
      const b1 = box(0.8,0.06,0.3,M.neonW); b1.position.set(-11,8.7,z); scene.add(b1);
      const sl1 = new THREE.PointLight(0xffeebb,6,40,1.5); sl1.position.set(-11,8.5,z); scene.add(sl1);
      // Light pool on ground (warm bounce)
      const glow1 = new THREE.PointLight(0xffddaa,2,15,2); glow1.position.set(-8,0.5,z); scene.add(glow1);
      // Right side (offset)
      const p2 = cyl(0.12,0.15,9,6,M.metal); p2.position.set(13,4.5,z+17); scene.add(p2);
      const b2 = box(0.8,0.06,0.3,M.neonW); b2.position.set(11,8.7,z+17); scene.add(b2);
      const sl2 = new THREE.PointLight(0xffeebb,6,40,1.5); sl2.position.set(11,8.5,z+17); scene.add(sl2);
      const glow2 = new THREE.PointLight(0xffddaa,2,15,2); glow2.position.set(8,0.5,z+17); scene.add(glow2);
    }

    // ─── NEON SIGNS ───────────────────────────────────
    const neonMats = [M.neonR, M.neonB, M.neonP, M.neonC];
    const neonLights = [];
    for (let z = -RL+70; z < 40; z += 55+Math.random()*25) {
      const m1 = neonMats[~~(Math.random()*4)];
      const s1 = box(3+Math.random()*3, 1+Math.random(), 0.08, m1); s1.position.set(-20.5, 10+Math.random()*12, z); scene.add(s1);
      const g1 = new THREE.PointLight(m1.emissive.getHex(),3,25,2); g1.position.set(-19.5,s1.position.y,z); scene.add(g1); neonLights.push(g1);
      const m2 = neonMats[~~(Math.random()*4)];
      const s2 = box(3+Math.random()*4, 1+Math.random()*1.5, 0.08, m2); s2.position.set(20.5, 8+Math.random()*15, z+25); s2.rotation.y=Math.PI; scene.add(s2);
      const g2 = new THREE.PointLight(m2.emissive.getHex(),3,25,2); g2.position.set(19.5,s2.position.y,z+25); scene.add(g2); neonLights.push(g2);
    }

    // ─── EFFECTS ──────────────────────────────────────
    const steamVents = [];
    for (const sz of [-50, -180, -300]) {
      const v = cyl(0.25,0.25,0.3,6,M.metal); v.position.set(-6+Math.random()*12,0.15,sz); scene.add(v);
      const s = cyl(0.6,0.08,3,5,M.steam); s.position.set(v.position.x,2,sz); scene.add(s); steamVents.push(s);
    }
    for (let z = -RL+80; z < 40; z += 60+Math.random()*40) {
      const p = new THREE.Mesh(new THREE.CircleGeometry(1.5+Math.random()*2,12),M.puddle);
      p.rotation.x=-Math.PI/2; p.position.set((Math.random()-0.5)*16,0.07,z); scene.add(p);
    }

    // ─── LIGHTS ───────────────────────────────────────
    // Police lights — matched to cruiser positions (z=15, z=22, z=35)
    const pL1R = new THREE.PointLight(0xff0000,8,35,2); pL1R.position.set(-3,2.2,15); scene.add(pL1R);
    const pL1B = new THREE.PointLight(0x0044ff,8,35,2); pL1B.position.set(-3,2.2,15); scene.add(pL1B);
    const pL2R = new THREE.PointLight(0xff0000,6,30,2); pL2R.position.set(5,2.2,22); scene.add(pL2R);
    const pL2B = new THREE.PointLight(0x0044ff,6,30,2); pL2B.position.set(5,2.2,22); scene.add(pL2B);
    const pL3R = new THREE.PointLight(0xff0000,5,25,2); pL3R.position.set(0,2.2,35); scene.add(pL3R);
    const pL3B = new THREE.PointLight(0x0044ff,5,25,2); pL3B.position.set(0,2.2,35); scene.add(pL3B);
    const hl1 = new THREE.PointLight(0xffeedd,8,60,1.5); hl1.position.set(2,0.8,3); scene.add(hl1);
    const hl2 = new THREE.PointLight(0xffeedd,8,60,1.5); hl2.position.set(4,0.8,3); scene.add(hl2);
    scene.add(new THREE.AmbientLight(0x222244, 0.6));
    scene.add(new THREE.HemisphereLight(0x1a1a35, 0x0a0a10, 0.4));
    const moon = new THREE.DirectionalLight(0x334466, 0.4);
    moon.position.set(30,80,50); moon.castShadow=true;
    moon.shadow.mapSize.set(1024,1024);
    moon.shadow.camera.left=-50; moon.shadow.camera.right=50; moon.shadow.camera.top=50; moon.shadow.camera.bottom=-50;
    moon.shadow.camera.far=200; moon.shadow.bias=-0.001; scene.add(moon);

    // ─── RAIN (4000) ──────────────────────────────────
    const RC = 4000;
    const rainGeo = new THREE.BufferGeometry();
    const rp = new Float32Array(RC*3), rv = new Float32Array(RC);
    for (let i=0; i<RC; i++) { rp[i*3]=(Math.random()-0.5)*80; rp[i*3+1]=Math.random()*50; rp[i*3+2]=Math.random()*RL-RL+50; rv[i]=0.6+Math.random(); }
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rp,3));
    const rainMat = new THREE.PointsMaterial({color:0x8888bb, size:0.08, transparent:true, opacity:0.5});
    scene.add(new THREE.Points(rainGeo, rainMat));

    // ─── PRELOADER (15 models) ────────────────────────
    const gltfLoader = new GLTFLoader();
    const AB = '../../assets/nyc/';
    const barFill = document.getElementById('bar-fill');
    const loadText = document.getElementById('load-text');
    const FILES = [
      'charger-police.glb','sports-car.glb','yellow-cab.glb','blue-sedan.glb',
      'tahoe.glb','kitsune-car.glb','peugeot-rally.glb','smashing-taxi.glb',
      'garbage-truck.glb','motorcycle.glb','bus.glb',
      'traffic-light.glb','hydrant.glb','dumpster.glb','bench.glb',
      'trash-can.glb','stop-sign.glb','traffic-cone.glb',
    ];
    const cache = {};
    let ld = 0;

    function preloadAll() {
      return new Promise(resolve => {
        const total = FILES.length;
        let done = false;
        const finish = () => { if(!done){done=true;resolve();} };
        setTimeout(() => document.getElementById('skip-btn').style.display='inline-block', 3000);
        document.getElementById('skip-btn').addEventListener('click', finish);
        setTimeout(finish, 8000);
        FILES.forEach(f => {
          gltfLoader.load(AB+f, g => {
            cache[f]=g.scene; ld++;
            barFill.style.width=(ld/total*100)+'%';
            loadText.textContent=`Loaded ${ld}/${total}`;
            if(ld>=total) finish();
          }, undefined, () => {
            ld++; barFill.style.width=(ld/total*100)+'%';
            loadText.textContent=`Loaded ${ld}/${total}`;
            if(ld>=total) finish();
          });
        });
      });
    }

    function place(f,x,y,z,h,ry) {
      if(!cache[f]) return;
      const m = cache[f].clone();
      const bb = new THREE.Box3().setFromObject(m);
      const sz = new THREE.Vector3(); bb.getSize(sz);
      // Auto-detect: if model is wider (X) than long (Z), it faces sideways — correct by 90°
      let correction = 0;
      if (sz.x > sz.z * 1.3) correction = Math.PI / 2;
      m.scale.setScalar(h/Math.max(sz.y,0.01));
      const bb2 = new THREE.Box3().setFromObject(m);
      m.position.set(x, y-bb2.min.y, z);
      m.rotation.y = (ry||0) + correction;
      m.traverse(c => { if(c.isMesh){c.castShadow=true;c.receiveShadow=true;} });
      scene.add(m);
    }

    // ─── CONTROLS ─────────────────────────────────────
    const todSlider=document.getElementById('tod');
    const rainSlider=document.getElementById('rain'), neonSlider=document.getElementById('neon');
    const spdSlider=document.getElementById('spd'), expSlider=document.getElementById('exposure');
    const policeSlider=document.getElementById('policeInt');
    const flyCheck=document.getElementById('fly');
    let chaseZ=45;

    // Sky gradient
    const skyCV = document.createElement('canvas'); skyCV.width=2; skyCV.height=256;
    const skyCtx = skyCV.getContext('2d');
    function lerpC(a,b,t){
      const p=c=>[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];
      const[ar,ag,ab]=p(a),[br,bg,bb]=p(b);
      const r=~~(ar+(br-ar)*t),g=~~(ag+(bg-ag)*t),bl=~~(ab+(bb-ab)*t);
      return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${bl.toString(16).padStart(2,'0')}`;
    }
    function updateSky(tod) {
      const t = tod/100;
      const grad = skyCtx.createLinearGradient(0,0,0,256);
      if (t < 0.3) { // Night
        grad.addColorStop(0,'#020208'); grad.addColorStop(0.7,'#050510'); grad.addColorStop(1,'#0a0a18');
      } else if (t < 0.55) { // Dawn
        const f=(t-0.3)/0.25;
        grad.addColorStop(0,lerpC('#020208','#1a1535',f));
        grad.addColorStop(0.5,lerpC('#050510','#4a2040',f));
        grad.addColorStop(1,lerpC('#0a0a18','#cc5522',f));
      } else if (t < 0.75) { // Golden
        const f=(t-0.55)/0.2;
        grad.addColorStop(0,lerpC('#1a1535','#4477aa',f));
        grad.addColorStop(0.5,lerpC('#4a2040','#88aacc',f));
        grad.addColorStop(1,lerpC('#cc5522','#ddeeff',f));
      } else { // Day
        const f=(t-0.75)/0.25;
        grad.addColorStop(0,lerpC('#4477aa','#6699cc',f));
        grad.addColorStop(0.5,lerpC('#88aacc','#aaccee',f));
        grad.addColorStop(1,lerpC('#ddeeff','#eef4ff',f));
      }
      skyCtx.fillStyle=grad; skyCtx.fillRect(0,0,2,256);
      if (!scene.background || scene.background.isColor) scene.background = new THREE.CanvasTexture(skyCV);
      else scene.background.needsUpdate = true;
      const px = skyCtx.getImageData(0,200,1,1).data;
      scene.fog.color.setRGB(px[0]/255,px[1]/255,px[2]/255);
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt=clock.getDelta(), t=clock.getElapsedTime(), speed=parseFloat(spdSlider.value)/100;

      // Time of day — natural lighting transitions
      const tod = parseFloat(todSlider.value);
      updateSky(tod);
      const dayF = Math.max(0, (tod - 30) / 70); // 0=night, 1=day
      const nightF = 1 - dayF;
      const expBase = parseFloat(expSlider.value) / 100;

      // Exposure: dark at night, brighter in day
      renderer.toneMappingExposure = 0.5 + expBase * 0.5 + dayF * 0.4;

      // Sun/moon: cool blue at night → warm white at day, intensity ramps up
      moon.intensity = 0.15 + dayF * 2.0;
      moon.color.setRGB(
        0.2 + dayF * 0.8,   // R: blueish → warm
        0.25 + dayF * 0.7,  // G
        0.35 + dayF * 0.55  // B: blue tint at night
      );
      // Sun position shifts higher during day
      moon.position.set(30 + dayF * 40, 30 + dayF * 80, 50);

      // Ambient: dark blue at night → neutral warm at day
      scene.children.forEach(c => {
        if (c.isAmbientLight) {
          c.intensity = 0.2 + dayF * 0.6;
          c.color.setRGB(0.1 + dayF * 0.4, 0.1 + dayF * 0.38, 0.15 + dayF * 0.35);
        }
        if (c.isHemisphereLight) {
          c.intensity = 0.15 + dayF * 0.5;
        }
      });

      // Fog density: thicker at night, thinner at day
      scene.fog.density = 0.007 - dayF * 0.003;

      // Window emissive: bright at night, dim during day
      M.winLit.emissiveIntensity = 0.1 + nightF * 0.5;
      M.winCool.emissiveIntensity = 0.05 + nightF * 0.3;

      // Police lights
      const pInt = parseFloat(policeSlider.value) / 100, flash = Math.sin(t * 14);
      pL1R.intensity = (flash > 0 ? 10 : 0) * pInt;
      pL1B.intensity = (flash > 0 ? 0 : 10) * pInt;
      pL2R.intensity = (flash > 0.15 ? 8 : 0) * pInt;
      pL2B.intensity = (flash > 0.15 ? 0 : 8) * pInt;
      pL3R.intensity = (flash > -0.1 ? 7 : 0) * pInt;
      pL3B.intensity = (flash > -0.1 ? 0 : 7) * pInt;

      // Rain
      const ri = parseFloat(rainSlider.value) / 100;
      rainMat.opacity = ri * 0.55;
      const pos = rainGeo.attributes.position.array;
      for (let i = 0; i < RC; i++) {
        pos[i * 3 + 1] -= rv[i] * (1 + speed);
        if (pos[i * 3 + 1] < 0) { pos[i * 3 + 1] = 40 + Math.random() * 10; pos[i * 3] = (Math.random() - 0.5) * 80; }
      }
      rainGeo.attributes.position.needsUpdate = true;
      reflector.material.opacity = 0.05 + ri * 0.15;

      // Neon: auto-dim during day, full at night
      const ni = parseFloat(neonSlider.value) / 100;
      const neonF = ni * (0.3 + nightF * 0.7); // dims to 30% in full daylight
      M.neonR.emissiveIntensity = 0.5 + neonF * 2.5;
      M.neonB.emissiveIntensity = 0.5 + neonF * 2.5;
      M.neonP.emissiveIntensity = 0.5 + neonF * 2.0;
      M.neonC.emissiveIntensity = 0.5 + neonF * 2.0;
      for (const n of neonLights) n.intensity = 0.3 + neonF * 2;
      for(const s of steamVents){s.scale.x=0.7+Math.sin(t*3+s.position.x)*0.4;s.scale.z=0.7+Math.cos(t*2.5)*0.4;s.material.opacity=0.08+Math.sin(t*2)*0.04;}
      if(flyCheck.checked){chaseZ-=dt*16*(0.4+speed);if(chaseZ<-RL+80)chaseZ=45;camera.position.set(3+Math.sin(t*0.4)*2.5,3.5+Math.sin(t*0.6)*1.5,chaseZ+18);orbit.target.set(0,1.5,chaseZ-8);}
      // Film grain time
      grainPass.uniforms.time.value = t;

      // Bloom control
      const bloomVal = parseFloat(document.getElementById('bloom').value) / 100;
      bloomPass.strength = bloomVal * 1.6;
      bloomPass.threshold = 0.7 + (1 - bloomVal) * 0.25;

      orbit.update();
      composer.render();
    }

    // ─── START ────────────────────────────────────────
    preloadAll().then(() => {
      loadText.textContent='Placing assets...';
      // === THE CHASE (camera follows this group) ===
      // Lead car being chased
      place('sports-car.glb',3,0.05,5,1.4,Math.PI);
      // Police in hot pursuit — RIGHT BEHIND the lead
      place('charger-police.glb',-3,0.05,15,1.5,Math.PI);
      place('charger-police.glb',5,0.05,22,1.5,Math.PI);
      // Third cruiser further back
      place('charger-police.glb',0,0.05,35,1.5,Math.PI);
      // Motorcycle weaving through
      place('motorcycle.glb',1,0.05,10,1.2,Math.PI+0.15);

      // === ONCOMING TRAFFIC (toward camera, left lanes) ===
      place('yellow-cab.glb',-9,0.05,-20,1.5,0);
      place('blue-sedan.glb',-3,0.05,-55,1.5,0);
      place('kitsune-car.glb',-8,0.05,-90,1.4,0);
      place('smashing-taxi.glb',-4,0.05,-125,1.5,0);
      place('yellow-cab.glb',-9,0.05,-165,1.5,0);
      place('blue-sedan.glb',-3,0.05,-210,1.5,0);
      place('kitsune-car.glb',-8,0.05,-255,1.4,0);
      place('smashing-taxi.glb',-4,0.05,-300,1.5,0);

      // === SAME DIRECTION TRAFFIC (right lanes, ahead of chase) ===
      place('garbage-truck.glb',7,0.05,-30,2.8,Math.PI);
      place('tahoe.glb',4,0.05,-65,1.6,Math.PI);
      place('yellow-cab.glb',8,0.05,-105,1.5,Math.PI);
      place('peugeot-rally.glb',4,0.05,-145,1.4,Math.PI);
      place('bus.glb',8,0.05,-190,2.8,Math.PI);
      place('blue-sedan.glb',4,0.05,-235,1.5,Math.PI);
      place('tahoe.glb',7,0.05,-280,1.6,Math.PI);
      place('smashing-taxi.glb',4,0.05,-320,1.5,Math.PI);

      // === PARKED CARS (both sides, lots of them) ===
      place('blue-sedan.glb',-14,0.15,10,1.5,Math.PI/2);
      place('tahoe.glb',14,0.15,-10,1.6,-Math.PI/2);
      place('smashing-taxi.glb',-14,0.15,-40,1.5,Math.PI/2);
      place('kitsune-car.glb',14,0.15,-75,1.4,-Math.PI/2);
      place('yellow-cab.glb',-14,0.15,-110,1.5,Math.PI/2);
      place('peugeot-rally.glb',14,0.15,-150,1.4,-Math.PI/2);
      place('blue-sedan.glb',-14,0.15,-185,1.5,Math.PI/2);
      place('tahoe.glb',14,0.15,-225,1.6,-Math.PI/2);
      place('kitsune-car.glb',-14,0.15,-265,1.4,Math.PI/2);
      place('smashing-taxi.glb',14,0.15,-310,1.5,-Math.PI/2);
      place('traffic-light.glb',-13,0.15,-20,5,0);
      place('traffic-light.glb',13,0.15,-140,5,Math.PI);
      place('traffic-light.glb',-13,0.15,-260,5,0);
      place('hydrant.glb',-14.5,0.15,-60,0.7,0);
      place('hydrant.glb',14.5,0.15,-180,0.7,0);
      place('dumpster.glb',-19,0.15,-90,1.5,0.3);
      place('dumpster.glb',19,0.15,-210,1.5,-0.2);
      place('bench.glb',-15.5,0.15,-40,0.9,Math.PI/2);
      place('bench.glb',15.5,0.15,-160,0.9,-Math.PI/2);
      place('trash-can.glb',-13.5,0.15,-110,1.0,0);
      place('trash-can.glb',13.5,0.15,-250,1.0,0);
      place('stop-sign.glb',-13.5,0.15,-100,2.5,0);
      place('stop-sign.glb',13.5,0.15,-220,2.5,Math.PI);
      for(let i=0;i<6;i++) place('traffic-cone.glb',-8+i*2.2,0.05,-290+(Math.random()-0.5)*2,0.7,Math.random()*0.3);

      document.getElementById('loader').style.display='none';
      document.getElementById('controls').style.display='block';
      animate();
    });

    window.addEventListener('resize',()=>{
      camera.aspect=window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth,window.innerHeight);
      composer.setSize(window.innerWidth,window.innerHeight);
      fxaaPass.uniforms['resolution'].value.set(1/window.innerWidth,1/window.innerHeight);
      bloomPass.resolution.set(window.innerWidth,window.innerHeight);
    });
  </script>
</body>
</html>
