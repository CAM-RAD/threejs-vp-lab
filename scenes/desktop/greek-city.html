<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ancient Greek City — VP Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: fixed; bottom: 16px; left: 16px;
      color: rgba(255,255,255,0.5); font-family: monospace; font-size: 11px;
      z-index: 10; pointer-events: none;
    }
    #controls {
      position: fixed; top: 16px; right: 16px;
      color: rgba(255,255,255,0.85); font-family: monospace; font-size: 11px;
      z-index: 10; background: rgba(0,0,0,0.55); padding: 12px;
      border-radius: 4px; line-height: 2;
    }
    #controls label { display: block; }
    #controls input[type="range"] { width: 120px; vertical-align: middle; }
  </style>
</head>
<body>
  <div id="info">Ancient Greek City — VP Lab v0.4</div>
  <div id="controls">
    <label>Time of Day <input type="range" id="tod" min="0" max="100" value="65"></label>
    <label>Wave Size <input type="range" id="waves" min="0" max="100" value="35"></label>
    <label>Speed <input type="range" id="spd" min="0" max="100" value="25"></label>
    <label><input type="checkbox" id="fly" checked> Flythrough</label>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Water } from 'three/addons/objects/Water.js';

    // ─── RENDERER ─────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.8;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ACCD);
    scene.fog = new THREE.Fog(0x87ACCD, 300, 900);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 2000);
    camera.position.set(-80, 50, 150);

    const orbit = new OrbitControls(camera, renderer.domElement);
    orbit.enableDamping = true;
    orbit.target.set(0, 8, 0);

    // ─── LIGHTS ───────────────────────────────────────
    const sun = new THREE.DirectionalLight(0xffeedd, 2.0);
    sun.position.set(150, 200, 100);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.left = -200; sun.shadow.camera.right = 200;
    sun.shadow.camera.top = 200; sun.shadow.camera.bottom = -200;
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x99aabb, 0.5));
    scene.add(new THREE.HemisphereLight(0x88bbdd, 0x886633, 0.4));

    // ─── MATERIALS ────────────────────────────────────
    const M = {
      marble: new THREE.MeshLambertMaterial({ color: 0xeee8d5 }),
      aged: new THREE.MeshLambertMaterial({ color: 0xd8cfb0 }),
      stone: new THREE.MeshLambertMaterial({ color: 0xb8a88a }),
      terra: new THREE.MeshLambertMaterial({ color: 0xc45a3c }),
      wood: new THREE.MeshLambertMaterial({ color: 0x5c3a1e }),
      sand: new THREE.MeshLambertMaterial({ color: 0xd4c5a0 }),
      grass: new THREE.MeshLambertMaterial({ color: 0x7a9050 }),
      dark: new THREE.MeshLambertMaterial({ color: 0x221100 }),
      awning: new THREE.MeshLambertMaterial({ color: 0xc9a86c }),
      path: new THREE.MeshLambertMaterial({ color: 0xcabb95 }),
      water_f: new THREE.MeshLambertMaterial({ color: 0x3388aa, transparent: true, opacity: 0.7 }),
      cypress: new THREE.MeshLambertMaterial({ color: 0x1a3a1a }),
      trunk: new THREE.MeshLambertMaterial({ color: 0x553311 }),
    };

    // ─── GROUND ───────────────────────────────────────
    // City platform
    const platform = new THREE.Mesh(new THREE.BoxGeometry(320, 3, 320), M.sand);
    platform.position.set(0, -1.5, 20); platform.receiveShadow = true;
    scene.add(platform);
    // Grass surround
    const grass = new THREE.Mesh(new THREE.BoxGeometry(500, 2, 500), M.grass);
    grass.position.set(0, -3.5, 20); grass.receiveShadow = true;
    scene.add(grass);
    // Beach ramp to water
    const beachGeo = new THREE.PlaneGeometry(350, 100, 1, 1);
    beachGeo.rotateX(-Math.PI / 2);
    const bv = beachGeo.attributes.position;
    bv.setY(0, 0); bv.setY(1, 0); bv.setY(2, -6); bv.setY(3, -6);
    beachGeo.computeVertexNormals();
    const beach = new THREE.Mesh(beachGeo, new THREE.MeshLambertMaterial({ color: 0xd4bf8a }));
    beach.position.set(0, -2, -115); beach.receiveShadow = true;
    scene.add(beach);

    // ─── WATER ────────────────────────────────────────
    const water = new Water(new THREE.PlaneGeometry(5000, 5000), {
      textureWidth: 256, textureHeight: 256,
      waterNormals: new THREE.TextureLoader().load(
        'https://cdn.jsdelivr.net/npm/three@0.172.0/examples/textures/waternormals.jpg',
        t => { t.wrapS = t.wrapT = THREE.RepeatWrapping; }
      ),
      sunDirection: new THREE.Vector3(0.5, 0.8, 0.3).normalize(),
      sunColor: 0xffffff, waterColor: 0x001e4d, distortionScale: 3, fog: true,
    });
    water.rotation.x = -Math.PI / 2;
    water.position.set(0, -6, -300);
    scene.add(water);

    // ─── COLUMN ───────────────────────────────────────
    function col(h=14, r=1) {
      const g = new THREE.Group();
      const base = new THREE.Mesh(new THREE.CylinderGeometry(r*1.5, r*1.5, 1, 8), M.marble);
      base.position.y = 0.5; base.castShadow = true; g.add(base);
      const shaft = new THREE.Mesh(new THREE.CylinderGeometry(r*0.85, r, h, 8), M.marble);
      shaft.position.y = h/2+1; shaft.castShadow = true; g.add(shaft);
      const cap = new THREE.Mesh(new THREE.CylinderGeometry(r*1.6, r*0.9, 1.8, 8), M.marble);
      cap.position.y = h+1; cap.castShadow = true; g.add(cap);
      return g;
    }

    // ─── TEMPLE ───────────────────────────────────────
    function temple(w, d, ch, cr, cs) {
      const g = new THREE.Group();
      // Steps
      for (let s=0; s<3; s++) {
        const st = new THREE.Mesh(new THREE.BoxGeometry(w+6-s*2, 0.8, d+6-s*2), M.aged);
        st.position.y = s*0.8+0.4; st.castShadow = true; st.receiveShadow = true; g.add(st);
      }
      const b = 2.4;
      // Columns
      const hw = w/2-1, hd = d/2-1;
      for (let cx=-hw; cx<=hw+0.1; cx+=cs) {
        const c1=col(ch,cr); c1.position.set(cx,b,-hd); g.add(c1);
        const c2=col(ch,cr); c2.position.set(cx,b,hd); g.add(c2);
      }
      for (let cz=-hd+cs; cz<hd; cz+=cs) {
        const c1=col(ch,cr); c1.position.set(-hw,b,cz); g.add(c1);
        const c2=col(ch,cr); c2.position.set(hw,b,cz); g.add(c2);
      }
      // Beam
      const beam = new THREE.Mesh(new THREE.BoxGeometry(w+2, 1.5, d+2), M.marble);
      beam.position.y = b+ch+1.8; beam.castShadow = true; g.add(beam);
      // Roof (simple box — no ExtrudeGeometry to avoid mobile issues)
      const roof = new THREE.Mesh(new THREE.BoxGeometry(w+4, 3, d+4), M.terra);
      roof.position.y = b+ch+4; roof.castShadow = true; g.add(roof);
      // Ridge line
      const ridge = new THREE.Mesh(new THREE.BoxGeometry(4, 5, d+6), M.terra);
      ridge.position.y = b+ch+6; ridge.castShadow = true; g.add(ridge);
      // Cella
      const cella = new THREE.Mesh(new THREE.BoxGeometry(w-8, ch-2, d-8), M.aged);
      cella.position.y = b+(ch-2)/2+1; cella.castShadow = true; g.add(cella);
      return g;
    }

    // ─── PLACE TEMPLES ────────────────────────────────
    // Acropolis mound
    const mound = new THREE.Mesh(new THREE.CylinderGeometry(50, 65, 14, 8), M.stone);
    mound.position.set(0, 7, 130); mound.receiveShadow = true;
    scene.add(mound);
    // Steps up
    for (let s=0; s<10; s++) {
      const st = new THREE.Mesh(new THREE.BoxGeometry(12, 1, 2.5), M.aged);
      st.position.set(0, s*1.3+0.5, 108+s*2); st.castShadow = true;
      scene.add(st);
    }
    // Main temple
    const t1 = temple(32, 52, 15, 1.2, 5.5);
    t1.position.set(0, 14, 130); scene.add(t1);
    // Temple B
    const t2 = temple(16, 26, 10, 0.8, 4.5);
    t2.position.set(-95, 0, 40); scene.add(t2);
    // Temple C
    const t3 = temple(18, 30, 11, 0.9, 5);
    t3.position.set(85, 0, -15); scene.add(t3);

    // ─── AGORA ────────────────────────────────────────
    const agora = new THREE.Mesh(new THREE.BoxGeometry(120, 0.3, 80), M.path);
    agora.position.set(-5, 0.15, 5); agora.receiveShadow = true;
    scene.add(agora);

    // ─── SHOPS ────────────────────────────────────────
    function shop(x, z, r=0) {
      const g = new THREE.Group();
      const wall = new THREE.Mesh(new THREE.BoxGeometry(7, 5, 8), M.stone);
      wall.position.y = 2.5; wall.castShadow = true; g.add(wall);
      const rf = new THREE.Mesh(new THREE.BoxGeometry(8, 0.3, 9), M.terra);
      rf.position.y = 5.15; rf.castShadow = true; g.add(rf);
      const aw = new THREE.Mesh(new THREE.BoxGeometry(8, 0.15, 3), M.awning);
      aw.position.set(0, 4, -5.2); aw.rotation.x = 0.2; g.add(aw);
      for (const sx of [-3, 3]) {
        const p = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 3.5, 4), M.wood);
        p.position.set(sx, 2.2, -6.5); g.add(p);
      }
      const ct = new THREE.Mesh(new THREE.BoxGeometry(7, 0.6, 1.5), M.wood);
      ct.position.set(0, 1.8, -4.8); g.add(ct);
      for (let j=-2; j<=2; j+=1.3) {
        const jar = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.35, 1, 6), M.terra);
        jar.position.set(j, 2.6, -4.8); g.add(jar);
      }
      const door = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 3.2), M.dark);
      door.position.set(0, 1.6, -4.05); g.add(door);
      g.position.set(x, 0, z); g.rotation.y = r;
      return g;
    }

    // Left row
    for (let i=0; i<5; i++) scene.add(shop(-58, -22+i*16, 0));
    // Right row
    for (let i=0; i<5; i++) scene.add(shop(48, -22+i*16, Math.PI));
    // Back row
    for (let i=0; i<3; i++) scene.add(shop(-28+i*22, -30, Math.PI/2));

    // ─── STOA ─────────────────────────────────────────
    const stoaFloor = new THREE.Mesh(new THREE.BoxGeometry(7, 0.8, 80), M.aged);
    stoaFloor.position.set(-68, 0.4, 5); stoaFloor.receiveShadow = true; scene.add(stoaFloor);
    for (let cz=-28; cz<=45; cz+=4.5) {
      const c = col(8, 0.6); c.position.set(-68, 0.8, cz); scene.add(c);
    }
    const stoaRoof = new THREE.Mesh(new THREE.BoxGeometry(9, 0.5, 82), M.terra);
    stoaRoof.position.set(-68, 10.3, 5); stoaRoof.castShadow = true; scene.add(stoaRoof);
    const stoaWall = new THREE.Mesh(new THREE.BoxGeometry(0.8, 9, 80), M.stone);
    stoaWall.position.set(-72, 5.3, 5); scene.add(stoaWall);

    // ─── FOUNTAIN ─────────────────────────────────────
    const fb = new THREE.Mesh(new THREE.CylinderGeometry(4.5, 5.5, 1.5, 10), M.marble);
    fb.position.set(-5, 0.75, 5); fb.castShadow = true; scene.add(fb);
    const fw = new THREE.Mesh(new THREE.CylinderGeometry(3.5, 3.5, 0.3, 10), M.water_f);
    fw.position.set(-5, 1.7, 5); scene.add(fw);
    const fp = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 3.5, 6), M.marble);
    fp.position.set(-5, 3.5, 5); scene.add(fp);

    // ─── DOCK ─────────────────────────────────────────
    const dock = new THREE.Mesh(new THREE.BoxGeometry(60, 1.2, 8), M.wood);
    dock.position.set(0, -4.5, -85); dock.castShadow = true; scene.add(dock);
    const dockArm = new THREE.Mesh(new THREE.BoxGeometry(8, 1.2, 25), M.wood);
    dockArm.position.set(-20, -4.5, -102); scene.add(dockArm);
    for (let dx=-25; dx<=25; dx+=10) {
      const p = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 6, 5), M.wood);
      p.position.set(dx, -6.5, -85); scene.add(p);
    }

    // ─── PATHS ────────────────────────────────────────
    const p1 = new THREE.Mesh(new THREE.BoxGeometry(8, 0.2, 55), M.path);
    p1.position.set(0, 0.1, -42); p1.receiveShadow = true; scene.add(p1);
    const p2 = new THREE.Mesh(new THREE.BoxGeometry(12, 0.2, 70), M.path);
    p2.position.set(0, 0.1, 70); p2.receiveShadow = true; scene.add(p2);

    // ─── CYPRESS TREES ────────────────────────────────
    const coneGeo = new THREE.ConeGeometry(2, 14, 5);
    const trkGeo = new THREE.CylinderGeometry(0.3, 0.5, 3, 4);
    const trees = new THREE.InstancedMesh(coneGeo, M.cypress, 100);
    const trunks = new THREE.InstancedMesh(trkGeo, M.trunk, 100);
    const dm = new THREE.Object3D();
    let ti = 0;
    for (let i=0; i<400 && ti<100; i++) {
      const x = (Math.random()-0.5)*400;
      const z = (Math.random()-0.3)*350;
      if (Math.abs(x)<70 && Math.abs(z-10)<50) continue; // skip agora
      if (Math.sqrt(x*x+(z-130)**2)<60) continue; // skip acropolis
      if (z < -60) continue; // skip water
      const sc = 0.5+Math.random()*0.6;
      dm.position.set(x, 7*sc, z); dm.scale.set(sc, sc, sc);
      dm.rotation.y = Math.random()*6.28; dm.updateMatrix();
      trees.setMatrixAt(ti, dm.matrix);
      dm.position.y = 1.5*sc; dm.updateMatrix();
      trunks.setMatrixAt(ti, dm.matrix);
      ti++;
    }
    trees.count = ti; trunks.count = ti;
    trees.castShadow = true;
    scene.add(trees); scene.add(trunks);

    // ─── MOUNTAINS ────────────────────────────────────
    for (let i=0; i<7; i++) {
      const mh = 50+Math.random()*90;
      const mw = 60+Math.random()*80;
      const mt = new THREE.Mesh(
        new THREE.ConeGeometry(mw, mh, 4+Math.floor(Math.random()*3)),
        new THREE.MeshLambertMaterial({ color: new THREE.Color().setHSL(0.25, 0.15, 0.32+Math.random()*0.12) })
      );
      mt.position.set(-250+i*85+Math.random()*30, mh/2-8, 300+Math.random()*120);
      mt.rotation.y = Math.random()*3.14; scene.add(mt);
      if (mh > 90) {
        const cap = new THREE.Mesh(new THREE.ConeGeometry(mw*0.35, mh*0.2, 4), new THREE.MeshLambertMaterial({ color: 0xeeeef5 }));
        cap.position.set(mt.position.x, mh*0.65, mt.position.z); scene.add(cap);
      }
    }

    // ─── FLYTHROUGH ───────────────────────────────────
    const flyPts = [
      new THREE.Vector3(-70, 12, -100),
      new THREE.Vector3(-15, 8, -60),
      new THREE.Vector3(10, 10, -15),
      new THREE.Vector3(-10, 14, 15),
      new THREE.Vector3(-40, 16, 40),
      new THREE.Vector3(-15, 28, 85),
      new THREE.Vector3(10, 42, 125),
      new THREE.Vector3(55, 40, 90),
      new THREE.Vector3(100, 30, 20),
      new THREE.Vector3(70, 15, -50),
      new THREE.Vector3(-70, 12, -100),
    ];
    const flyCurve = new THREE.CatmullRomCurve3(flyPts, true);
    let flyT = 0;

    // ─── CONTROLS ─────────────────────────────────────
    const todEl = document.getElementById('tod');
    const wavesEl = document.getElementById('waves');
    const spdEl = document.getElementById('spd');
    const flyEl = document.getElementById('fly');

    // ─── LOOP ─────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      // Water
      water.material.uniforms['time'].value += dt * (0.2 + (wavesEl.value/100)*0.6);
      water.material.uniforms['distortionScale'].value = 1 + (wavesEl.value/100)*5;

      // Time of day
      const tod = todEl.value / 100;
      sun.position.set(150, 50 + tod * 350, 100);
      sun.intensity = 0.8 + tod * 1.5;
      renderer.toneMappingExposure = 0.3 + tod * 0.6;
      const sky = new THREE.Color().setHSL(0.58, 0.3 + tod*0.3, 0.35 + tod*0.4);
      scene.background = sky;
      scene.fog.color = sky;

      // Camera
      if (flyEl.checked) {
        flyT = (flyT + 0.00005 + (spdEl.value/100)*0.0003) % 1;
        const p = flyCurve.getPointAt(flyT);
        const l = flyCurve.getPointAt((flyT+0.025)%1);
        camera.position.copy(p);
        camera.lookAt(l.x, l.y-2, l.z);
      } else {
        orbit.update();
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
