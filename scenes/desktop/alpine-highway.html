<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpine Highway — Three.js VP Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: rgba(255,255,255,0.6);
      font-family: monospace;
      font-size: 12px;
      z-index: 10;
      pointer-events: none;
    }
    #controls {
      position: fixed;
      top: 20px;
      right: 20px;
      color: rgba(255,255,255,0.8);
      font-family: monospace;
      font-size: 11px;
      z-index: 10;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 4px;
      line-height: 1.8;
    }
    #controls label { display: block; margin-bottom: 4px; }
    #controls input[type="range"] { width: 140px; vertical-align: middle; }
  </style>
</head>
<body>
  <div id="info">Alpine Highway — VP Lab v0.1</div>
  <div id="controls">
    <label>Sun Height <input type="range" id="sunHeight" min="0" max="100" value="30"></label>
    <label>Fog Density <input type="range" id="fogDensity" min="0" max="100" value="40"></label>
    <label>Camera Speed <input type="range" id="camSpeed" min="0" max="100" value="30"></label>
    <label><input type="checkbox" id="autoFly" checked> Auto Fly</label>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─── SCENE SETUP ──────────────────────────────────
    const scene = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.8;
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000);
    camera.position.set(0, 120, 300);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2.1;

    // ─── FOG ──────────────────────────────────────────
    scene.fog = new THREE.FogExp2(0x8899bb, 0.0008);
    scene.background = new THREE.Color(0x8899bb);

    // ─── LIGHTING ─────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0x6688aa, 0.4);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffeedd, 1.8);
    sunLight.position.set(200, 300, 100);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    sunLight.shadow.camera.left = -500;
    sunLight.shadow.camera.right = 500;
    sunLight.shadow.camera.top = 500;
    sunLight.shadow.camera.bottom = -500;
    sunLight.shadow.camera.far = 1500;
    scene.add(sunLight);

    const hemiLight = new THREE.HemisphereLight(0x88aacc, 0x445522, 0.5);
    scene.add(hemiLight);

    // ─── TERRAIN ──────────────────────────────────────
    // Simplex-like noise using sin combinations
    function noise(x, z) {
      return Math.sin(x * 0.008) * Math.cos(z * 0.006) * 80
        + Math.sin(x * 0.015 + 1.3) * Math.cos(z * 0.012 + 0.7) * 40
        + Math.sin(x * 0.04 + 2.1) * Math.cos(z * 0.035 + 1.5) * 15
        + Math.sin(x * 0.08) * Math.cos(z * 0.07) * 5;
    }

    // Valley carving function
    function valleyCarve(x, z) {
      // Road follows a winding path along z-axis
      const roadCenterX = Math.sin(z * 0.005) * 150 + Math.sin(z * 0.002) * 80;
      const distFromRoad = Math.abs(x - roadCenterX);
      const valleyWidth = 60;
      const valleyDepth = 50;
      if (distFromRoad < valleyWidth) {
        return -valleyDepth * (1 - distFromRoad / valleyWidth) * (1 - distFromRoad / valleyWidth);
      }
      return 0;
    }

    function getTerrainHeight(x, z) {
      return noise(x, z) + valleyCarve(x, z) + 20;
    }

    const terrainSize = 2000;
    const terrainRes = 256;
    const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainRes, terrainRes);
    terrainGeo.rotateX(-Math.PI / 2);

    const positions = terrainGeo.attributes.position;
    const colors = new Float32Array(positions.count * 3);

    for (let i = 0; i < positions.count; i++) {
      const x = positions.getX(i);
      const z = positions.getZ(i);
      const y = getTerrainHeight(x, z);
      positions.setY(i, y);

      // Color by height — snow on peaks, green on slopes, dark in valley
      const snowLine = 90;
      const treeLine = 40;
      if (y > snowLine) {
        // Snow
        const t = Math.min((y - snowLine) / 40, 1);
        colors[i * 3] = 0.85 + t * 0.15;
        colors[i * 3 + 1] = 0.88 + t * 0.12;
        colors[i * 3 + 2] = 0.92 + t * 0.08;
      } else if (y > treeLine) {
        // Rocky slopes
        const t = (y - treeLine) / (snowLine - treeLine);
        colors[i * 3] = 0.35 + t * 0.3;
        colors[i * 3 + 1] = 0.38 + t * 0.25;
        colors[i * 3 + 2] = 0.3 + t * 0.3;
      } else if (y > 0) {
        // Green meadow
        const t = y / treeLine;
        colors[i * 3] = 0.2 + t * 0.15;
        colors[i * 3 + 1] = 0.4 + t * 0.1;
        colors[i * 3 + 2] = 0.15 + t * 0.1;
      } else {
        // Valley floor — darker grass
        colors[i * 3] = 0.18;
        colors[i * 3 + 1] = 0.32;
        colors[i * 3 + 2] = 0.12;
      }
    }

    terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    terrainGeo.computeVertexNormals();

    const terrainMat = new THREE.MeshStandardMaterial({
      vertexColors: true,
      roughness: 0.9,
      metalness: 0.0,
      flatShading: false,
    });
    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    terrain.receiveShadow = true;
    scene.add(terrain);

    // ─── ROAD ─────────────────────────────────────────
    const roadPoints = [];
    for (let z = -terrainSize / 2; z < terrainSize / 2; z += 8) {
      const x = Math.sin(z * 0.005) * 150 + Math.sin(z * 0.002) * 80;
      const y = getTerrainHeight(x, z) + 0.5;
      roadPoints.push(new THREE.Vector3(x, y, z));
    }
    const roadCurve = new THREE.CatmullRomCurve3(roadPoints);

    const roadShape = new THREE.Shape();
    roadShape.moveTo(-8, 0);
    roadShape.lineTo(8, 0);
    roadShape.lineTo(8, 0.3);
    roadShape.lineTo(-8, 0.3);
    roadShape.closePath();

    const roadGeo = new THREE.ExtrudeGeometry(roadShape, {
      steps: 500,
      extrudePath: roadCurve,
    });
    const roadMat = new THREE.MeshStandardMaterial({
      color: 0x333333,
      roughness: 0.8,
      metalness: 0.1,
    });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.receiveShadow = true;
    scene.add(road);

    // Road center line
    const lineGeo = new THREE.ExtrudeGeometry(
      new THREE.Shape([
        new THREE.Vector2(-0.4, 0.31),
        new THREE.Vector2(0.4, 0.31),
        new THREE.Vector2(0.4, 0.35),
        new THREE.Vector2(-0.4, 0.35),
      ]),
      { steps: 500, extrudePath: roadCurve }
    );
    const lineMat = new THREE.MeshStandardMaterial({ color: 0xdddd44 });
    scene.add(new THREE.Mesh(lineGeo, lineMat));

    // ─── TREES ────────────────────────────────────────
    const treeTrunkGeo = new THREE.CylinderGeometry(0.8, 1.2, 8, 5);
    const treeTopGeo = new THREE.ConeGeometry(5, 14, 6);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x553311 });
    const leavesMat = new THREE.MeshStandardMaterial({ color: 0x225522 });

    const treeGroup = new THREE.InstancedMesh(treeTopGeo, leavesMat, 800);
    const trunkGroup = new THREE.InstancedMesh(treeTrunkGeo, trunkMat, 800);
    const dummy = new THREE.Object3D();
    let treeIdx = 0;

    for (let i = 0; i < 2000 && treeIdx < 800; i++) {
      const x = (Math.random() - 0.5) * terrainSize * 0.9;
      const z = (Math.random() - 0.5) * terrainSize * 0.9;
      const y = getTerrainHeight(x, z);

      // Only place trees on slopes (not peaks, not valley floor, not on road)
      const roadCenterX = Math.sin(z * 0.005) * 150 + Math.sin(z * 0.002) * 80;
      const distFromRoad = Math.abs(x - roadCenterX);
      if (y > 15 && y < 75 && distFromRoad > 20) {
        const scale = 0.7 + Math.random() * 0.8;

        dummy.position.set(x, y + 6 * scale, z);
        dummy.scale.set(scale, scale, scale);
        dummy.rotation.y = Math.random() * Math.PI * 2;
        dummy.updateMatrix();
        treeGroup.setMatrixAt(treeIdx, dummy.matrix);

        dummy.position.set(x, y + 2 * scale, z);
        dummy.updateMatrix();
        trunkGroup.setMatrixAt(treeIdx, dummy.matrix);

        treeIdx++;
      }
    }
    treeGroup.count = treeIdx;
    trunkGroup.count = treeIdx;
    treeGroup.castShadow = true;
    trunkGroup.castShadow = true;
    scene.add(treeGroup);
    scene.add(trunkGroup);

    // ─── CAMERA FLY PATH ──────────────────────────────
    let flyT = 0;
    let flySpeed = 0.0003;

    // ─── CONTROLS UI ──────────────────────────────────
    const sunSlider = document.getElementById('sunHeight');
    const fogSlider = document.getElementById('fogDensity');
    const speedSlider = document.getElementById('camSpeed');
    const autoFlyCheck = document.getElementById('autoFly');

    // ─── ANIMATION LOOP ───────────────────────────────
    function animate() {
      requestAnimationFrame(animate);

      // Update sun
      const sunH = sunSlider.value / 100;
      sunLight.position.y = 50 + sunH * 500;
      const sunColor = new THREE.Color().setHSL(0.1, 0.6, 0.5 + sunH * 0.5);
      sunLight.color = sunColor;
      renderer.toneMappingExposure = 0.3 + sunH * 0.7;

      // Sky color matches sun
      const skyColor = new THREE.Color().setHSL(0.58, 0.3 + sunH * 0.3, 0.4 + sunH * 0.4);
      scene.background = skyColor;
      scene.fog.color = skyColor;

      // Fog
      scene.fog.density = 0.0002 + (fogSlider.value / 100) * 0.002;

      // Camera fly
      flySpeed = 0.0001 + (speedSlider.value / 100) * 0.0008;
      if (autoFlyCheck.checked) {
        flyT += flySpeed;
        if (flyT > 0.95) flyT = 0.05;
        const pos = roadCurve.getPointAt(flyT);
        const lookAt = roadCurve.getPointAt(Math.min(flyT + 0.02, 0.95));
        camera.position.set(pos.x + 15, pos.y + 12, pos.z);
        camera.lookAt(lookAt.x, lookAt.y + 5, lookAt.z);
      } else {
        controls.update();
      }

      renderer.render(scene, camera);
    }
    animate();

    // ─── RESIZE ───────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
