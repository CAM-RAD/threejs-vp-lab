<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Funky Brew — VP Lab</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;background:#f2efe8;font-family:'Segoe UI',sans-serif;touch-action:none}
    canvas{display:block}
    #nav{position:fixed;bottom:0;left:0;right:0;display:flex;z-index:20;background:rgba(255,255,255,0.92);border-top:2px solid #eee}
    #nav button{flex:1;padding:14px 4px;border:none;background:none;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#888;cursor:pointer;transition:all 0.3s}
    #nav button.active{color:#fff}
    #nav button:nth-child(1).active{background:#2dbcb6}
    #nav button:nth-child(2).active{background:#f5a623}
    #nav button:nth-child(3).active{background:#e84393}
    #nav button:nth-child(4).active{background:#a3cb38}
    #info{position:fixed;top:0;left:0;right:0;z-index:15;padding:14px 20px;background:rgba(255,255,255,0.9);transform:translateY(-100%);transition:transform 0.4s ease;border-bottom:3px solid #eee}
    #info.show{transform:translateY(0)}
    #info h2{font-size:17px;margin-bottom:4px}
    #info p{font-size:11px;color:#666;line-height:1.5}
    #info .tg{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;color:#fff;margin-right:4px;font-weight:700}
    #splash{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);z-index:25;text-align:center;pointer-events:none;opacity:1;transition:opacity 0.8s}
    #splash h1{font-size:26px;font-weight:900;letter-spacing:0.08em;color:#333}
    #splash p{font-size:10px;color:#aaa;letter-spacing:0.15em;text-transform:uppercase;margin-top:6px}
    .gone{opacity:0!important}
  </style>
</head>
<body>
  <div id="splash"><h1>FUNKY BREW</h1><p>Tap below to explore</p></div>
  <div id="info"><h2 id="sn">—</h2><div id="st"></div><p id="sd">—</p></div>
  <div id="nav">
    <button onclick="goTo(0)">Roastery</button>
    <button onclick="goTo(1)">Cafe</button>
    <button onclick="goTo(2)">Bakery</button>
    <button onclick="goTo(3)">Patio</button>
  </div>

  <script type="importmap">
  {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js"}}
  </script>
  <script type="module">
    import * as THREE from 'three';

    // ─── RENDERER (match neon portal exactly) ─────────
    const R = new THREE.WebGLRenderer({ antialias: false });
    R.setSize(window.innerWidth, window.innerHeight);
    R.setPixelRatio(1);
    R.toneMapping = THREE.ACESFilmicToneMapping;
    R.toneMappingExposure = 1.0;
    document.body.appendChild(R.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf2efe8);
    const cam = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 1, 400);

    // ─── LIGHTS (3 only) ──────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xfffaf0, 2.0);
    sun.position.set(10, 18, 12);
    scene.add(sun);
    scene.add(Object.assign(new THREE.DirectionalLight(0xd0e0ff, 0.5), { position: new THREE.Vector3(-8, 6, 8) }));

    // ─── MERGED GEOMETRY APPROACH ─────────────────────
    // Instead of 87 separate meshes, merge into ~6 large meshes by material color

    function mergeBoxes(boxes) {
      // boxes: array of {w,h,d,x,y,z}
      const geo = new THREE.BufferGeometry();
      const allPositions = [];
      const allNormals = [];
      const allIndices = [];
      let indexOffset = 0;

      boxes.forEach(b => {
        const g = new THREE.BoxGeometry(b.w, b.h, b.d);
        const p = g.attributes.position.array;
        const n = g.attributes.normal.array;
        const idx = g.index.array;

        for (let i = 0; i < p.length; i += 3) {
          allPositions.push(p[i] + b.x, p[i+1] + b.y, p[i+2] + b.z);
          allNormals.push(n[i], n[i+1], n[i+2]);
        }
        for (let i = 0; i < idx.length; i++) {
          allIndices.push(idx[i] + indexOffset);
        }
        indexOffset += p.length / 3;
        g.dispose();
      });

      geo.setAttribute('position', new THREE.Float32BufferAttribute(allPositions, 3));
      geo.setAttribute('normal', new THREE.Float32BufferAttribute(allNormals, 3));
      geo.setIndex(allIndices);
      return geo;
    }

    // ═══ TEAL PIECES (roastery containers) ════════════
    const tealGeo = mergeBoxes([
      {w:4,h:2.8,d:3.5, x:0,y:8.9,z:0.5},     // container 1
      {w:3,h:2.2,d:2.8, x:0.5,y:11.4,z:0.2},   // container 2
      {w:3.8,h:0.9,d:0.2, x:-1.5,y:6.3,z:-2.6},// sign accent
    ]);
    scene.add(new THREE.Mesh(tealGeo, new THREE.MeshLambertMaterial({color:0x2dbcb6})));

    // ═══ ORANGE PIECES (cafe) ═════════════════════════
    const orangeGeo = mergeBoxes([
      {w:5.5,h:3.5,d:6, x:-1.5,y:5.25,z:0.5},  // cafe body
      {w:5.6,h:0.15,d:6.1, x:-1.5,y:7.02,z:0.5},// top trim
      {w:5.6,h:0.15,d:6.1, x:-1.5,y:3.52,z:0.5},// bottom trim
    ]);
    scene.add(new THREE.Mesh(orangeGeo, new THREE.MeshLambertMaterial({color:0xf5a623})));

    // ═══ PINK PIECES (bakery) ═════════════════════════
    const pinkGeo = mergeBoxes([
      {w:4,h:3.5,d:4.5, x:2.2,y:5.25,z:-0.5},  // bakery body
      {w:4.1,h:0.15,d:4.6, x:2.2,y:7.02,z:-0.5},// top trim
      {w:4.1,h:0.15,d:4.6, x:2.2,y:3.52,z:-0.5},// bottom trim
    ]);
    scene.add(new THREE.Mesh(pinkGeo, new THREE.MeshLambertMaterial({color:0xe84393})));

    // ═══ LIME PIECES (patio) ══════════════════════════
    const limeGeo = mergeBoxes([
      {w:5,h:3.5,d:5, x:-2,y:1.75,z:1.5},       // patio body
      {w:5.1,h:0.15,d:5.1, x:-2,y:3.52,z:1.5},  // top trim
      {w:5.1,h:0.15,d:5.1, x:-2,y:0.02,z:1.5},  // bottom trim
      {w:4.5,h:0.15,d:4.5, x:3,y:0.08,z:1.5},   // patio floor
    ]);
    scene.add(new THREE.Mesh(limeGeo, new THREE.MeshLambertMaterial({color:0xa3cb38})));

    // ═══ CREAM/WHITE PIECES ═══════════════════════════
    const creamGeo = mergeBoxes([
      {w:0.08,h:1,d:4.5, x:5.2,y:0.58,z:1.5},   // railing vertical
      {w:4.5,h:0.08,d:0.08, x:3,y:1.05,z:3.72},  // railing top
      {w:4.5,h:0.08,d:0.08, x:3,y:0.55,z:3.72},  // railing mid
    ]);
    scene.add(new THREE.Mesh(creamGeo, new THREE.MeshLambertMaterial({color:0xffffff})));

    // ═══ WOOD PIECES ══════════════════════════════════
    const woodGeo = mergeBoxes([
      {w:1,h:2.2,d:0.12, x:-2,y:1.1,z:-1.04},    // patio door
      {w:3,h:0.9,d:0.5, x:-1,y:4,z:0},           // cafe counter
      {w:4,h:0.12,d:0.5, x:3,y:0.95,z:3.5},      // bar counter
      {w:1.5,h:0.08,d:0.8, x:2.2,y:3.78,z:-2},   // bakery display shelf
    ]);
    scene.add(new THREE.Mesh(woodGeo, new THREE.MeshLambertMaterial({color:0xc4883a})));

    // ═══ DARK GRAY PIECES (machines, vents, sign) ═════
    const darkGeo = mergeBoxes([
      {w:0.5,h:0.6,d:0.4, x:-2.2,y:4.7,z:0},    // coffee machine
      {w:1.3,h:0.3,d:1.3, x:0.5,y:12.65,z:0.2},  // vent box
      {w:0.9,h:0.6,d:0.45, x:-4.55,y:2.3,z:1.5}, // AC unit
      {w:3.8,h:0.9,d:0.2, x:-1.5,y:6.3,z:-2.62}, // sign background
    ]);
    scene.add(new THREE.Mesh(darkGeo, new THREE.MeshLambertMaterial({color:0x444444})));

    // ═══ GRAY PIECES (pipes) ══════════════════════════
    const grayGeo = mergeBoxes([
      {w:0.24,h:5,d:0.24, x:-4.2,y:5,z:-1},      // vertical pipe
      {w:0.24,h:4,d:0.24, x:4.3,y:7.5,z:0},      // vertical pipe 2
      {w:2.2,h:0.24,d:0.24, x:-3,y:7.2,z:-1.5},  // horizontal pipe
      {w:1.8,h:0.24,d:0.24, x:3.3,y:9.5,z:-1},   // horizontal pipe 2
      {w:0.24,h:0.24,d:2, x:4.3,y:9.5,z:0.5},    // horizontal pipe 3
    ]);
    scene.add(new THREE.Mesh(grayGeo, new THREE.MeshLambertMaterial({color:0x999999})));

    // ═══ TERRACOTTA PIECES (awnings, rooflets) ════════
    const terraGeo = mergeBoxes([
      // Patio awning stripes
      {w:2.8,h:0.08,d:1.2, x:-3,y:3.1,z:-1.5},
      // Cafe awning
      {w:3.5,h:0.08,d:1.2, x:-1.5,y:6.5,z:-3},
      // Bakery awning
      {w:2.8,h:0.08,d:1, x:2.2,y:6.3,z:-3.1},
    ]);
    scene.add(new THREE.Mesh(terraGeo, new THREE.MeshLambertMaterial({color:0xc45a3c})));

    // ═══ GLASS PIECES ═════════════════════════════════
    const glassGeo = mergeBoxes([
      {w:1.6,h:1.2,d:0.12, x:-3.2,y:2.1,z:-1.04},  // patio window
      {w:3,h:1.8,d:0.12, x:-1.5,y:5.2,z:-2.52},     // cafe window
      {w:2,h:1.2,d:0.12, x:2.2,y:5.4,z:-2.78},      // bakery window
      {w:1.5,h:0.7,d:0.8, x:2.2,y:4.15,z:-2},       // display case
    ]);
    scene.add(new THREE.Mesh(glassGeo, new THREE.MeshLambertMaterial({color:0xaaddee,transparent:true,opacity:0.4})));

    // ═══ GROUND ═══════════════════════════════════════
    scene.add(new THREE.Mesh(
      new THREE.BoxGeometry(18, 0.3, 14),
      new THREE.MeshLambertMaterial({color:0xe8e2d8})
    ).translateY(-0.15));

    // ═══ PLANT (single sphere + cylinder = 2 objects) ═
    const plant = new THREE.Mesh(new THREE.SphereGeometry(0.35,5,4), new THREE.MeshLambertMaterial({color:0x2d8a4e}));
    plant.position.set(5,0.55,0);
    scene.add(plant);

    // ═══ BAR STOOLS (1 instanced mesh) ════════════════
    const stoolGeo = new THREE.CylinderGeometry(0.2,0.2,0.06,6);
    const stools = new THREE.InstancedMesh(stoolGeo, new THREE.MeshLambertMaterial({color:0xe84393}), 3);
    const dm = new THREE.Object3D();
    [1.5,3,4.5].forEach((sx,i) => {
      dm.position.set(sx,0.8,3.2);
      dm.updateMatrix();
      stools.setMatrixAt(i,dm.matrix);
    });
    scene.add(stools);

    // Total objects: ~15 meshes. Well under the limit.

    // ═══ SECTIONS ═════════════════════════════════════
    const sections = [
      {name:'The Roastery',desc:'Small-batch roasting in converted shipping containers. Single-origin beans from Colombia, Ethiopia, and Guatemala.',
        tags:[{t:'Small Batch',c:'#2dbcb6'},{t:'Single Origin',c:'#1a8a85'}],
        cam:{x:18,y:22,z:16},look:{x:0,y:8,z:0}},
      {name:'The Cafe',desc:'Hand-pulled espresso, craft pour-overs, and cold brew on tap. Grab a seat and watch the baristas work.',
        tags:[{t:'Espresso',c:'#f5a623'},{t:'Pour Over',c:'#d48a18'}],
        cam:{x:-25,y:16,z:20},look:{x:-1,y:5,z:0}},
      {name:'The Bakery',desc:'Fresh croissants, sourdough, and cardamom buns every morning. Everything pairs perfectly with a cortado.',
        tags:[{t:'Fresh Daily',c:'#e84393'},{t:'Sourdough',c:'#c22e78'}],
        cam:{x:25,y:14,z:-16},look:{x:2,y:5,z:-0.5}},
      {name:'The Patio',desc:'Sun, espresso, and people-watching. Pink bar stools, open air, dogs welcome.',
        tags:[{t:'Outdoor',c:'#a3cb38'},{t:'Dog Friendly',c:'#85a82e'}],
        cam:{x:25,y:10,z:20},look:{x:2,y:1,z:1.5}},
    ];

    let cur = -1;
    const cP = new THREE.Vector3(28,20,28);
    const lP = new THREE.Vector3(0,5,0);
    const cN = cP.clone();
    const lN = lP.clone();

    const panel = document.getElementById('info');
    const splash = document.getElementById('splash');
    const btns = document.querySelectorAll('#nav button');

    window.goTo = function(i) {
      splash.classList.add('gone');
      cur = i;
      const s = sections[i];
      cP.set(s.cam.x,s.cam.y,s.cam.z);
      lP.set(s.look.x,s.look.y,s.look.z);
      document.getElementById('sn').textContent = s.name;
      document.getElementById('sd').textContent = s.desc;
      document.getElementById('st').innerHTML = s.tags.map(t=>`<span class="tg" style="background:${t.c}">${t.t}</span>`).join('');
      panel.classList.add('show');
      panel.style.borderBottomColor = ['#2dbcb6','#f5a623','#e84393','#a3cb38'][i];
      btns.forEach((b,j)=>b.classList.toggle('active',j===i));
    };

    // ═══ ANIMATE ══════════════════════════════════════
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      if (cur === -1) {
        cP.x = Math.sin(t*0.08)*30;
        cP.z = Math.cos(t*0.08)*30;
        cP.y = 18+Math.sin(t*0.06)*3;
        lP.set(0,5,0);
      }
      cN.lerp(cP,0.035);
      lN.lerp(lP,0.035);
      cam.position.copy(cN);
      cam.lookAt(lN);
      R.render(scene,cam);
    }
    animate();

    window.addEventListener('resize',()=>{
      cam.aspect=window.innerWidth/window.innerHeight;
      cam.updateProjectionMatrix();
      R.setSize(window.innerWidth,window.innerHeight);
    });
  </script>
</body>
</html>
