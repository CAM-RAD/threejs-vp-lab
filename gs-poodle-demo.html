<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three.js GS Deformation Demo — Poodle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 18px 16px 14px;
    text-align: center;
    color: rgba(255,255,255,0.88);
    pointer-events: none;
    z-index: 10;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 100%);
  }
  #ui h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; }
  #ui p { font-size: 10px; color: rgba(255,255,255,0.45); letter-spacing: 0.3px; }
  #stats {
    position: fixed; bottom: 14px; left: 16px;
    color: rgba(255,255,255,0.35);
    font-size: 10px;
    pointer-events: none;
    z-index: 10;
    font-family: inherit;
  }
  #vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>

<div id="ui">
  <h1>Three.js GS Deformation Demo &mdash; Poodle by PlayCanvas</h1>
  <p>Drag to orbit &middot; Scroll to zoom &middot; Cage-based PBD deformation with motion blur</p>
</div>
<div id="vignette"></div>
<div id="stats"></div>

<!-- ============================================================
  3D Gaussian Splatting Deformation Demo

  Technique inspired by "One-shot Compositional 3D Head Avatars
  with Deformable Hair" (arXiv:2604.14782v1).

  Approach:
    1. ~18 000 particles rendered as screen-space gaussians with
       soft alpha falloff (simulating projected 3D gaussian splats).
    2. A procedural poodle model is built from ellipsoidal body-part
       distributions; each particle has a "softness" weight.
    3. Camera angular velocity drives inertial forces on particles
       (PBD-style), so fur and fabric lag behind during fast orbits.
    4. Spring + damping constraints pull particles back to their
       rest positions, creating fluid, physically plausible motion.
    5. Fur particles get higher deformation weight → flowing hair.
    6. Rug particles deform mildly → fabric-like bending.
    7. Breathing and tail-wag add life when the scene is idle.
============================================================ -->

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Configuration ─────────────────────────────────────────
const CFG = {
  springK:       14.0,   // PBD spring stiffness
  damping:        4.5,   // velocity damping
  inertiaScale:   3.0,   // camera-motion → deformation coupling
  breathSpeed:    1.2,   // subtle idle breathing
  breathAmp:      0.006,
  tailWagSpeed:   3.5,
  tailWagAmp:     0.045,
  autoRotate:     0.4,   // deg/sec when idle
};

// ─── Renderer ──────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
document.body.appendChild(renderer.domElement);

// ─── Scene & Camera ────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
  42, window.innerWidth / window.innerHeight, 0.1, 100
);
camera.position.set(0.6, 0.85, 2.3);

// ─── OrbitControls — 6-DOF tumble ─────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.45, 0);
controls.enableDamping  = true;
controls.dampingFactor  = 0.07;
controls.rotateSpeed    = 0.8;
controls.minDistance     = 0.6;
controls.maxDistance     = 5.0;
controls.autoRotate     = true;
controls.autoRotateSpeed = CFG.autoRotate;
controls.update();

// ─── Gaussian-splat shaders ───────────────────────────────
const vertexShader = /* glsl */ `
  attribute float aSize;
  attribute vec3  aColor;
  attribute float aFur;
  attribute float aVelMag;          // per-particle speed (for motion blur)

  uniform float uTime;
  uniform float uPR;                // pixel ratio

  varying vec3  vColor;
  varying float vAlpha;

  void main() {
    vColor = aColor;

    vec4 mv = modelViewMatrix * vec4(position, 1.0);

    // Perspective-correct point size
    float px = aSize * uPR * (300.0 / -mv.z);

    // Motion-blur: enlarge splat when it's moving fast
    px *= 1.0 + aVelMag * 12.0;

    gl_PointSize = clamp(px, 1.0, 80.0);
    gl_Position  = projectionMatrix * mv;

    // Fur is more transparent; core is more opaque
    vAlpha = mix(0.72, 0.38, aFur);
  }
`;

const fragmentShader = /* glsl */ `
  varying vec3  vColor;
  varying float vAlpha;

  void main() {
    vec2 d  = gl_PointCoord - 0.5;
    float r2 = dot(d, d);

    // Gaussian falloff → soft splat edges
    float a = exp(-r2 * 7.0) * vAlpha;
    if (a < 0.015) discard;

    gl_FragColor = vec4(vColor, a);
  }
`;

// ─── Poodle body-part definitions ─────────────────────────
// Each entry: parametric ellipsoid + particle counts + color + fur weight
const PARTS = [
  // ── Torso ──
  { n:'body',   c:[0,.55,0],      r:[.30,.25,.42], cnt:3400, col:[.76,.74,.72], fur:.9,  fRat:.42 },
  // ── Chest puff ──
  { n:'chest',  c:[0,.62,.22],    r:[.18,.16,.14], cnt:800,  col:[.80,.78,.76], fur:.95, fRat:.55 },
  // ── Head ──
  { n:'head',   c:[0,.94,.38],    r:[.21,.21,.21], cnt:2400, col:[.78,.76,.74], fur:.85, fRat:.38 },
  // ── Top-knot poof ──
  { n:'topknot',c:[0,1.14,.36],   r:[.11,.09,.11], cnt:700,  col:[.82,.80,.78], fur:1., fRat:.6 },
  // ── Snout ──
  { n:'snout',  c:[0,.83,.57],    r:[.07,.06,.12], cnt:500,  col:[.73,.71,.69], fur:.45, fRat:.2 },
  // ── Ears ──
  { n:'earL',   c:[-.15,1.06,.30],r:[.05,.14,.05], cnt:550,  col:[.71,.69,.67], fur:.95, fRat:.5 },
  { n:'earR',   c:[ .15,1.06,.30],r:[.05,.14,.05], cnt:550,  col:[.71,.69,.67], fur:.95, fRat:.5 },
  // ── Legs ──
  { n:'legFL',  c:[-.14,.22,.26], r:[.055,.23,.055],cnt:500, col:[.74,.72,.70], fur:.7,  fRat:.3 },
  { n:'legFR',  c:[ .14,.22,.26], r:[.055,.23,.055],cnt:500, col:[.74,.72,.70], fur:.7,  fRat:.3 },
  { n:'legBL',  c:[-.14,.22,-.26],r:[.06,.23,.06],  cnt:500, col:[.74,.72,.70], fur:.7,  fRat:.3 },
  { n:'legBR',  c:[ .14,.22,-.26],r:[.06,.23,.06],  cnt:500, col:[.74,.72,.70], fur:.7,  fRat:.3 },
  // ── Paw puffs ──
  { n:'pawFL',  c:[-.14,.03,.26], r:[.065,.04,.065],cnt:220, col:[.79,.77,.75], fur:.85, fRat:.5 },
  { n:'pawFR',  c:[ .14,.03,.26], r:[.065,.04,.065],cnt:220, col:[.79,.77,.75], fur:.85, fRat:.5 },
  { n:'pawBL',  c:[-.14,.03,-.26],r:[.065,.04,.065],cnt:220, col:[.79,.77,.75], fur:.85, fRat:.5 },
  { n:'pawBR',  c:[ .14,.03,-.26],r:[.065,.04,.065],cnt:220, col:[.79,.77,.75], fur:.85, fRat:.5 },
  // ── Tail pompom ──
  { n:'tail',   c:[0,.78,-.48],   r:[.08,.08,.08], cnt:450,  col:[.78,.76,.74], fur:.97, fRat:.55 },
  // ── Facial features ──
  { n:'nose',   c:[0,.85,.68],    r:[.026,.019,.019],cnt:90, col:[.12,.10,.08], fur:0,   fRat:0 },
  { n:'eyeL',   c:[-.068,.96,.55],r:[.019,.019,.013],cnt:65, col:[.08,.06,.04], fur:0,   fRat:0 },
  { n:'eyeR',   c:[ .068,.96,.55],r:[.019,.019,.013],cnt:65, col:[.08,.06,.04], fur:0,   fRat:0 },
  // ── Eye highlights (tiny white specular dots) ──
  { n:'specL',  c:[-.063,.965,.56],r:[.006,.006,.004],cnt:15,col:[.95,.95,.95], fur:0,   fRat:0 },
  { n:'specR',  c:[ .063,.965,.56],r:[.006,.006,.004],cnt:15,col:[.95,.95,.95], fur:0,   fRat:0 },
];

const RUG_COUNT = 2800;

// ─── Sampling helpers ─────────────────────────────────────

/** Uniform sample inside an ellipsoid (rejection) */
function sampleInside(cx,cy,cz, rx,ry,rz) {
  let x,y,z;
  do { x=Math.random()*2-1; y=Math.random()*2-1; z=Math.random()*2-1; }
  while (x*x+y*y+z*z > 1);
  return [cx+x*rx, cy+y*ry, cz+z*rz];
}

/** Sample on ellipsoid surface + random outward fur offset */
function sampleFur(cx,cy,cz, rx,ry,rz) {
  const th = Math.random()*Math.PI*2;
  const ph = Math.acos(Math.random()*2-1);
  const sx = Math.sin(ph)*Math.cos(th);
  const sy = Math.sin(ph)*Math.sin(th);
  const sz = Math.cos(ph);
  const f  = 0.015 + Math.random()*0.09;   // fur length
  return [cx+sx*(rx+f), cy+sy*(ry+f), cz+sz*(rz+f)];
}

/** Paw-print pattern test for the rug */
function isPaw(x,z) {
  const paws = [
    [-.24,.10,.60],[.20,-.06,.65],[-.06,-.30,.52],
    [.28,.24,.55],[-.32,-.18,.48],[.06,.32,.58],
    [.34,-.22,.42],[-.18,.38,.50]
  ];
  for (const [px,pz,sc] of paws) {
    const s = sc*.08, dx=x-px, dz=z-pz;
    // Main pad
    if (dx*dx/(s*s*1.3)+dz*dz/(s*s*1.6) < 1) return true;
    // Four toe beans
    const tr = s*.38;
    for (const [ox,oz] of [[-.6,1.4],[-.2,1.7],[.2,1.7],[.6,1.4]]) {
      const tdx=dx-ox*s, tdz=dz-oz*s;
      if (tdx*tdx+tdz*tdz < tr*tr) return true;
    }
  }
  return false;
}

// ─── Build particles ──────────────────────────────────────
let total = RUG_COUNT;
for (const p of PARTS) total += p.cnt;

const pos      = new Float32Array(total*3);
const rest     = new Float32Array(total*3);
const vel      = new Float32Array(total*3);
const col      = new Float32Array(total*3);
const sz       = new Float32Array(total);
const fur      = new Float32Array(total);
const soft     = new Float32Array(total);
const velMag   = new Float32Array(total);   // for motion-blur attribute

const ranges = {};   // name → {start, end}
let idx = 0;

for (const p of PARTS) {
  const start = idx;
  const [cx,cy,cz] = p.c;
  const [rx,ry,rz] = p.r;
  const nFur  = Math.floor(p.cnt * p.fRat);
  const nCore = p.cnt - nFur;

  // Core (interior) particles
  for (let i=0;i<nCore;i++) {
    const [x,y,z] = sampleInside(cx,cy,cz,rx,ry,rz);
    const i3=idx*3;
    pos[i3]=rest[i3]=x;  pos[i3+1]=rest[i3+1]=y;  pos[i3+2]=rest[i3+2]=z;
    const v=.93+Math.random()*.14;
    col[i3]=p.col[0]*v; col[i3+1]=p.col[1]*v; col[i3+2]=p.col[2]*v;
    sz[idx]  = .022+Math.random()*.014;
    fur[idx] = 0;
    soft[idx]= p.fur*.3;
    idx++;
  }
  // Fur (surface + outward) particles
  for (let i=0;i<nFur;i++) {
    const [x,y,z] = sampleFur(cx,cy,cz,rx,ry,rz);
    const i3=idx*3;
    pos[i3]=rest[i3]=x;  pos[i3+1]=rest[i3+1]=y;  pos[i3+2]=rest[i3+2]=z;
    const v=1.0+Math.random()*.16;
    col[i3]=Math.min(1,p.col[0]*v);
    col[i3+1]=Math.min(1,p.col[1]*v);
    col[i3+2]=Math.min(1,p.col[2]*v);
    sz[idx]  = .028+Math.random()*.022;
    fur[idx] = 1;
    soft[idx]= p.fur*.85;
    idx++;
  }
  ranges[p.n] = { start, end: idx };
}

// ── Rug particles ──
const rugStart = idx;
for (let i=0;i<RUG_COUNT;i++) {
  const x = (Math.random()-.5)*1.3;
  const z = (Math.random()-.5)*1.0;
  const y = -.015 + Math.random()*.012;
  const i3 = idx*3;
  pos[i3]=rest[i3]=x;  pos[i3+1]=rest[i3+1]=y;  pos[i3+2]=rest[i3+2]=z;

  if (isPaw(x,z)) {
    col[i3]  =.22+Math.random()*.08;
    col[i3+1]=.32+Math.random()*.08;
    col[i3+2]=.58+Math.random()*.12;
  } else {
    const v=.88+Math.random()*.18;
    col[i3]=.86*v; col[i3+1]=.79*v; col[i3+2]=.64*v;
  }
  sz[idx]  = .013+Math.random()*.009;
  fur[idx] = 0;
  soft[idx]= .12;     // mild fabric deformation
  idx++;
}

// ─── Geometry + Material ──────────────────────────────────
const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('aColor',   new THREE.BufferAttribute(col, 3));
geo.setAttribute('aSize',    new THREE.BufferAttribute(sz,  1));
geo.setAttribute('aFur',     new THREE.BufferAttribute(fur, 1));
geo.setAttribute('aVelMag',  new THREE.BufferAttribute(velMag, 1));

const mat = new THREE.ShaderMaterial({
  vertexShader, fragmentShader,
  uniforms: {
    uTime: { value: 0 },
    uPR:   { value: renderer.getPixelRatio() },
  },
  transparent: true,
  depthWrite:  false,
  depthTest:   true,
  blending:    THREE.NormalBlending,
});

scene.add(new THREE.Points(geo, mat));

// ─── PBD Deformation State ────────────────────────────────
const prevCamDir   = camera.position.clone().normalize();
const smoothAngVel = new THREE.Vector3();
const clock        = new THREE.Clock();

const tail = ranges.tail;

// ─── Stats ────────────────────────────────────────────────
const statsEl = document.getElementById('stats');
let fCount=0, fTime=0;

// ─── Animation Loop ───────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  const dt   = Math.min(clock.getDelta(), 0.05);
  const time = clock.getElapsedTime();
  controls.update();

  // ── Camera angular velocity (drives PBD inertia) ──
  const camDir = camera.position.clone().normalize();
  const raw    = new THREE.Vector3().crossVectors(prevCamDir, camDir);
  if (dt > 1e-6) raw.multiplyScalar(1/dt);
  smoothAngVel.lerp(raw, 0.25);
  prevCamDir.copy(camDir);

  const ax=smoothAngVel.x, ay=smoothAngVel.y, az=smoothAngVel.z;

  // ── Breathing ──
  const bScale = 1.0 + Math.sin(time * CFG.breathSpeed) * CFG.breathAmp;

  // ── Per-particle PBD update ──
  const P = geo.attributes.position.array;
  const V = geo.attributes.aVelMag.array;

  for (let i=0; i<total; i++) {
    const i3 = i*3;
    const s  = soft[i];

    // Hard surfaces (eyes, nose, specular) — just breathe
    if (s < 0.01) {
      P[i3]   = rest[i3];
      P[i3+1] = rest[i3+1] * bScale;
      P[i3+2] = rest[i3+2];
      V[i] = 0;
      continue;
    }

    // Target position (rest + breathing + tail wag)
    let tx = rest[i3];
    let ty = rest[i3+1] * bScale;
    let tz = rest[i3+2];

    // Tail wag
    if (tail && i>=tail.start && i<tail.end) {
      tx += Math.sin(time * CFG.tailWagSpeed) * CFG.tailWagAmp;
    }

    // Displacement from target
    const dx = P[i3]  -tx;
    const dy = P[i3+1]-ty;
    const dz = P[i3+2]-tz;

    // Inertial force: cross(angularVelocity, restPosition)
    // → simulates the "lag" when the world spins around the object
    const fx = (ay*tz - az*ty) * CFG.inertiaScale * s;
    const fy = (az*tx - ax*tz) * CFG.inertiaScale * s;
    const fz = (ax*ty - ay*tx) * CFG.inertiaScale * s;

    // PBD spring-damper integration (semi-implicit Euler)
    vel[i3]   += (-CFG.springK*dx - CFG.damping*vel[i3]   + fx)*dt;
    vel[i3+1] += (-CFG.springK*dy - CFG.damping*vel[i3+1] + fy)*dt;
    vel[i3+2] += (-CFG.springK*dz - CFG.damping*vel[i3+2] + fz)*dt;

    P[i3]   += vel[i3]  *dt;
    P[i3+1] += vel[i3+1]*dt;
    P[i3+2] += vel[i3+2]*dt;

    // Per-particle speed magnitude → motion-blur attribute
    V[i] = Math.sqrt(vel[i3]*vel[i3]+vel[i3+1]*vel[i3+1]+vel[i3+2]*vel[i3+2]);
  }

  geo.attributes.position.needsUpdate = true;
  geo.attributes.aVelMag.needsUpdate  = true;
  mat.uniforms.uTime.value = time;

  renderer.render(scene, camera);

  // FPS
  fCount++; fTime += dt;
  if (fTime >= 1) {
    statsEl.textContent = `${total.toLocaleString()} splats · ${Math.round(fCount/fTime)} fps`;
    fCount=0; fTime=0;
  }
}

animate();

// ─── Resize ───────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  mat.uniforms.uPR.value = renderer.getPixelRatio();
});

</script>
</body>
</html>
